/* ── Nutrition utilities ── */

function sumMacros(meals) {
  return meals.reduce((t, m) => ({
    cal:  t.cal  + (m.macros?.cal  || 0),
    pro:  t.pro  + (m.macros?.pro  || 0),
    carb: t.carb + (m.macros?.carb || 0),
    fat:  t.fat  + (m.macros?.fat  || 0),
    fib:  t.fib  + (m.macros?.fib  || 0),
  }), { cal:0, pro:0, carb:0, fat:0, fib:0 });
}

function calcNutritionGoals(profile, nutritionGoals) {
  const bw = nutritionGoals.bodyweight || 80;
  const days = profile.trainingDaysPerWeek || 3;
  const mult = days <= 2 ? 26 : days <= 4 ? 28 : 30;
  const goalType = nutritionGoals.goalType || 'maintain';
  const tdee = bw * mult;
  const calories = goalType === 'lose' ? Math.round(tdee * 0.82)
                 : goalType === 'gain' ? Math.round(tdee * 1.12)
                 : Math.round(tdee);
  const proMult = goalType === 'lose' ? 2.2 : goalType === 'gain' ? 2.4 : 2.0;
  const protein = Math.round(bw * proMult);
  const fatCals = Math.round(calories * 0.25);
  const fatG = Math.round(fatCals / 9);
  const carbCals = calories - (protein * 4) - fatCals;
  const carbs = Math.max(50, Math.round(carbCals / 4));
  return { calories, protein, carbs, fat: fatG };
}


// Mifflin-St Jeor BMR
function calcBMR({ weight, height, age, sex }) {
  if (!weight || !height || !age) return null;
  const base = 10 * weight + 6.25 * height - 5 * age;
  return Math.round(sex === 'female' ? base - 161 : base + 5);
}
const ACTIVITY_MULTIPLIERS = {
  sedentary:    { label:'Sedentary (desk job, no exercise)',   mult:1.2 },
  light:        { label:'Lightly active (1–3 days/week)',      mult:1.375 },
  moderate:     { label:'Moderately active (3–5 days/week)',   mult:1.55 },
  very_active:  { label:'Very active (6–7 days/week)',         mult:1.725 },
  extra_active: { label:'Extra active (physical job + train)', mult:1.9 },
};
function calcTDEE(bmr, activityLevel) {
  const mult = ACTIVITY_MULTIPLIERS[activityLevel]?.mult || 1.55;
  return bmr ? Math.round(bmr * mult) : null;
}
function calcCardioCalories(activity, durationMin, intensity, weightKg) {
  const met = activity?.met?.[intensity] || 6;
  return Math.round(met * (weightKg || 75) * (durationMin / 60));
}

function getNutritionLog(nutritionLog, date) {
  return nutritionLog[date] || { meals: [] };
}

function checkNutritionBadges(nutritionLog, weightHistory, nutritionGoals, existing) {
  const now = new Date().toISOString();
  const earned = {};
  const allMeals = Object.values(nutritionLog).flatMap(d => d.meals || []);
  if (allMeals.length >= 1 && !existing.first_meal) earned.first_meal = { unlockedAt: now };
  // Count nutrition streaks
  let streak = 0, maxStreak = 0;
  const sorted = Object.keys(nutritionLog).sort();
  for (let i = 0; i < sorted.length; i++) {
    const d = nutritionLog[sorted[i]];
    const total = sumMacros(d.meals || []);
    if (total.cal >= (nutritionGoals.calories || 1500) * 0.8) {
      streak++;
      maxStreak = Math.max(maxStreak, streak);
    } else streak = 0;
  }
  if (maxStreak >= 14 && !existing.fuel_streak) earned.fuel_streak = { unlockedAt: now };
  // Protein goal streak
  let proStreak = 0;
  for (let i = sorted.length - 1; i >= 0; i--) {
    const d = nutritionLog[sorted[i]];
    const total = sumMacros(d.meals || []);
    if (total.pro >= (nutritionGoals.protein || 150)) proStreak++;
    else break;
  }
  if (proStreak >= 5 && !existing.protein_king) earned.protein_king = { unlockedAt: now };
  // Goal weight
  if (weightHistory.length > 0 && nutritionGoals.goalWeight) {
    const latest = weightHistory[weightHistory.length - 1].weight;
    const goalType = nutritionGoals.goalType;
    const hit = goalType === 'lose' ? latest <= nutritionGoals.goalWeight
              : goalType === 'gain' ? latest >= nutritionGoals.goalWeight
              : Math.abs(latest - nutritionGoals.goalWeight) <= 0.5;
    if (hit && !existing.goal_weight) earned.goal_weight = { unlockedAt: now };
  }
  return earned;
}

function useLocalStorage(key, initial) {
  const [val, setVal] = useState(() => {
    try { const item = localStorage.getItem(key); return item ? JSON.parse(item) : initial; }
    catch { return initial; }
  });
  const setStored = useCallback((v) => {
    setVal(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [val, setStored];
}

async function callClaude(apiKey, messages, maxTokens = 4000) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: maxTokens, messages }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${res.status}`);
  }
  const data = await res.json();
  return data.content[0].text;
}

- ${days[1]}: Arms + Shoulders — Military Press 3 sets 6-10 reps, Lateral Raises 2 sets 6-10 reps, Rear Delt Fly 2 sets 6-10 reps, Cable Curl 3 sets 6-10 reps, Hammer Curl 2 sets 6-10 reps, Tricep Pushdown 3 sets 6-10 reps, Overhead Tricep Extension 2 sets 6-10 reps
- ${days[2]}: Legs Quad Focus — Hack Squat 3 sets 6-10 reps, Leg Press 2 sets 6-10 reps, Leg Extension 2 sets 6-10 reps, Calf Raises 3 sets 6-10 reps
- ${days[3]}: Upper — Incline Chest Press 3 sets 6-10 reps, Pec Fly 2 sets 6-10 reps, Seated Row 3 sets 6-10 reps, Lat Pulldown 2 sets 6-10 reps, Lateral Raises 2 sets 6-10 reps, Cable Curl 2 sets 6-10 reps, Tricep Pushdown 2 sets 6-10 reps
- ${days[4]}: Lower Posterior Deadlift Focus — Deadlift 3 sets 5-8 reps, Back Extension 3 sets 6-10 reps, Seated Hamstring Curl 2 sets 6-10 reps, Calf Raises 3 sets 6-10 reps
Straight sets only. No supersets. No substitutions. You MUST follow this day-by-day structure exactly with these exact exercises, sets, and reps. Do not merge days, swap exercises, or deviate from this list.`;
  }
  if (split === 'pplul' && days.length >= 5) {
    return `MANDATORY SPLIT: PPL + Upper/Lower over 5 days:
- ${days[0]}: Push (chest, shoulders, triceps)
- ${days[1]}: Pull (back, biceps, rear delts)
- ${days[2]}: Legs (quads, hamstrings, glutes, calves)
- ${days[3]}: Upper Body (push + pull balance)
- ${days[4]}: Lower Body (quad + hamstring + glute)`;
  }
  return `Training Split: ${split || 'auto-select based on days'}\nCreate a plan following the specified training split structure.`;
}

async function generatePlan(profile) {
  const splitInstructions = getSplitInstructions(profile);
  const prompt = `You are an expert personal trainer. Generate a personalised weekly training plan.

ATHLETE PROFILE:
- Name: ${profile.name}
- Fitness Level: ${profile.fitnessLevel}
- Goal: ${profile.goal}
- Equipment: ${profile.equipment.join(', ')}
- Training Days Per Week: ${profile.trainingDaysPerWeek || profile.trainingDays?.length || 3}
- Preferred Training Days: ${(profile.trainingDays||[]).join(', ')}
- Session Length: ${profile.sessionLength} minutes

IMPORTANT RULES:
- Every exercise is a STRAIGHT SET only. No supersets, no paired sets, no circuits.
- Each exercise stands alone with its own sets, reps, rest period.
- Never pair exercises together or use A1/A2 notation.
- Never use the word 'superset' or 'paired' in any exercise or notes field.

GOAL-SPECIFIC PROGRAMMING RULES:

If goal = 'Build Muscle':
- Hypertrophy rep ranges: 8-12 reps, 3-4 sets, 60-90s rest
- Focus on time under tension, compound movements first, isolation finishers
- Progressive overload is the priority

If goal = 'Get Stronger':
- Strength rep ranges: 3-6 reps, 4-5 sets, 2-3 min rest
- Prioritise barbell compounds: squat, deadlift, bench, overhead press, row
- Linear progression model

If goal = 'Lose Fat':
- Higher rep ranges: 12-15 reps, 3 sets, 45-60s rest
- Include 1-2 conditioning exercises per session (e.g. kettlebell swings, battle ropes if equipment available)

If goal = 'Athletic Performance':
- Mix of power (3-5 reps explosive), strength (5-8 reps), and conditioning
- Include plyometrics: box jumps, broad jumps, explosive step-ups, medicine ball throws
- Include athletic movements: single-leg RDL, lateral bounds, rotational work, sprint drills
- Include agility/conditioning finishers: shuttle runs, jump rope, sled pushes if available
- Power exercises first (when CNS is fresh), strength second, conditioning last

If goal = 'General Fitness':
- Balanced rep ranges: 10-15 reps, 3 sets, 60s rest
- Mix of compound and functional movements
- Include mobility and stability work

If equipment includes 'No Equipment' OR bodyweight only:
- Replace all barbell/dumbbell exercises with bodyweight progressions:
  Push: push-ups → archer push-ups → pike push-ups → handstand push-up progressions
  Pull: rows using a table/bar → pull-up negatives → pull-ups → archer pull-ups
  Legs: squats → Bulgarian split squats → pistol squat progressions
  Core: planks → hollow body → L-sits → dragon flags
  Power: jumping jacks → jump squats → explosive push-ups → clapping push-ups

Always tailor exercise selection, rep ranges, rest periods, and session structure specifically to the stated goal.

${splitInstructions}

Create a structured plan ONLY for the preferred training days. Each session should have 4–7 exercises appropriate for the session length and equipment. Lead with compound movements.

Return ONLY a valid JSON object (no markdown, no explanation) matching this EXACT schema:
{
  "planName": "string",
  "weeklySchedule": [
    {
      "day": "Monday",
      "focus": "Push – Chest & Shoulders",
      "workouts": [
        {
          "exercise": "string",
          "sets": 4,
          "reps": "8-10",
          "rest": "90s",
          "notes": "string",
          "muscleGroup": "string"
        }
      ]
    }
  ],
  "motivationalMessage": "string",
  "coachTip": "string"
}`;
  const text = await callClaude(profile.apiKey, [{ role:'user', content: prompt }], 4000);
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('Could not parse plan — please try again.');
  return JSON.parse(match[0]);
}

async function generateInsights(profile, logs, prs) {
  const recent = logs.slice(-20);
  const logSummary = recent.map(l =>
    `${l.date}: ${l.focus}, volume: ${Math.round(l.totalVolume||0)}kg, duration: ${l.duration}min`
  ).join('\n');
  const prSummary = Object.entries(prs).slice(0,6).map(([ex,pr]) =>
    `${ex}: ${pr.weight}kg × ${pr.reps}`
  ).join(', ') || 'None yet';

  const prompt = `You are a fitness coach analysing an athlete's training data.

ATHLETE: ${profile.name}, Goal: ${profile.goal}, Level: ${profile.fitnessLevel}

RECENT WORKOUTS (last ${recent.length}):
${logSummary}

PERSONAL RECORDS: ${prSummary}

Provide exactly 3 specific, actionable, motivating coaching insights based on this data.
Return ONLY a JSON array (no markdown): ["insight 1", "insight 2", "insight 3"]`;
  const text = await callClaude(profile.apiKey, [{ role:'user', content: prompt }], 800);
  const match = text.match(/\[[\s\S]*\]/);
  if (!match) return null;
  return JSON.parse(match[0]);
}

/* ═══════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════ */
function getTodayName() {
  const d = new Date().getDay(); // 0=Sun
  return DAYS[d === 0 ? 6 : d - 1];
}
function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'GOOD MORNING';
  if (h < 17) return 'GOOD AFTERNOON';
  return 'GOOD EVENING';
}
function getTodayISO() { return new Date().toISOString().split('T')[0]; }
function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'2-digit' });
}
function getDailyQuote() {
  const start = new Date(new Date().getFullYear(), 0, 0);
  const dayOfYear = Math.floor((Date.now() - start) / 86400000);
  return QUOTES[dayOfYear % QUOTES.length];
}
function getWeekStart(date = new Date()) {
  const d = new Date(date);
  const dow = d.getDay();
  const diff = dow === 0 ? 6 : dow - 1;
  d.setDate(d.getDate() - diff);
  d.setHours(0,0,0,0);
  return d.toISOString().split('T')[0];
}
function calcTotalVolume(exercises) {
  return exercises.reduce((tot, ex) =>
    tot + ex.sets.filter(s => s.done).reduce((s2, s) =>
      s2 + (parseFloat(s.weight)||0) * (parseFloat(s.reps)||0), 0
    ), 0
  );
}
function updateStreak(current, lastDate) {
  const today = getTodayISO();
  if (lastDate === today) return current;
  const yest = new Date(); yest.setDate(yest.getDate() - 1);
  const yesterdayISO = yest.toISOString().split('T')[0];
  if (lastDate === yesterdayISO) {
    const next = current.current + 1;
    return { current: next, longest: Math.max(current.longest, next), lastWorkoutDate: today };
  }
  return { current: 1, longest: Math.max(current.longest, 1), lastWorkoutDate: today };
}
function checkNewBadges(logs, prs, streak, existing) {
  const now = new Date().toISOString();
  const earned = {};
  const total = logs.reduce((s,l) => s + (l.totalVolume||0), 0);
  if (logs.length >= 1  && !existing.first_workout) earned.first_workout = { unlockedAt: now };
  if (streak.current >= 7 && !existing.week_streak)  earned.week_streak   = { unlockedAt: now };
  if (logs.length >= 10 && !existing.ten_workouts)   earned.ten_workouts  = { unlockedAt: now };
  if (Object.keys(prs).length > 0 && !existing.pr_crusher) earned.pr_crusher = { unlockedAt: now };
  if (total >= 10000    && !existing.volume_king)    earned.volume_king   = { unlockedAt: now };
  if (logs.length >= 20 && !existing.consistency)    earned.consistency   = { unlockedAt: now };
  return earned;
}

      color: ['#C8FF00','#FF6B6B','#4ECDC4','#FFE66D','#F5F5F0','#FF9F0A','#DDA0DD'][i % 7],

      delay: `${(i * 0.06).toFixed(2)}s`,
      dur: `${(1.4 + (i % 5) * 0.3).toFixed(1)}s`,
      tx: `${Math.round((i % 2 === 0 ? 1 : -1) * (20 + (i % 7) * 25))}px`,
      size: `${7 + (i % 6)}px`,
      round: i % 3 === 0,
    }))
  , []);
  return (
    <div className="fixed inset-0 pointer-events-none z-40 overflow-hidden">

        <div key={p.id}

            width: p.size, height: p.size,

            animation: `confettiFall ${p.dur} ${p.delay} ease-in forwards`,
            '--tx': p.tx,

        />

  );
}

function CoachCheckIn({ profile, workoutResult, nutritionLog, nutritionGoals, onDone }) {
  const ROUNDS = [
    {
      question: (name) => `Good work today, ${name}. How did that session feel overall?`,
      options: [
        { emoji:'💪', label:'Crushed it' },
        { emoji:'😤', label:'Solid session' },
        { emoji:'😐', label:'Average' },
        { emoji:'😩', label:'Tough one' },
      ]
    },
    {
      question: () => `Got it. What was the hardest part?`,
      options: [
        { emoji:'🏋️', label:'Weight felt heavy' },
        { emoji:'😮‍💨', label:'Low energy' },
        { emoji:'💥', label:'Specific exercise' },
        { emoji:'😴', label:'Motivation low' },
        { emoji:'✅', label:'Nothing — felt great' },
      ]
    },
    {
      question: () => `Any pain or discomfort during the session?`,
      options: [
        { emoji:'✅', label:'Felt fine' },
        { emoji:'⚠️', label:'Mild tightness' },
        { emoji:'🔴', label:'Some pain' },
        { emoji:'💀', label:'Something is wrong' },
      ]
    },
    {
      question: () => `How is your recovery since last session?`,
      options: [
        { emoji:'✅', label:'Fully recovered' },
        { emoji:'😴', label:'Still a bit sore' },
        { emoji:'🛌', label:'Very sore' },
        { emoji:'🤷', label:'First session' },
      ]
    },
  ];

  const [round, setRound] = useState(0);
  const [answers, setAnswers] = useState([]);
  const [visible, setVisible] = useState(true);
  const [coachResponse, setCoachResponse] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const handleSelect = async (option) => {
    const newAnswers = [...answers, option.label];
    setAnswers(newAnswers);
    if (round < ROUNDS.length - 1) {
      setVisible(false);
      setTimeout(() => { setRound(r => r + 1); setVisible(true); }, 350);
    } else {
      setLoading(true);
      try {
        const focus = workoutResult?.focus || 'training session';
        const volume = workoutResult?.totalVolume ? `${Math.round(workoutResult.totalVolume)}kg volume` : '';
        const duration = workoutResult?.duration ? `${workoutResult.duration} min` : '';
        const prompt = `Athlete: ${profile.name}, Goal: ${profile.goal}, Level: ${profile.fitnessLevel}.
Just completed: ${focus}, ${duration}${volume ? ', ' + volume : ''}.
Check-in answers:
- Overall feel: ${newAnswers[0]}
- Hardest part: ${newAnswers[1]}
- Pain/discomfort: ${newAnswers[2]}
- Recovery: ${newAnswers[3]}
Give a personalised post-workout coaching response in 3-4 sentences.
Be specific to their workout and answers. Give 1-2 actionable recommendations for next session.
Do not use bullet points. Write as a coach speaking directly to the athlete.`;
        const res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': profile.apiKey || '',
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 200,
            system: 'You are FORGE Coach, an expert personal trainer. Give concise, specific, motivating coaching advice. Never be generic. Always reference their specific workout data.',
            messages: [{ role: 'user', content: prompt }]
          })
        });
        const data = await res.json();
        const text = data?.content?.[0]?.text || null;
        setCoachResponse(text);
      } catch(e) {
        setError('Could not reach coach. Check your API key in Profile.');
      } finally {
        setLoading(false);
      }
    }
  };

  const currentRound = ROUNDS[round];

  return (
    <div style={{ position:'fixed', top:0, left:'50%', transform:'translateX(-50%)',
      width:'100%', maxWidth:430, height:'100%', zIndex:9999,
      background:'#0D0D0F', display:'flex', flexDirection:'column',
      overflowY:'auto' }}>

      {/* Header */}
      <div className="flex-shrink-0 px-5 pt-14 pb-6 flex items-center gap-3">
        <div className="w-12 h-12 rounded-full bg-[#C8FF00] flex items-center justify-center flex-shrink-0">
          <Zap size={22} color="#0D0D0F"/>
        </div>
        <div>
          <p className="text-[#8A8A8E] text-xs uppercase tracking-widest">AI Coach</p>
          <p className="font-display text-2xl text-[#F5F5F0]"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>POST-WORKOUT CHECK-IN</p>
        </div>
      </div>

      <div className="flex-1 px-5 flex flex-col">

        {/* Coach response state */}
        {(loading || coachResponse || error) ? (
          <div className="flex-1 flex flex-col justify-center">
            {loading && (
              <div className="bg-[#1A1A1C] rounded-3xl p-6 border border-[#252527]">
                <div className="flex items-center gap-3 mb-4">
                  <div className="w-8 h-8 rounded-full bg-[#C8FF00] flex items-center justify-center flex-shrink-0">
                    <Zap size={14} color="#0D0D0F"/>
                  </div>
                  <p className="text-[#8A8A8E] text-sm">Coach is thinking...</p>
                </div>
                <div className="flex gap-2">
                  {[0,1,2].map(i => (
                    <div key={i} className="w-2 h-2 rounded-full bg-[#C8FF00]"
                      style={{ animation:`dotPulse 1.2s ${i*0.2}s ease-in-out infinite`, opacity:0.4 }}/>
                  ))}
                </div>
              </div>
            )}
            {coachResponse && (
              <div>
                <div className="bg-[rgba(200,255,0,0.06)] rounded-3xl p-6 border border-[rgba(200,255,0,0.15)] mb-4">
                  <div className="flex items-center gap-2 mb-4">
                    <div className="w-8 h-8 rounded-full bg-[#C8FF00] flex items-center justify-center flex-shrink-0">
                      <Zap size={14} color="#0D0D0F"/>
                    </div>
                    <p className="text-[#C8FF00] text-xs font-display tracking-widest"
                      style={{ fontFamily:"'Bebas Neue',sans-serif" }}>COACH SAYS</p>
                  </div>
                  <p className="text-[#F5F5F0] text-sm leading-relaxed">{coachResponse}</p>
                </div>
                <div className="flex flex-wrap gap-2 mb-6">
                  {answers.map((a,i) => (
                    <span key={i} className="text-xs px-3 py-1.5 rounded-full bg-[#1A1A1C] text-[#8A8A8E] border border-[#252527]">
                      {a}

                  ))}
                </div>

            )}
            {error && (
              <div className="bg-[rgba(255,69,58,0.08)] rounded-2xl p-4 border border-[rgba(255,69,58,0.2)] mb-4">
                <p className="text-[#FF453A] text-sm">{error}</p>
              </div>
            )}
            {(coachResponse || error) && (
              <button onClick={() => onDone({ answers, coachResponse, focus: workoutResult?.focus })}

                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
                BACK TO HOME
              </button>
            )}
          </div>
        ) : (
          /* Question rounds */
          <div className="flex-1 flex flex-col justify-center"
            style={{ opacity: visible ? 1 : 0, transition:'opacity 0.3s ease' }}>

            {/* Progress dots */}
            <div className="flex gap-2 mb-8 justify-center">
              {ROUNDS.map((_,i) => (
                <div key={i} className="h-1.5 rounded-full transition-all duration-300"
                  style={{ width: i === round ? 24 : 8,
                    background: i < round ? '#C8FF00' : i === round ? '#C8FF00' : '#252527' }}/>
              ))}
            </div>

            {/* Coach question bubble */}
            <div className="bg-[#1A1A1C] rounded-3xl rounded-tl-sm p-5 border border-[#252527] mb-6">
              <div className="flex items-center gap-2 mb-3">
                <div className="w-7 h-7 rounded-full bg-[#C8FF00] flex items-center justify-center flex-shrink-0">
                  <Zap size={12} color="#0D0D0F"/>
                </div>
                <p className="text-[#C8FF00] text-xs font-display tracking-widest"
                  style={{ fontFamily:"'Bebas Neue',sans-serif" }}>FORGE COACH</p>
              </div>
              <p className="text-[#F5F5F0] text-lg leading-snug font-semibold">
                {currentRound.question(profile.name || 'Athlete')}
              </p>
            </div>

            {/* Answer options */}
            <div className="space-y-3">
              {currentRound.options.map((opt, i) => (
                <button key={i} onClick={() => handleSelect(opt)}
                  className="w-full flex items-center gap-4 px-5 py-4 rounded-2xl bg-[#1A1A1C] border border-[#252527] active:scale-95 active:border-[#C8FF00] transition-all text-left">
                  <span className="text-2xl flex-shrink-0">{opt.emoji}</span>
                  <span className="text-[#F5F5F0] font-semibold text-base">{opt.label}</span>

        )}
      </div>
    </div>
  );
}

            {allCheckins.map(([date, checkin]) => (
              checkin.workout && (
                <div key={date} className="bg-[#1A1A1C] rounded-2xl p-4 border border-[#252527]">
                  <p className="text-[#C8FF00] text-xs font-display tracking-widest mb-2"
                    style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
                    {new Date(date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}
                    {checkin.workout.focus ? ` · ${checkin.workout.focus}` : ''}
                  </p>
                  <p className="text-[#8A8A8E] text-sm leading-relaxed line-clamp-2">
                    {checkin.workout.coachResponse}
                  </p>
                  <div className="flex flex-wrap gap-1.5 mt-2">
                    {(checkin.workout.answers||[]).map((a,i) => (
                      <span key={i} className="text-[10px] px-2 py-0.5 rounded-full bg-[#252527] text-[#8A8A8E] border border-[#3A3A3C]">
                        {a}
                      </span>
                    ))}
                  </div>
                </div>
              )
            ))}
          </div>
        </div>
      )}

      {allCheckins.length === 0 && (
        <div className="px-5 mb-4">
          <div className="bg-[#1A1A1C] rounded-3xl p-8 border border-[#252527] flex flex-col items-center text-center">
            <div className="text-5xl mb-4">⚡</div>
            <p className="font-display text-2xl text-[#C8FF00] mb-2"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>NO CHECK-INS YET</p>
            <p className="text-[#8A8A8E] text-sm leading-relaxed">
              Complete a workout and your coach will check in with you automatically.
            </p>
          </div>
        </div>
      )}

      <BodyMap profile={profile}/>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   BODY MAP
═══════════════════════════════════════════════ */
function BodyMap({ profile }) {
  const [view, setView] = useState('front');
  const [soreness, setSoreness] = useState({});
  const [coachAdvice, setCoachAdvice] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const toggleSoreness = (muscleId) => {
    setSoreness(prev => {
      const current = prev[muscleId] || 0;
      const next = (current + 1) % 3;
      if (next === 0) {
        const updated = { ...prev };
        delete updated[muscleId];
        return updated;
      }
      return { ...prev, [muscleId]: next };
    });
  };

  const getFill = (muscleId) => {
    const level = soreness[muscleId] || 0;
    if (level === 1) return '#FF9F0A';
    if (level === 2) return '#FF453A';
    return '#2A2A2C';
  };

  const selectedMuscles = Object.entries(soreness).map(([id, level]) => ({
    name: id.replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase()),
    level: level === 1 ? 'mild' : 'significant',
    id,
  }));

  const handleGetAdvice = async () => {
    if (!profile.apiKey) {
      setError('Add your API key in Profile to get coach advice.');
      return;
    }
    setLoading(true);
    setError(null);
    setCoachAdvice(null);
    try {
      const muscleList = selectedMuscles
        .map(m => `${m.name} (${m.level})`)
        .join(', ');
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': profile.apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 300,
          system: 'You are FORGE Coach, a sports medicine and rehabilitation expert. Give practical, safe, actionable advice. Keep response under 120 words. Structure your response in exactly 3 short paragraphs labelled: LIKELY CAUSE: / REHAB PROTOCOL: / TRAIN OR REST:',
          messages: [{
            role: 'user',
            content: `Athlete: ${profile.name}, ${profile.fitnessLevel}, Goal: ${profile.goal}.
Sore or tight areas: ${muscleList}.
Provide: 1) Likely cause 2) 2-3 specific mobility or rehab exercises with sets and reps 3) Whether to train or rest today.`
          }]
        })
      });
      const data = await res.json();
      setCoachAdvice(data?.content?.[0]?.text || null);
    } catch(e) {
      setError('Could not reach coach. Check your API key.');
    } finally {
      setLoading(false);
    }
  };

  const FRONT_MUSCLES = [
    { id:'left-pec',        label:'Left Pec',        shape:'ellipse', cx:72,  cy:108, rx:16, ry:13 },
    { id:'right-pec',       label:'Right Pec',       shape:'ellipse', cx:108, cy:108, rx:16, ry:13 },
    { id:'left-shoulder',   label:'Left Shoulder',   shape:'ellipse', cx:52,  cy:95,  rx:11, ry:10 },
    { id:'right-shoulder',  label:'Right Shoulder',  shape:'ellipse', cx:128, cy:95,  rx:11, ry:10 },
    { id:'left-bicep',      label:'Left Bicep',      shape:'rect',    x:38,   y:108,  w:18,  h:30, r:8 },
    { id:'right-bicep',     label:'Right Bicep',     shape:'rect',    x:124,  y:108,  w:18,  h:30, r:8 },
    { id:'left-forearm',    label:'Left Forearm',    shape:'rect',    x:40,   y:141,  w:14,  h:26, r:6 },
    { id:'right-forearm',   label:'Right Forearm',   shape:'rect',    x:126,  y:141,  w:14,  h:26, r:6 },
    { id:'upper-abs',       label:'Upper Abs',       shape:'rect',    x:78,   y:124,  w:24,  h:16, r:4 },
    { id:'lower-abs',       label:'Lower Abs',       shape:'rect',    x:78,   y:143,  w:24,  h:16, r:4 },
    { id:'left-quad',       label:'Left Quad',       shape:'rect',    x:68,   y:200,  w:22,  h:52, r:9 },
    { id:'right-quad',      label:'Right Quad',      shape:'rect',    x:94,   y:200,  w:22,  h:52, r:9 },
    { id:'left-shin',       label:'Left Shin',       shape:'rect',    x:70,   y:256,  w:18,  h:38, r:6 },
    { id:'right-shin',      label:'Right Shin',      shape:'rect',    x:96,   y:256,  w:18,  h:38, r:6 },
    { id:'left-hip-flexor', label:'Left Hip Flexor', shape:'ellipse', cx:76,  cy:195, rx:10, ry:7  },
    { id:'right-hip-flexor',label:'Right Hip Flexor',shape:'ellipse', cx:104, cy:195, rx:10, ry:7  },
    { id:'neck',            label:'Neck',            shape:'rect',    x:84,   y:70,   w:12,  h:14, r:4 },
  ];

  const BACK_MUSCLES = [
    { id:'left-trap',       label:'Left Trap',       shape:'ellipse', cx:76,  cy:95,  rx:14, ry:11 },
    { id:'right-trap',      label:'Right Trap',      shape:'ellipse', cx:104, cy:95,  rx:14, ry:11 },
    { id:'left-rear-delt',  label:'Left Rear Delt',  shape:'ellipse', cx:54,  cy:97,  rx:11, ry:9  },
    { id:'right-rear-delt', label:'Right Rear Delt', shape:'ellipse', cx:126, cy:97,  rx:11, ry:9  },
    { id:'left-lat',        label:'Left Lat',        shape:'rect',    x:54,   y:108,  w:22,  h:44, r:8 },
    { id:'right-lat',       label:'Right Lat',       shape:'rect',    x:104,  y:108,  w:22,  h:44, r:8 },
    { id:'lower-back',      label:'Lower Back',      shape:'rect',    x:76,   y:148,  w:28,  h:22, r:6 },
    { id:'left-glute',      label:'Left Glute',      shape:'ellipse', cx:78,  cy:192, rx:16, ry:14 },
    { id:'right-glute',     label:'Right Glute',     shape:'ellipse', cx:102, cy:192, rx:16, ry:14 },
    { id:'left-hamstring',  label:'Left Hamstring',  shape:'rect',    x:66,   y:206,  w:22,  h:48, r:9 },
    { id:'right-hamstring', label:'Right Hamstring', shape:'rect',    x:92,   y:206,  w:22,  h:48, r:9 },
    { id:'left-calf',       label:'Left Calf',       shape:'rect',    x:68,   y:258,  w:18,  h:36, r:7 },
    { id:'right-calf',      label:'Right Calf',      shape:'rect',    x:94,   y:258,  w:18,  h:36, r:7 },
    { id:'left-rhomboid',   label:'Left Rhomboid',   shape:'rect',    x:72,   y:110,  w:14,  h:18, r:4 },
    { id:'right-rhomboid',  label:'Right Rhomboid',  shape:'rect',    x:94,   y:110,  w:14,  h:18, r:4 },
  ];

  const muscles = view === 'front' ? FRONT_MUSCLES : BACK_MUSCLES;

  const renderShape = (m) => {
    const fill = getFill(m.id);
    const style = { cursor:'pointer', transition:'fill 0.2s', opacity: soreness[m.id] ? 1 : 0.7 };
    const onClick = () => toggleSoreness(m.id);
    if (m.shape === 'ellipse') {
      return <ellipse key={m.id} cx={m.cx} cy={m.cy} rx={m.rx} ry={m.ry}
        fill={fill} style={style} onClick={onClick}/>;
    }
    return <rect key={m.id} x={m.x} y={m.y} width={m.w} height={m.h} rx={m.r}
      fill={fill} style={style} onClick={onClick}/>;
  };

  return (
    <div className="px-5 mb-6">
      <p className="text-[#8A8A8E] text-xs uppercase tracking-widest mb-3">Body Map</p>
      <div className="bg-[#1A1A1C] rounded-3xl border border-[#252527] overflow-hidden">

        {/* Front / Back toggle */}
        <div className="flex items-center justify-between px-5 pt-5 pb-3">
          <p className="font-display text-lg text-[#F5F5F0]"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>WHERE ARE YOU SORE?</p>
          <div className="flex gap-2 bg-[#252527] p-1 rounded-xl">

        {/* Tap instruction */}
        <p className="text-[#8A8A8E] text-xs text-center mb-2">
          Tap once = mild · Tap twice = significant · Tap again = clear
        </p>

        {/* SVG Body */}
        <div className="flex justify-center py-2 px-4"
          style={{ background:'#0D0D0F', margin:'0 16px', borderRadius:12 }}>
          <svg viewBox="0 0 180 310" width="160" height="280"
            xmlns="http://www.w3.org/2000/svg" style={{ display:'block' }}>
            {/* Body outline */}
            <ellipse cx="90" cy="38" rx="20" ry="22" fill="#3A3A3C"/>
            <rect x="70" y="58" width="12" height="14" rx="4" fill="#3A3A3C"/>
            <rect x="58" y="72" width="64" height="82" rx="10" fill="#252527"/>
            <rect x="36" y="76" width="22" height="10" rx="5" fill="#252527"/>
            <rect x="122" y="76" width="22" height="10" rx="5" fill="#252527"/>
            <rect x="60" y="154" width="60" height="24" rx="8" fill="#252527"/>
            <rect x="60" y="296" width="22" height="10" rx="5" fill="#3A3A3C"/>
            <rect x="98" y="296" width="22" height="10" rx="5" fill="#3A3A3C"/>
            {muscles.map(renderShape)}
          </svg>
        </div>

        {/* Legend */}
        <div className="flex gap-4 justify-center py-3">
          {[
            { color:'#2A2A2C', border:'1px solid #3A3A3C', label:'None' },
            { color:'#FF9F0A', label:'Mild' },
            { color:'#FF453A', label:'Significant' },
          ].map(l => (
            <div key={l.label} className="flex items-center gap-1.5">
              <div style={{ width:10, height:10, borderRadius:2,
                background:l.color, border:l.border||'none' }}/>
              <span className="text-[#8A8A8E] text-xs">{l.label}</span>
            </div>
          ))}
        </div>

        {/* Selected muscles list */}
        {selectedMuscles.length > 0 && (
          <div className="px-5 pb-3 flex flex-wrap gap-2">
            {selectedMuscles.map(m => (
              <span key={m.id}
                className="text-xs px-3 py-1.5 rounded-full font-semibold"
                style={{
                  background: m.level==='mild' ? 'rgba(255,159,10,0.15)' : 'rgba(255,69,58,0.15)',
                  color: m.level==='mild' ? '#FF9F0A' : '#FF453A',
                }}>
                {m.name} · {m.level}
              </span>
            ))}
          </div>
        )}

        {/* Get advice button */}
        <div className="px-5 pb-5">
          <button
            onClick={handleGetAdvice}
            disabled={selectedMuscles.length === 0 || loading}
            className={`w-full py-4 rounded-2xl font-display text-xl tracking-wider transition-all active:scale-95
              ${selectedMuscles.length > 0 && !loading
                ? 'bg-[#C8FF00] text-[#0D0D0F]'
                : 'bg-[#252527] text-[#8A8A8E]'}`}
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
            {loading ? 'GETTING ADVICE...' : '⚡ GET COACH ADVICE'}
          </button>
        </div>

        {/* Loading dots */}
        {loading && (
          <div className="px-5 pb-5 flex gap-2 justify-center">
            {[0,1,2].map(i => (
              <div key={i} className="w-2 h-2 rounded-full bg-[#C8FF00]"
                style={{ animation:`dotPulse 1.2s ${i*0.2}s ease-in-out infinite`, opacity:0.4 }}/>
            ))}
          </div>
        )}

        {/* Error */}
        {error && (
          <div className="mx-5 mb-5 bg-[rgba(255,69,58,0.08)] rounded-2xl p-4 border border-[rgba(255,69,58,0.2)]">
            <p className="text-[#FF453A] text-sm">{error}</p>
          </div>
        )}

        {/* Coach advice */}
        {coachAdvice && (
          <div className="mx-5 mb-5">
            {['LIKELY CAUSE','REHAB PROTOCOL','TRAIN OR REST'].map((section, i) => {
              const regex = new RegExp(`${section}:([\\s\\S]*?)(?=LIKELY CAUSE:|REHAB PROTOCOL:|TRAIN OR REST:|$)`, 'i');
              const match = coachAdvice.match(regex);
              const content = match ? match[1].trim() : null;
              if (!content) return null;
              return (
                <div key={i} className="bg-[#252527] rounded-2xl p-4 border border-[#3A3A3C] mb-2">
                  <p className="text-[#C8FF00] text-[10px] font-display tracking-widest mb-1.5"
                    style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{section}</p>
                  <p className="text-[#F5F5F0] text-sm leading-relaxed">{content}</p>
                </div>
              );
            })}
            {!coachAdvice.match(/LIKELY CAUSE:/i) && (
              <div className="bg-[#252527] rounded-2xl p-4 border border-[#3A3A3C]">
                <p className="text-[#C8FF00] text-[10px] font-display tracking-widest mb-1.5"
                  style={{ fontFamily:"'Bebas Neue',sans-serif" }}>COACH ADVICE</p>
                <p className="text-[#F5F5F0] text-sm leading-relaxed">{coachAdvice}</p>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

function LoadingPlan({ error }) {
  const msgs = [
    'ANALYSING YOUR GOALS…',
    'BUILDING YOUR PLAN…',
    'CALCULATING YOUR GAINS…',
    'OPTIMISING EXERCISES…',
    'ALMOST READY…',
  ];
  const [idx, setIdx] = useState(0);
  useEffect(() => {
    if (error) return;
    const t = setInterval(() => setIdx(i => (i + 1) % msgs.length), 1800);
    return () => clearInterval(t);
  }, [error]);

  return (
    <div className="fixed inset-0 bg-[#0D0D0F] z-50 flex flex-col items-center justify-center px-8">
      {error ? (
        <>
          <div className="text-5xl mb-4">⚠️</div>
          <p className="font-display text-2xl text-[#FF453A] text-center mb-3">PLAN GENERATION FAILED</p>
          <p className="text-[#8A8A8E] text-sm text-center leading-relaxed">{error}</p>
          <p className="text-[#8A8A8E] text-xs text-center mt-4">Check your API key in Profile and try again.</p>
        </>
      ) : (
        <>
          <div className="relative mb-10">
            <div className="w-28 h-28 rounded-3xl bg-[#1A1A1C] flex items-center justify-center animate-pulse-ring">
              <span className="font-display text-6xl text-[#C8FF00]" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>F</span>
            </div>
            <div className="absolute inset-0 rounded-3xl border-2 border-[#C8FF00] opacity-20 animate-ping"/>
          </div>
          <p key={idx} className="font-display text-2xl text-[#C8FF00] tracking-wider animate-fade-slide"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
            {msgs[idx]}
          </p>
          <p className="text-[#8A8A8E] text-sm mt-3">Claude AI is crafting your programme</p>
          <div className="mt-10 flex gap-2">
            {[0,1,2,3,4].map(i => (
              <div key={i} className="w-2 h-2 rounded-full bg-[#C8FF00]"

        </>
      )}
    </div>
  );
}

   PROFILE / ONBOARDING SCREEN
