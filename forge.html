/* ═══════════════════════════════════════════════
   PLAN SCREEN
═══════════════════════════════════════════════ */
function PlanScreen({ plan, profile, onRegenerate, onUpdatePlan }) {
  const [selDay, setSelDay]       = useState(getTodayName());
  const [replaceSheet, setReplaceSheet] = useState(null); // { dayIdx, exIdx, workout }
  const [replaceQuery, setReplaceQuery] = useState('');
  const [alternatives, setAlternatives] = useState(null);
  const [loadingAlt, setLoadingAlt]     = useState(false);
  const today = getTodayName();

  const findAlternatives = async () => {
    if (!replaceSheet) return;
    setLoadingAlt(true);
    setAlternatives(null);
    try {
      const { workout } = replaceSheet;
      const hint = replaceQuery.trim() ? ` Preference: ${replaceQuery.trim()}.` : '';
      const prompt = `Suggest 3 alternative exercises to replace '${workout.exercise}' for someone with goal: ${profile.goal}, equipment: ${(profile.equipment||[]).join(', ')}, level: ${profile.fitnessLevel}.${hint} The alternative must be a straight set exercise — no supersets. Return ONLY a JSON array of 3 objects: [{"name":"string","sets":3,"reps":"8-10","rest":"90s","notes":"string","muscleGroup":"string"}]`;
      const text = await callClaude([{ role:'user', content: prompt }], 600);
      const match = text.match(/\[[\s\S]*\]/);
      if (match) setAlternatives(JSON.parse(match[0]));
    } catch (e) {
      setAlternatives([]);
    } finally {
      setLoadingAlt(false);
    }
  };

  const applyReplacement = (alt) => {
    if (!replaceSheet || !onUpdatePlan) return;
    const { dayIdx, exIdx } = replaceSheet;
    const updated = { ...plan };
    updated.weeklySchedule = plan.weeklySchedule.map((day, di) =>
      di !== dayIdx ? day : {
        ...day,
        workouts: day.workouts.map((w, wi) =>
          wi !== exIdx ? w : { ...w, exercise: alt.name, sets: alt.sets, reps: alt.reps, rest: alt.rest, notes: alt.notes, muscleGroup: alt.muscleGroup }
        )
      }
    );
    onUpdatePlan(updated);
    setReplaceSheet(null);
    setReplaceQuery('');
    setAlternatives(null);
  };

  if (!plan) {
    return (
      <div className="h-full flex flex-col items-center justify-center px-5 pb-24 text-center">
        <div className="text-6xl mb-4">📋</div>
        <h2 className="font-display text-3xl text-[#F5F5F0] mb-2"
          style={{ fontFamily:"'Bebas Neue',sans-serif" }}>NO PLAN YET</h2>
        <p className="text-[#8A8A8E]">Complete your profile to generate an AI-powered training plan.</p>
      </div>
    );
  }

  const scheduledDays = plan.weeklySchedule.map(s => s.day);
  const selSchedule   = plan.weeklySchedule.find(s => s.day === selDay);
  const selDayIdx     = plan.weeklySchedule.findIndex(s => s.day === selDay);

  return (
    <div className="h-full overflow-y-auto pb-28">
      <div className="px-5 pt-14 pb-4">
        <div className="flex items-start justify-between">
          <div className="flex-1 min-w-0 pr-2">
            <h1 className="font-display text-4xl text-[#F5F5F0] leading-tight"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{plan.planName || 'MY PLAN'}</h1>
            <p className="text-[#8A8A8E] text-xs mt-0.5">
              {plan.weeklySchedule.length} training days · {profile.sessionLength} min sessions
            </p>
          </div>
          <button onClick={onRegenerate}
            className="w-10 h-10 rounded-xl bg-[#1A1A1C] flex items-center justify-center active:scale-95 transition-all border border-[#252527] flex-shrink-0">
            <RefreshCw size={17} color="#C8FF00"/>
          </button>
        </div>
      </div>

      <div className="px-5 mb-4">
        <div className="flex gap-2 overflow-x-auto pb-1" style={{ scrollbarWidth:'none' }}>
          {DAYS.map(day => {
            const has = scheduledDays.includes(day);
            const sel = selDay === day;
            const isToday = day === today;
            return (
              <button key={day} onClick={() => setSelDay(day)}
                className={`flex-shrink-0 px-3 py-2 rounded-xl text-xs font-display tracking-wider transition-all active:scale-95 relative
                  ${sel ? 'bg-[#C8FF00] text-[#0D0D0F]'
                        : has ? 'bg-[#1A1A1C] text-[#F5F5F0] border border-[#3A3A3C]'
                              : 'bg-[#0D0D0F] text-[#3A3A3C] border border-[#1A1A1C]'}`}
                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
                {day.slice(0,3).toUpperCase()}
                {isToday && (
                  <span className={`absolute -top-1 -right-1 w-2 h-2 rounded-full ${sel ? 'bg-[#0D0D0F]' : 'bg-[#C8FF00]'}`}/>
                )}
              </button>
            );
          })}
        </div>
      </div>

      <div className="px-5">
        {selSchedule ? (
          <div className="animate-fade-slide">
            <div className="mb-4">
              <h2 className="font-display text-3xl text-[#F5F5F0]"
                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{selSchedule.focus}</h2>
              <p className="text-[#8A8A8E] text-sm">{selSchedule.workouts.length} exercises · ~{profile.sessionLength} min</p>
            </div>
            <div className="space-y-3">
              {selSchedule.workouts.map((w,i) => (
                <div key={i} className="bg-[#1A1A1C] rounded-2xl p-4 border border-[#252527]">
                  <div className="flex items-start justify-between">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 mb-1.5">
                        <span className="text-[#8A8A8E] text-xs font-display w-5 flex-shrink-0"
                          style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{i+1}</span>
                        <h3 className="font-semibold text-[#F5F5F0] truncate">{w.exercise}</h3>
                      </div>
                      <div className="pl-7"><MuscleTag group={w.muscleGroup}/></div>
                    </div>
                    <div className="flex items-center gap-2 ml-3 flex-shrink-0">
                      <div className="text-right">
                        <p className="font-display text-xl text-[#C8FF00]"
                          style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{w.sets}×{w.reps}</p>
                        <p className="text-[#8A8A8E] text-xs">{w.rest} rest</p>
                      </div>
                      <button
                        onClick={() => { setReplaceSheet({ dayIdx: selDayIdx, exIdx: i, workout: w }); setReplaceQuery(''); setAlternatives(null); }}
                        className="w-9 h-9 rounded-xl bg-[#252527] flex items-center justify-center active:scale-90 border border-[#3A3A3C]">
                        <span style={{ fontSize:15 }}>🔄</span>
                      </button>
                    </div>
                  </div>
                  {w.notes && (
                    <p className="text-[#8A8A8E] text-xs mt-2 pl-7 italic leading-relaxed">"{w.notes}"</p>
                  )}
                </div>
              ))}
            </div>
          </div>
        ) : (
          <div className="text-center py-12">
            <div className="text-4xl mb-3">🛌</div>
            <p className="font-display text-2xl text-[#F5F5F0] mb-2"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>REST DAY</p>
            <p className="text-[#8A8A8E] text-sm">Recovery is part of the programme.</p>
          </div>
        )}
      </div>

      {plan.motivationalMessage && (
        <div className="px-5 mt-6 mb-2">
          <div className="bg-[rgba(200,255,0,0.05)] rounded-2xl p-5 border border-[rgba(200,255,0,0.12)]">
            <p className="text-[#C8FF00] text-[10px] font-display tracking-widest mb-2"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>FROM YOUR COACH</p>
            <p className="text-[#F5F5F0] text-sm leading-relaxed">{plan.motivationalMessage}</p>
          </div>
        </div>
      )}

      {/* ── Replace Exercise Sheet ─────────── */}
      {replaceSheet && (
        <div className="fixed inset-0 z-50 flex flex-col justify-end"
          style={{ maxWidth:430, left:'50%', transform:'translateX(-50%)' }}>
          <div className="flex-1 bg-black/60" onClick={() => setReplaceSheet(null)}/>
          <div className="bg-[#1A1A1C] rounded-t-3xl border-t border-[#3A3A3C] animate-slide-up"
            style={{ maxHeight:'80vh', overflowY:'auto', paddingBottom:'max(1.5rem,env(safe-area-inset-bottom))' }}>
            <div className="flex justify-center pt-3 pb-1">
              <div className="w-10 h-1 rounded-full bg-[#3A3A3C]"/>
            </div>
            <div className="px-5 pt-2 pb-4">
              <h3 className="font-display text-2xl text-[#F5F5F0] mb-1"
                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>REPLACE EXERCISE</h3>
              <p className="text-[#8A8A8E] text-sm mb-4">{replaceSheet.workout.exercise}</p>

              <input
                type="text"
                value={replaceQuery}
                onChange={e => setReplaceQuery(e.target.value)}
                placeholder="e.g. cable fly, dumbbell only, harder variation"
                className="w-full bg-[#252527] text-[#F5F5F0] rounded-xl px-4 py-3 text-sm border border-[#3A3A3C] focus:border-[#C8FF00] outline-none mb-3"
              />

              <button onClick={findAlternatives} disabled={loadingAlt}
                className="w-full py-3.5 rounded-2xl bg-[#C8FF00] text-[#0D0D0F] font-display text-lg tracking-wider active:scale-95 transition-all disabled:opacity-60 mb-4"
                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
                {loadingAlt ? 'FINDING ALTERNATIVES…' : 'FIND ALTERNATIVE'}
              </button>

              {loadingAlt && (
                <div className="flex justify-center gap-1.5 py-4">
                  {[0,1,2].map(i => (
                    <div key={i} className="w-2 h-2 rounded-full bg-[#C8FF00]"
                      style={{ animation:`dotPulse 1.2s ease-in-out ${i*0.2}s infinite` }}/>
                  ))}
                </div>
              )}

              {alternatives !== null && !loadingAlt && (
                alternatives.length === 0 ? (
                  <p className="text-[#8A8A8E] text-sm text-center py-4">Could not load alternatives. Try again.</p>
                ) : (
                  <div className="space-y-3">
                    {alternatives.map((alt, i) => (
                      <button key={i} onClick={() => applyReplacement(alt)}
                        className="w-full bg-[#252527] rounded-2xl p-4 border border-[#3A3A3C] text-left active:scale-95 transition-all active:border-[#C8FF00]">
                        <div className="flex items-start justify-between">
                          <div className="flex-1 min-w-0">
                            <p className="font-semibold text-[#F5F5F0] truncate">{alt.name}</p>
                            <MuscleTag group={alt.muscleGroup}/>
                          </div>
                          <div className="text-right ml-3 flex-shrink-0">
                            <p className="font-display text-lg text-[#C8FF00]"
                              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{alt.sets}×{alt.reps}</p>
                            <p className="text-[#8A8A8E] text-xs">{alt.rest} rest</p>
                          </div>
                        </div>
                        {alt.notes && <p className="text-[#8A8A8E] text-xs mt-1.5 italic">"{alt.notes}"</p>}
                      </button>
                    ))}
                  </div>
                )
              )}
            </div>
          </div>
        </div>
      )}

      {/* Regenerate plan button */}
      <div className="px-5 pt-2 pb-4">
        <button onClick={onRegenerate}
          className="w-full py-4 rounded-2xl text-[#C8FF00] font-display text-xl tracking-wider active:scale-95 transition-all border border-[rgba(200,255,0,0.25)]"
          style={{ fontFamily:"'Bebas Neue',sans-serif", background:'rgba(200,255,0,0.07)' }}>
          REGENERATE PLAN
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   LOG SCREEN — Full-screen workout mode
═══════════════════════════════════════════════ */
function LogScreen({ planDay, onComplete, onClose, logs, prs }) {
  const [exLogs, setExLogs] = useState(() =>
    (planDay?.workouts || []).map(w => ({
      ...w,
      sets: Array.from({ length: w.sets }, () => ({
        reps: parseInt(w.reps) || 8,
        weight: 0,
        done: false
      })),
      note: ''
    }))
  );
  const [currentExIdx, setCurrentExIdx] = useState(0);
  const [restTimer, setRestTimer]       = useState(null); // { seconds, total }
  const [elapsed, setElapsed]           = useState(0);    // seconds
  const [showEndSheet, setShowEndSheet] = useState(false);
  const [showNote, setShowNote]         = useState(false);
  const startTime = useRef(Date.now());

  /* HH:MM:SS live timer */
  useEffect(() => {
    const t = setInterval(() => setElapsed(Math.round((Date.now() - startTime.current) / 1000)), 1000);
    return () => clearInterval(t);
  }, []);

  /* Rest timer countdown */
  useEffect(() => {
    if (!restTimer || restTimer.seconds <= 0) {
      if (restTimer?.seconds === 0) setRestTimer(null);
      return;
    }
    const t = setTimeout(() => setRestTimer(r => r ? { ...r, seconds: r.seconds - 1 } : null), 1000);
    return () => clearTimeout(t);
  }, [restTimer]);

  const fmtElapsed = (s) => {
    const h = Math.floor(s / 3600);
    const m = Math.floor((s % 3600) / 60);
    const sec = s % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  };

  /* Find best set from previous session with same focus */
  const getPrevData = useCallback((exName) => {
    if (!logs || logs.length === 0) return null;
    const prev = [...logs]
      .filter(l => l.focus === planDay.focus)
      .sort((a, b) => b.date.localeCompare(a.date))[0];
    if (!prev) return null;
    const prevEx = prev.exercises?.find(e => e.exercise === exName);
    if (!prevEx) return null;
    const done = prevEx.sets?.filter(s => s.done && s.weight && s.reps);
    if (!done?.length) return null;
    const best = done.reduce((b, s) => parseFloat(s.weight) > parseFloat(b.weight) ? s : b, done[0]);
    return `${best.weight}kg × ${best.reps}`;
  }, [logs, planDay.focus]);

  const stepWeight = (si, delta) => {
    setExLogs(prev => prev.map((ex, i) => i !== currentExIdx ? ex : {
      ...ex,
      sets: ex.sets.map((s, j) => j !== si ? s : {
        ...s, weight: Math.max(0, Math.round((parseFloat(s.weight || 0) + delta) * 10) / 10)
      })
    }));
  };

  const stepReps = (si, delta) => {
    setExLogs(prev => prev.map((ex, i) => i !== currentExIdx ? ex : {
      ...ex,
      sets: ex.sets.map((s, j) => j !== si ? s : {
        ...s, reps: Math.max(1, (parseInt(s.reps) || 0) + delta)
      })
    }));
  };

  const completeSet = (si) => {
    const ex = exLogs[currentExIdx];
    if (ex.sets[si].done) return;
    setExLogs(prev => prev.map((e, i) => i !== currentExIdx ? e : {
      ...e, sets: e.sets.map((s, j) => j !== si ? s : { ...s, done: true })
    }));
    const secs = parseInt(ex.rest) || 60;
    setRestTimer({ seconds: secs, total: secs });
  };

  const handleFinish = () => {
    const duration = Math.max(1, Math.round((Date.now() - startTime.current) / 60000));
    const totalVolume = calcTotalVolume(exLogs);
    onComplete({ day: planDay.day, focus: planDay.focus, duration, exercises: exLogs, totalVolume });
  };

  const goToEx = (idx) => {
    setCurrentExIdx(idx);
    setShowNote(false);
  };

  const cur        = exLogs[currentExIdx];
  const isFirst    = currentExIdx === 0;
  const isLast     = currentExIdx === exLogs.length - 1;
  const nextEx     = exLogs[currentExIdx + 1];
  const completedSets = exLogs.reduce((n, ex) => n + ex.sets.filter(s => s.done).length, 0);
  const totalSets     = exLogs.reduce((n, ex) => n + ex.sets.length, 0);
  const prevData   = getPrevData(cur.exercise);

  return (
    <div style={{ position:'fixed', top:0, right:0, bottom:0, left:0, zIndex:9999, background:'#0D0D0F', display:'flex', flexDirection:'column' }}>

      {/* ── Header ───────────────────────────── */}
      <div className="flex-shrink-0 pt-14 px-5 pb-4 bg-[#0D0D0F]">
        <div className="flex items-center justify-between mb-3">
          <button onClick={() => setShowEndSheet(true)}
            className="w-10 h-10 rounded-xl bg-[#1A1A1C] flex items-center justify-center active:scale-90 border border-[#252527]">
            <X size={18} color="#8A8A8E"/>
          </button>
          <div className="text-center flex-1 mx-3">
            <p className="text-[#8A8A8E] text-[10px] uppercase tracking-widest leading-none">{planDay.day}</p>
            <p className="font-display text-xl text-[#F5F5F0] leading-tight truncate"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{planDay.focus}</p>
          </div>
          <div className="text-right">
            <p className="font-display text-2xl text-[#C8FF00] leading-none tabular-nums"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{fmtElapsed(elapsed)}</p>
            <p className="text-[#8A8A8E] text-[10px] uppercase tracking-wider">{completedSets}/{totalSets} sets</p>
          </div>
        </div>
        <div className="h-1 bg-[#1A1A1C] rounded-full overflow-hidden">
          <div className="h-full bg-[#C8FF00] rounded-full transition-all duration-500"
            style={{ width:`${totalSets > 0 ? (completedSets / totalSets) * 100 : 0}%` }}/>
        </div>
      </div>

      {/* ── Scrollable content ───────────────── */}
      <div className="flex-1 overflow-y-auto px-5 pb-4">

        {/* Exercise label */}
        <div className="mb-5">
          <p className="text-[#8A8A8E] text-xs uppercase tracking-widest mb-0.5">
            EXERCISE {currentExIdx + 1} OF {exLogs.length}
          </p>
          <h2 className="font-display leading-none mb-2"
            style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:36 }}>
            <span className="text-[#F5F5F0]">{cur.exercise}</span>
          </h2>
          <div className="flex items-center gap-2 flex-wrap">
            <MuscleTag group={cur.muscleGroup}/>
            <span className="text-[#C8FF00] text-xs font-semibold bg-[rgba(200,255,0,0.08)] px-2 py-0.5 rounded-lg">
              {cur.sets.length} × {cur.reps}
            </span>
            {cur.rest && (
              <span className="text-[#8A8A8E] text-xs">{cur.rest} rest</span>
            )}
          </div>
          {prevData && (
            <p className="text-[#8A8A8E] text-xs mt-2">
              Last time: <span className="text-[#F5F5F0] font-medium">{prevData}</span>
            </p>
          )}
          {cur.notes && (
            <p className="text-[#FF9F0A] text-xs mt-1.5 italic">💡 {cur.notes}</p>
          )}
        </div>

        {/* Set rows */}
        <div className="mb-4">
          <div className="flex items-center px-1 mb-2">
            <span className="w-8 text-[#8A8A8E] text-xs text-center">SET</span>
            <span className="flex-1 text-[#8A8A8E] text-xs text-center">WEIGHT (KG)</span>
            <span className="flex-1 text-[#8A8A8E] text-xs text-center">REPS</span>
            <span className="w-14 text-[#8A8A8E] text-xs text-center">✓</span>
          </div>

          <div className="space-y-2">
            {cur.sets.map((s, si) => (
              <div key={si}
                className={`flex items-center gap-2 rounded-2xl px-3 py-2 border transition-all
                  ${s.done
                    ? 'bg-[rgba(200,255,0,0.04)] border-[rgba(200,255,0,0.15)] opacity-60'
                    : 'bg-[#1A1A1C] border-[#252527]'}`}>

                <span className={`w-6 text-center font-display text-xl leading-none flex-shrink-0
                  ${s.done ? 'text-[#C8FF00]' : 'text-[#8A8A8E]'}`}
                  style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{si + 1}</span>

                {/* Weight stepper */}
                <div className="flex-1 flex items-center justify-center gap-1">
                  <button onPointerDown={e => { e.preventDefault(); !s.done && stepWeight(si, -2.5); }}
                    className="w-9 h-12 rounded-xl bg-[#252527] flex items-center justify-center text-[#8A8A8E] text-lg font-bold active:bg-[#3A3A3C] disabled:opacity-30 select-none"
                    disabled={s.done}>−</button>
                  <span className={`w-12 text-center font-display text-2xl leading-none select-none
                    ${s.done ? 'text-[#8A8A8E]' : 'text-[#F5F5F0]'}`}
                    style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{s.weight}</span>
                  <button onPointerDown={e => { e.preventDefault(); !s.done && stepWeight(si, 2.5); }}
                    className="w-9 h-12 rounded-xl bg-[#252527] flex items-center justify-center text-[#C8FF00] text-lg font-bold active:bg-[#3A3A3C] disabled:opacity-30 select-none"
                    disabled={s.done}>+</button>
                </div>

                {/* Reps stepper */}
                <div className="flex-1 flex items-center justify-center gap-1">
                  <button onPointerDown={e => { e.preventDefault(); !s.done && stepReps(si, -1); }}
                    className="w-9 h-12 rounded-xl bg-[#252527] flex items-center justify-center text-[#8A8A8E] text-lg font-bold active:bg-[#3A3A3C] disabled:opacity-30 select-none"
                    disabled={s.done}>−</button>
                  <span className={`w-10 text-center font-display text-2xl leading-none select-none
                    ${s.done ? 'text-[#8A8A8E]' : 'text-[#F5F5F0]'}`}
                    style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{s.reps}</span>
                  <button onPointerDown={e => { e.preventDefault(); !s.done && stepReps(si, 1); }}
                    className="w-9 h-12 rounded-xl bg-[#252527] flex items-center justify-center text-[#C8FF00] text-lg font-bold active:bg-[#3A3A3C] disabled:opacity-30 select-none"
                    disabled={s.done}>+</button>
                </div>

                {/* Complete button */}
                <button onPointerDown={e => { e.preventDefault(); completeSet(si); }}
                  disabled={s.done}
                  className={`w-14 h-14 rounded-xl flex items-center justify-center flex-shrink-0 transition-all active:scale-90
                    ${s.done
                      ? 'bg-[rgba(200,255,0,0.15)] border border-[rgba(200,255,0,0.4)]'
                      : 'bg-[#252527] border border-[#3A3A3C]'}`}>
                  <Check size={22} color={s.done ? '#C8FF00' : '#555'}/>
                </button>
              </div>
            ))}
          </div>
        </div>

        {/* Exercise note */}
        {showNote ? (
          <textarea
            value={cur.note || ''}
            onChange={e => setExLogs(prev => prev.map((ex, i) =>
              i !== currentExIdx ? ex : { ...ex, note: e.target.value }
            ))}
            placeholder="Notes for this exercise..."
            autoFocus
            className="w-full bg-[#1A1A1C] text-[#F5F5F0] rounded-xl px-4 py-3 text-sm border border-[#3A3A3C] focus:border-[#C8FF00] outline-none resize-none h-16 mb-2"
          />
        ) : (
          <button onClick={() => setShowNote(true)}
            className="text-[#8A8A8E] text-xs underline underline-offset-2 active:scale-95 mb-2">
            + Add note
          </button>
        )}
      </div>

      {/* ── Navigation buttons ──────────────── */}
      <div className="flex-shrink-0 px-5 pt-3 bg-[#0D0D0F] border-t border-[#1A1A1C]"
        style={{ paddingBottom: restTimer ? '6rem' : 'max(1.5rem, env(safe-area-inset-bottom))' }}>
        <div className="flex gap-3">
          {!isFirst && (
            <button onClick={() => goToEx(currentExIdx - 1)}
              className="flex-1 py-4 rounded-2xl bg-[#1A1A1C] text-[#F5F5F0] font-display text-lg tracking-wider active:scale-95 transition-all border border-[#252527]"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
              ← PREV
            </button>
          )}
          {isLast ? (
            <button onClick={handleFinish}
              className="flex-1 py-4 rounded-2xl bg-[#C8FF00] text-[#0D0D0F] font-display text-xl tracking-wider active:scale-95 transition-all"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
              FINISH WORKOUT
            </button>
          ) : (
            <button onClick={() => goToEx(currentExIdx + 1)}
              className="flex-1 py-4 rounded-2xl bg-[#C8FF00] text-[#0D0D0F] font-display text-xl tracking-wider active:scale-95 transition-all"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
              {nextEx ? `NEXT: ${nextEx.exercise.split(' ').slice(0,2).join(' ')} →` : 'NEXT →'}
            </button>
          )}
        </div>
      </div>

      {/* ── Rest timer pill bar ──────────────── */}
      {restTimer && restTimer.seconds > 0 && (
        <div className="absolute bottom-0 left-0 right-0 z-30 pointer-events-none"
          style={{ paddingBottom:'max(1.5rem, env(safe-area-inset-bottom))' }}>
          <div className="mx-5 mb-0 bg-[#1A1A1C] rounded-2xl px-5 py-4 border border-[#3A3A3C] shadow-2xl pointer-events-auto">
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-2">
                <div className="w-2 h-2 rounded-full bg-[#C8FF00] animate-pulse"/>
                <span className="font-display text-lg text-[#F5F5F0] tracking-wider"
                  style={{ fontFamily:"'Bebas Neue',sans-serif" }}>REST</span>
                <span className="font-display text-2xl text-[#C8FF00] tabular-nums"
                  style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{restTimer.seconds}s</span>
              </div>
              <button onClick={() => setRestTimer(null)}
                className="px-4 py-1.5 rounded-xl bg-[#252527] text-[#F5F5F0] text-xs font-bold tracking-wider active:scale-95 border border-[#3A3A3C]">
                SKIP
              </button>
            </div>
            <div className="h-1.5 bg-[#252527] rounded-full overflow-hidden">
              <div className="h-full bg-[#C8FF00] rounded-full transition-all duration-1000"
                style={{ width:`${(restTimer.seconds / restTimer.total) * 100}%` }}/>
            </div>
          </div>
        </div>
      )}

      {/* ── End workout confirmation sheet ──── */}
      {showEndSheet && (
        <div className="absolute inset-0 bg-[rgba(0,0,0,0.75)] z-50 flex items-end"
          onClick={() => setShowEndSheet(false)}>
          <div className="w-full bg-[#1A1A1C] rounded-t-3xl px-5 pt-6 border-t border-[#3A3A3C]"
            style={{ paddingBottom:'max(2rem, env(safe-area-inset-bottom))' }}
            onClick={e => e.stopPropagation()}>
            <div className="w-10 h-1 bg-[#3A3A3C] rounded-full mx-auto mb-6"/>
            <h3 className="font-display text-3xl text-[#F5F5F0] mb-1"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>END WORKOUT?</h3>
            <p className="text-[#8A8A8E] text-sm mb-6">{completedSets} of {totalSets} sets completed</p>
            <div className="space-y-3">
              <button onClick={handleFinish}
                className="w-full py-4 rounded-2xl bg-[#C8FF00] text-[#0D0D0F] font-display text-xl tracking-wider active:scale-95"
                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
                SAVE &amp; EXIT
              </button>
              <button onClick={onClose}
                className="w-full py-4 rounded-2xl font-display text-xl tracking-wider active:scale-95 border"
                style={{ fontFamily:"'Bebas Neue',sans-serif", background:'rgba(255,69,58,0.12)', color:'#FF453A', borderColor:'rgba(255,69,58,0.25)' }}>
                DISCARD WORKOUT
              </button>
              <button onClick={() => setShowEndSheet(false)}
                className="w-full py-4 rounded-2xl bg-[#252527] text-[#F5F5F0] font-display text-xl tracking-wider active:scale-95 border border-[#3A3A3C]"
                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
                KEEP GOING
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   CELEBRATION SCREEN
═══════════════════════════════════════════════ */
function CelebrationScreen({ result, newBadges, onDone, profile }) {
  const [note, setNote]         = useState('');
  const [showNote, setShowNote] = useState(false);
  const [hypeMsg, setHypeMsg]   = useState(null);
  const [loadingHype, setLoadingHype] = useState(false);
  const [copied, setCopied]     = useState(false);

  const fmtVol = v => v >= 1000 ? `${(v/1000).toFixed(1)}t` : `${Math.round(v)}kg`;
  const doneSets     = result.exercises.reduce((n, ex) => n + ex.sets.filter(s => s.done).length, 0);
  const doneReps     = result.exercises.reduce((n, ex) =>
    n + ex.sets.filter(s => s.done).reduce((r, s) => r + (parseInt(s.reps) || 0), 0), 0);
  const doneExercises = result.exercises.filter(ex => ex.sets.some(s => s.done)).length;
  const estCals      = Math.round(result.duration * 5.5);

  /* Claude hype message */
  useEffect(() => {
    const generate = async () => {
      setLoadingHype(true);
      try {
        const prText = result.newPRs?.length > 0
          ? ` New PRs: ${result.newPRs.map(p => `${p.exercise} ${p.weight}kg×${p.reps}`).join(', ')}.` : '';
        const summary = `${result.focus}. Duration: ${result.duration} min. ` +
          `${doneExercises} exercises, ${doneSets} sets, ${fmtVol(result.totalVolume)} volume.${prText}`;
        const name = profile?.name || 'Champion';
        const resp = await fetch(`${BACKEND_URL}/ai/chat`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + (localStorage.getItem('forge_token') || ''),
          },
          body: JSON.stringify({
            max_tokens: 80,
            system: "You are a world-class personal trainer. Give one punchy, specific, high-energy 1-2 sentence message celebrating this athlete's session. Use their name. Reference a specific number from their workout.",
            messages: [{ role: 'user', content: `${name} just finished: ${summary}` }]
          })
        });
        const data = await resp.json();
        setHypeMsg(data?.content?.[0]?.text || null);
      } catch (_) { /* silently fail */ }
      finally { setLoadingHype(false); }
    };
    generate();
  }, []);

  const handleShare = () => {
    const prLine = result.newPRs?.length > 0
      ? `\nPRs: ${result.newPRs.map(p => `${p.exercise} ${p.weight}kg×${p.reps}`).join(', ')}` : '';
    const text = `Just crushed a workout on FORGE 💪\n${result.focus} — ${result.duration}min\n` +
      `${doneExercises} exercises · ${doneSets} sets · ${fmtVol(result.totalVolume)} volume${prLine}\n#FORGE #fitness`;
    navigator.clipboard?.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  return (
    <div className="fixed inset-0 bg-[#0D0D0F] z-50 flex flex-col overflow-y-auto animate-fade-slide"
      style={{ maxWidth:430, left:'50%', transform:'translateX(-50%)' }}>
      <Confetti/>

      <div className="flex flex-col items-center flex-1 px-5 py-10 text-center">
        <div className="text-7xl mb-4 animate-scale-in">💪</div>
        <h1 className="font-display leading-none mb-6" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
          <span className="text-6xl text-[#C8FF00] block">WORKOUT</span>
          <span className="text-6xl text-[#F5F5F0] block">COMPLETE</span>
        </h1>

        {/* 6-stat grid */}
        <div className="w-full grid grid-cols-3 gap-3 mb-5">
          {[
            { label:'DURATION',  val:`${result.duration}m` },
            { label:'EXERCISES', val: doneExercises },
            { label:'SETS',      val: doneSets },
            { label:'REPS',      val: doneReps },
            { label:'VOLUME',    val: fmtVol(result.totalVolume) },
            { label:'EST. CALS', val:`~${estCals}` },
          ].map(({ label, val }) => (
            <div key={label} className="bg-[#1A1A1C] rounded-2xl p-4 border border-[#252527]">
              <p className="font-display text-3xl text-[#C8FF00] leading-none"
                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{val}</p>
              <p className="text-[#8A8A8E] text-xs uppercase tracking-wider mt-1">{label}</p>
            </div>
          ))}
        </div>

        {/* Coach hype message */}
        {loadingHype && (
          <div className="w-full bg-[#1A1A1C] rounded-2xl p-4 border border-[#252527] mb-4 animate-pulse">
            <p className="text-[#8A8A8E] text-sm">Getting your coach message...</p>
          </div>
        )}
        {hypeMsg && (
          <div className="w-full bg-[rgba(200,255,0,0.05)] border border-[rgba(200,255,0,0.2)] rounded-2xl p-4 mb-4 text-left">
            <p className="text-[#8A8A8E] text-[10px] uppercase tracking-widest mb-1.5">COACH SAYS</p>
            <p className="text-[#F5F5F0] text-sm italic leading-relaxed">{hypeMsg}</p>
          </div>
        )}

        {/* PRs */}
        {result.newPRs?.length > 0 && (
          <div className="w-full bg-[rgba(200,255,0,0.05)] border border-[rgba(200,255,0,0.2)] rounded-2xl p-4 mb-4 text-left">
            <p className="text-[#C8FF00] font-display text-sm tracking-wider mb-2"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>🏆 NEW PERSONAL RECORDS</p>
            {result.newPRs.map((pr, i) => (
              <p key={i} className="text-[#F5F5F0] text-sm">{pr.exercise}: {pr.weight}kg × {pr.reps}</p>
            ))}
          </div>
        )}

        {/* Badges */}
        {newBadges?.length > 0 && (
          <div className="w-full space-y-2 mb-4">
            {newBadges.map(badge => (
              <div key={badge.id}
                className="bg-[#1A1A1C] border border-[#C8FF00] rounded-2xl px-5 py-3 flex items-center gap-3 animate-scale-in">
                <span className="text-3xl">{badge.emoji}</span>
                <div className="text-left">
                  <p className="text-[#C8FF00] font-display text-lg leading-none"
                    style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{badge.name} UNLOCKED</p>
                  <p className="text-[#8A8A8E] text-xs">{badge.desc}</p>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Note */}
        {!showNote ? (
          <button onClick={() => setShowNote(true)}
            className="text-[#8A8A8E] text-sm underline active:scale-95 mb-4">
            + Add workout note
          </button>
        ) : (
          <textarea value={note} onChange={e => setNote(e.target.value)}
            placeholder="How did it feel? Any notes…"
            className="w-full bg-[#1A1A1C] text-[#F5F5F0] rounded-2xl px-4 py-3 text-sm border border-[#3A3A3C] focus:border-[#C8FF00] outline-none resize-none mb-4 h-20"
          />
        )}

        {/* Share */}
        <button onClick={handleShare}
          className="flex items-center gap-2 text-[#8A8A8E] text-sm border border-[#252527] rounded-xl px-5 py-2.5 active:scale-95 transition-all mb-2">
          <span>{copied ? '✓' : '↑'}</span>
          <span>{copied ? 'Copied to clipboard!' : 'Share Workout'}</span>
        </button>
      </div>

      <div className="px-5 flex-shrink-0"
        style={{ paddingBottom:'max(2.5rem, env(safe-area-inset-bottom))' }}>
        <button onClick={() => onDone(note)}
          className="w-full py-4 rounded-2xl bg-[#C8FF00] text-[#0D0D0F] font-display text-xl tracking-wider active:scale-95 transition-all"
          style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
          BACK TO HOME
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   PROGRESS SCREEN
═══════════════════════════════════════════════ */
function ProgressScreen({ logs, prs, badges, profile, nutritionLog={}, nutritionGoals={}, weightHistory=[] }) {
  const [insights, setInsights]         = useState(null);
  const [loadingInsights, setLoading]   = useState(false);
  const [insightError, setInsightError] = useState(null);

  /* Weekly volume — last 8 weeks */
  const weeklyData = useMemo(() => {
    return Array.from({ length: 8 }, (_, i) => {
      const d = new Date();
      d.setDate(d.getDate() - (7 - i) * 7);
      const wStart = getWeekStart(d);
      const wEnd   = new Date(wStart);
      wEnd.setDate(wEnd.getDate() + 6);
      const wEndISO = wEnd.toISOString().split('T')[0];
      const vol = logs.filter(l => l.date >= wStart && l.date <= wEndISO)
                      .reduce((s,l) => s + (l.totalVolume||0), 0);
      const isNow = i === 7;
      const label = isNow ? 'Now' : `-${7-i}w`;
      return { label, volume: Math.round(vol), isNow };
    });
  }, [logs]);

  const maxVol = Math.max(...weeklyData.map(w => w.volume), 1);

  /* Heatmap — last 56 days */
  const heatmapData = useMemo(() => {
    return Array.from({ length: 56 }, (_, i) => {
      const d = new Date();
      d.setDate(d.getDate() - (55 - i));
      const iso = d.toISOString().split('T')[0];
      const log = logs.find(l => l.date === iso);
      return { iso, volume: log?.totalVolume || 0, has: !!log };
    });
  }, [logs]);

  const maxCell = Math.max(...heatmapData.map(c => c.volume), 1);

  const totalVolume = logs.reduce((s,l) => s + (l.totalVolume||0), 0);
  const fmtVol = v => v >= 1000 ? `${(v/1000).toFixed(1)}t` : `${Math.round(v)}kg`;

  const loadInsights = async () => {
    if (!localStorage.getItem('forge_token')) { setInsightError('Please log in to unlock AI insights.'); return; }
    setLoading(true); setInsightError(null);
    try {
      const data = await generateInsights(profile, logs, prs);
      setInsights(data);
    } catch(e) { setInsightError(e.message); }
    finally { setLoading(false); }
  };

  return (
    <div className="h-full overflow-y-auto pb-28">
      <div className="px-5 pt-14 pb-4">
        <h1 className="font-display text-5xl text-[#F5F5F0]"
          style={{ fontFamily:"'Bebas Neue',sans-serif" }}>PROGRESS</h1>
        <p className="text-[#8A8A8E] text-sm">{logs.length} workouts logged</p>
      </div>

      {logs.length === 0 ? (
        <div className="px-5 py-16 text-center">
          <div className="text-6xl mb-4">📊</div>
          <h2 className="font-display text-3xl text-[#F5F5F0] mb-2"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>THE IRON AWAITS</h2>
          <p className="text-[#8A8A8E]">Hit that LOG button to start tracking your gains.</p>
        </div>
      ) : (
        <>
          {/* Quick stats */}
          <div className="px-5 mb-6">
            <div className="flex gap-3">
              <StatCard label="SESSIONS" value={logs.length}/>
              <StatCard label="TOTAL VOL" value={fmtVol(totalVolume)}/>
              <StatCard label="PRs SET" value={Object.keys(prs).length}/>
            </div>
          </div>

          {/* Volume bar chart */}
          <div className="px-5 mb-6">
            <h2 className="font-display text-2xl text-[#F5F5F0] mb-3"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>WEEKLY VOLUME</h2>
            <div className="bg-[#1A1A1C] rounded-2xl p-4 border border-[#252527]">
              <svg viewBox="0 0 336 110" width="100%" style={{ display:'block' }}>
                {weeklyData.map((w, i) => {
                  const barH = Math.max(2, (w.volume / maxVol) * 72);
                  const x    = i * 42 + 4;
                  const y    = 80 - barH;
                  return (
                    <g key={i}>
                      <rect x={x} y={y} width={34} height={barH} rx="4"
                        fill={w.isNow ? '#C8FF00' : '#3A3A3C'}/>
                      <text x={x+17} y={97} textAnchor="middle"
                        fill={w.isNow ? '#C8FF00' : '#8A8A8E'} fontSize="8" fontFamily="DM Sans">
                        {w.label}
                      </text>
                      {w.volume > 0 && (
                        <text x={x+17} y={y-4} textAnchor="middle"
                          fill={w.isNow ? '#C8FF00' : '#8A8A8E'} fontSize="7" fontFamily="DM Sans">
                          {fmtVol(w.volume)}
                        </text>
                      )}
                    </g>
                  );
                })}
              </svg>
            </div>
          </div>

          {/* Heatmap */}
          <div className="px-5 mb-6">
            <h2 className="font-display text-2xl text-[#F5F5F0] mb-3"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>CONSISTENCY</h2>
            <div className="bg-[#1A1A1C] rounded-2xl p-4 border border-[#252527]">
              <div style={{ display:'grid', gridTemplateColumns:'repeat(8,1fr)', gap:4 }}>
                {heatmapData.map((cell, i) => {
                  let bg = '#252527';
                  if (cell.has) {
                    const pct = cell.volume / maxCell;
                    bg = pct > 0.7 ? '#C8FF00'
                       : pct > 0.4 ? 'rgba(200,255,0,0.65)'
                       : pct > 0.15 ? 'rgba(200,255,0,0.35)'
                       : 'rgba(200,255,0,0.15)';
                  }
                  return (
                    <div key={i} style={{ background:bg, borderRadius:3, aspectRatio:'1' }}
                      title={cell.iso}/>
                  );
                })}
              </div>
              <p className="text-[#8A8A8E] text-xs mt-3">Last 8 weeks · darker = more volume</p>
            </div>
          </div>

          {/* PRs */}
          {Object.keys(prs).length > 0 && (
            <div className="px-5 mb-6">
              <h2 className="font-display text-2xl text-[#F5F5F0] mb-3"
                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>PERSONAL RECORDS</h2>
              <div className="bg-[#1A1A1C] rounded-2xl overflow-hidden border border-[#252527]">
                {Object.entries(prs).map(([exercise, pr], i) => (
                  <div key={exercise}
                    className={`flex items-center justify-between px-4 py-3
                      ${i > 0 ? 'border-t border-[#252527]' : ''}`}>
                    <div className="min-w-0 flex-1">
                      <p className="text-[#F5F5F0] text-sm font-medium truncate">{exercise}</p>
                      <p className="text-[#8A8A8E] text-xs">{formatDate(pr.date)}</p>
                    </div>
                    <div className="text-right ml-3 flex-shrink-0">
                      <p className="font-display text-xl text-[#C8FF00]"
                        style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{pr.weight}kg</p>
                      <p className="text-[#8A8A8E] text-xs">× {pr.reps} reps</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      )}

      {/* AI Insights — always visible */}
      <div className="px-5 mb-6">
        <h2 className="font-display text-2xl text-[#F5F5F0] mb-3"
          style={{ fontFamily:"'Bebas Neue',sans-serif" }}>AI INSIGHTS</h2>
        {!insights && !loadingInsights && (
          <button onClick={loadInsights}
            className="w-full py-4 rounded-2xl bg-[#1A1A1C] border border-[#3A3A3C] text-[#C8FF00] font-display text-lg tracking-wider active:scale-95 transition-all flex items-center justify-center gap-2"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
            <Zap size={18}/> ANALYSE MY TRAINING
          </button>
        )}
        {loadingInsights && (
          <div className="bg-[#1A1A1C] rounded-2xl p-6 border border-[#252527] text-center">
            <div className="flex justify-center gap-2 mb-2">
              {[0,1,2].map(i => (
                <div key={i} className="w-2 h-2 rounded-full bg-[#C8FF00]"
                  style={{ animation:`dotPulse 1.2s ${i*0.2}s ease-in-out infinite`, opacity:0.4 }}/>
              ))}
            </div>
            <p className="text-[#8A8A8E] text-sm">Analysing your training data…</p>
          </div>
        )}
        {insightError && (
          <div className="bg-[#1A1A1C] rounded-2xl p-4 border border-[#FF453A]/30">
            <p className="text-[#FF453A] text-sm">{insightError}</p>
          </div>
        )}
        {insights && (
          <div className="space-y-3">
            {insights.map((tip, i) => (
              <div key={i} className="bg-[#1A1A1C] rounded-2xl p-4 border border-[#252527] flex gap-3">
                <span className="font-display text-2xl text-[#C8FF00] leading-none flex-shrink-0"
                  style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{i+1}</span>
                <p className="text-[#F5F5F0] text-sm leading-relaxed">{tip}</p>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Badges */}
      {/* ── Nutrition weekly summary ── */}
      {Object.keys(nutritionLog).length > 0 && (() => {
        const weekStart = getWeekStart();
        const weekDays = Object.keys(nutritionLog).filter(d => d >= weekStart);
        const avgCal = weekDays.length > 0
          ? Math.round(weekDays.reduce((s,d)=>s+sumMacros(nutritionLog[d].meals||[]).cal,0) / weekDays.length) : 0;
        const avgPro = weekDays.length > 0
          ? Math.round(weekDays.reduce((s,d)=>s+sumMacros(nutritionLog[d].meals||[]).pro,0) / weekDays.length) : 0;
        const goalHits = weekDays.filter(d=>{
          const t=sumMacros(nutritionLog[d].meals||[]);
          return t.cal >= (nutritionGoals.calories||2000)*0.8;
        }).length;
        // nutrition streak
        let nutrStreak=0;
        const allDates = Object.keys(nutritionLog).sort().reverse();
        for(const d of allDates){
          const t=sumMacros(nutritionLog[d].meals||[]);
          if(t.cal>=(nutritionGoals.calories||2000)*0.8) nutrStreak++;
          else break;
        }
        return (
          <div className="px-5 mb-6">
            <h2 className="font-display text-2xl text-[#F5F5F0] mb-3"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>NUTRITION THIS WEEK</h2>
            <div className="bg-[#1A1A1C] rounded-2xl p-4 border border-[#252527] space-y-3">
              <div className="flex gap-3">
                <StatCard label="AVG CALORIES" value={`${avgCal}`} sub="kcal/day"/>
                <StatCard label="AVG PROTEIN"  value={`${avgPro}g`} sub="per day"/>
                <StatCard label="GOAL DAYS"    value={`${goalHits}/7`} sub="this week"/>
              </div>
              {nutrStreak > 0 && (
                <div className="flex items-center gap-2 pt-1">
                  <span className="text-lg">🔥</span>
                  <p className="text-[#C8FF00] font-display text-lg"
                    style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
                    {nutrStreak} DAY NUTRITION STREAK
                  </p>
                </div>
              )}
            </div>
          </div>
        );
      })()}

      {/* ── Fitness + Nutrition badges ── */}
      <div className="px-5 mb-6">
        <h2 className="font-display text-2xl text-[#F5F5F0] mb-3"
          style={{ fontFamily:"'Bebas Neue',sans-serif" }}>FITNESS BADGES</h2>
        <div className="grid grid-cols-3 gap-3 mb-5">
          {BADGE_DEFS.map(badge => {
            const earned = badges[badge.id];
            return (
              <div key={badge.id}
                className={`rounded-2xl p-3 text-center border transition-all
                  ${earned ? 'bg-[rgba(200,255,0,0.05)] border-[rgba(200,255,0,0.2)]'
                           : 'bg-[#1A1A1C] border-[#252527] opacity-35'}`}>
                <div className="text-3xl mb-1">{badge.emoji}</div>
                <p className={`font-display text-xs leading-tight ${earned?'text-[#C8FF00]':'text-[#8A8A8E]'}`}
                  style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{badge.name}</p>
                {earned && <p className="text-[#8A8A8E] text-[9px] mt-0.5">{formatDate(earned.unlockedAt)}</p>}
              </div>
            );
          })}
        </div>

        <h2 className="font-display text-2xl text-[#F5F5F0] mb-3"
          style={{ fontFamily:"'Bebas Neue',sans-serif" }}>NUTRITION BADGES</h2>
        <div className="grid grid-cols-3 gap-3">
          {NUTRITION_BADGE_DEFS.map(badge => {
            const earned = badges[badge.id];
            return (
              <div key={badge.id}
                className={`rounded-2xl p-3 text-center border transition-all
                  ${earned ? 'bg-[rgba(200,255,0,0.05)] border-[rgba(200,255,0,0.2)]'
                           : 'bg-[#1A1A1C] border-[#252527] opacity-35'}`}>
                <div className="text-3xl mb-1">{badge.emoji}</div>
                <p className={`font-display text-xs leading-tight ${earned?'text-[#C8FF00]':'text-[#8A8A8E]'}`}
                  style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{badge.name}</p>
                {earned && <p className="text-[#8A8A8E] text-[9px] mt-0.5">{formatDate(earned.unlockedAt)}</p>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   NUTRITION GOALS SCREEN
═══════════════════════════════════════════════ */
function NutritionGoalsScreen({ profile, nutritionGoals, onSave, onBack }) {
  const [form, setForm] = useState({
    calories:      nutritionGoals.calories      || 2000,
    protein:       nutritionGoals.protein       || 150,
    carbs:         nutritionGoals.carbs         || 200,
    fat:           nutritionGoals.fat           || 65,
    goalType:      nutritionGoals.goalType      || 'maintain',
    bodyweight:    nutritionGoals.bodyweight    || 80,
    goalWeight:    nutritionGoals.goalWeight    || '',
    // Biometrics
    height:        nutritionGoals.height        || '',
    age:           nutritionGoals.age           || '',
    sex:           nutritionGoals.sex           || 'male',
    activityLevel: nutritionGoals.activityLevel || 'moderate',
  });
  const set = (k,v) => setForm(f=>({...f,[k]:v}));

  const bmr = useMemo(() => calcBMR({
    weight: form.bodyweight, height: parseFloat(form.height)||0,
    age: parseFloat(form.age)||0, sex: form.sex,
  }), [form.bodyweight, form.height, form.age, form.sex]);

  const tdee = useMemo(() => bmr ? calcTDEE(bmr, form.activityLevel) : null, [bmr, form.activityLevel]);

  const autoCalc = () => {
    if (!bmr || !tdee) {
      // Fall back to simple bodyweight method
      const suggested = calcNutritionGoals(profile, { ...form });
      setForm(f=>({...f, ...suggested}));
      return;
    }
    const goalAdj = form.goalType === 'lose' ? Math.round(tdee * 0.8)
                  : form.goalType === 'gain' ? Math.round(tdee * 1.12)
                  : tdee;
    const proMult = form.goalType === 'lose' ? 2.2 : form.goalType === 'gain' ? 2.4 : 2.0;
    const protein = Math.round(form.bodyweight * proMult);
    const fatG = Math.round(goalAdj * 0.25 / 9);
    const carbs = Math.max(50, Math.round((goalAdj - protein*4 - fatG*9) / 4));
    setForm(f=>({...f, calories: goalAdj, protein, carbs, fat: fatG}));
  };

  const GOAL_TYPES = [
    { id:'lose',     label:'LOSE WEIGHT',  desc:'Calorie deficit, high protein' },
    { id:'maintain', label:'MAINTAIN',     desc:'TDEE, balanced macros' },
    { id:'gain',     label:'GAIN MUSCLE',  desc:'Calorie surplus, high protein' },
  ];

  return (
    <div className="h-full overflow-y-auto pb-28">
      <div className="px-5 pt-14 pb-4 flex items-center gap-3">
        <button onClick={onBack}
          className="w-10 h-10 rounded-xl bg-[#1A1A1C] flex items-center justify-center active:scale-90 border border-[#252527]">
          <ChevronLeft size={20} color="#F5F5F0"/>
        </button>
        <div>
          <h1 className="font-display text-4xl text-[#F5F5F0]"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>NUTRITION GOALS</h1>
          <p className="text-[#8A8A8E] text-xs">Personalise your daily targets</p>
        </div>
      </div>

      <div className="px-5 space-y-4">
        {/* Goal type */}
        <div className="space-y-2">
          {GOAL_TYPES.map(g=>(
            <button key={g.id} onClick={()=>set('goalType',g.id)}
              className={`w-full text-left px-5 py-4 rounded-2xl border-2 transition-all active:scale-95
                ${form.goalType===g.id
                  ? 'border-[#C8FF00] bg-[rgba(200,255,0,0.07)]'
                  : 'border-[#3A3A3C] bg-[#1A1A1C]'}`}>
              <p className={`font-display text-xl ${form.goalType===g.id?'text-[#C8FF00]':'text-[#F5F5F0]'}`}
                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{g.label}</p>
              <p className="text-[#8A8A8E] text-xs mt-0.5">{g.desc}</p>
            </button>
          ))}
        </div>

        {/* Biometrics */}
        <div className="bg-[#1A1A1C] rounded-2xl p-4 border border-[#252527] space-y-4">
          <p className="text-[#8A8A8E] text-xs uppercase tracking-widest">Biometrics (for accurate TDEE)</p>

          <div className="grid grid-cols-2 gap-3">
            {/* Weight */}
            <div>
              <p className="text-[#8A8A8E] text-xs mb-1.5">Weight (kg)</p>
              <input type="number" value={form.bodyweight}
                onChange={e=>set('bodyweight',parseFloat(e.target.value)||80)}
                className="set-input w-full" style={{ fontSize:17 }}/>
            </div>
            {/* Height */}
            <div>
              <p className="text-[#8A8A8E] text-xs mb-1.5">Height (cm)</p>
              <input type="number" value={form.height}
                onChange={e=>set('height',e.target.value)}
                placeholder="175" className="set-input w-full" style={{ fontSize:17 }}/>
            </div>
            {/* Age */}
            <div>
              <p className="text-[#8A8A8E] text-xs mb-1.5">Age</p>
              <input type="number" value={form.age}
                onChange={e=>set('age',e.target.value)}
                placeholder="25" className="set-input w-full" style={{ fontSize:17 }}/>
            </div>
            {/* Sex */}
            <div>
              <p className="text-[#8A8A8E] text-xs mb-1.5">Biological Sex</p>
              <div className="flex gap-1.5">
                <button onClick={()=>set('sex','male')}
                  className={`flex-1 py-2.5 rounded-xl text-sm font-semibold border transition-all
                    ${form.sex==='male'?'bg-[#C8FF00] text-[#0D0D0F] border-[#C8FF00]':'bg-[#252527] text-[#8A8A8E] border-[#3A3A3C]'}`}>M</button>
                <button onClick={()=>set('sex','female')}
                  className={`flex-1 py-2.5 rounded-xl text-sm font-semibold border transition-all
                    ${form.sex==='female'?'bg-[#C8FF00] text-[#0D0D0F] border-[#C8FF00]':'bg-[#252527] text-[#8A8A8E] border-[#3A3A3C]'}`}>F</button>
              </div>
            </div>
          </div>

          {/* Activity Level */}
          <div>
            <p className="text-[#8A8A8E] text-xs mb-2">Activity Level</p>
            <div className="space-y-1.5">
              {Object.entries(ACTIVITY_MULTIPLIERS).map(([id,{label}])=>(
                <button key={id} onClick={()=>set('activityLevel',id)}
                  className={`w-full text-left px-3 py-2.5 rounded-xl text-sm border transition-all active:scale-95
                    ${form.activityLevel===id?'border-[#C8FF00] bg-[rgba(200,255,0,0.07)] text-[#C8FF00]':'border-[#3A3A3C] bg-[#252527] text-[#8A8A8E]'}`}>
                  {label}
                </button>
              ))}
            </div>
          </div>

          {/* BMR / TDEE preview */}
          {bmr && (
            <div className="flex gap-3 pt-2 border-t border-[#252527]">
              <div className="flex-1 text-center">
                <p className="text-[#8A8A8E] text-[10px] uppercase tracking-wider">BMR</p>
                <p className="font-display text-xl text-[#F5F5F0]" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{bmr}</p>
                <p className="text-[#8A8A8E] text-[10px]">kcal/day (rest)</p>
              </div>
              <div className="flex-1 text-center">
                <p className="text-[#8A8A8E] text-[10px] uppercase tracking-wider">TDEE</p>
                <p className="font-display text-xl text-[#C8FF00]" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{tdee}</p>
                <p className="text-[#8A8A8E] text-[10px]">kcal/day (active)</p>
              </div>
            </div>
          )}
        </div>

        {/* Auto-calculate */}
        <button onClick={autoCalc}
          className="w-full py-3.5 rounded-2xl bg-[rgba(200,255,0,0.08)] border border-[rgba(200,255,0,0.25)] text-[#C8FF00] font-display text-lg tracking-wider active:scale-95 flex items-center justify-center gap-2"
          style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
          <Zap size={18} color="#C8FF00"/> CALCULATE FOR ME
        </button>

        {/* Manual targets */}
        <div className="bg-[#1A1A1C] rounded-2xl p-4 border border-[#252527] space-y-4">
          <p className="text-[#8A8A8E] text-xs uppercase tracking-widest">Daily Targets</p>
          {[
            { key:'calories', label:'Calories (kcal)', color:'#C8FF00' },
            { key:'protein',  label:'Protein (g)',     color:'#60A5FA' },
            { key:'carbs',    label:'Carbs (g)',        color:'#FBBF24' },
            { key:'fat',      label:'Fat (g)',          color:'#FB923C' },
          ].map(f=>(
            <div key={f.key} className="flex items-center justify-between gap-4">
              <div className="flex items-center gap-2 flex-1">
                <div className="w-2 h-2 rounded-full flex-shrink-0" style={{ background:f.color }}/>
                <span className="text-[#F5F5F0] text-sm">{f.label}</span>
              </div>
              <input type="number" value={form[f.key]}

/* Circular calorie ring */
function CalorieRing({ consumed, goal }) {
  const r = 72, cx = 90, cy = 90;
  const circ = 2 * Math.PI * r;
  const pct = goal > 0 ? Math.min(consumed / goal, 1.05) : 0;
  const dash = circ * Math.min(pct, 1);
  const color = consumed < goal * 0.5 ? '#FF453A'
              : consumed < goal * 0.85 ? '#FF9F0A'
              : consumed <= goal       ? '#C8FF00'
              : '#F5F5F0';
  return (
    <div className="relative flex items-center justify-center" style={{ width:180,height:180 }}>
      <svg width="180" height="180" viewBox="0 0 180 180" style={{ position:'absolute' }}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#252527" strokeWidth="14"/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="14"
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          transform={`rotate(-90 ${cx} ${cy})`}
          style={{ transition:'stroke-dasharray 0.7s ease, stroke 0.4s ease' }}/>
      </svg>
      <div className="flex flex-col items-center justify-center" style={{ zIndex:1 }}>
        <p className="font-display leading-none" style={{ fontFamily:"'Bebas Neue',sans-serif",
          fontSize:42, color:'#F5F5F0' }}>{consumed}</p>
        <p className="font-display text-sm tracking-widest" style={{ fontFamily:"'Bebas Neue',sans-serif",
          color }}>KCAL</p>
        <p className="text-xs mt-0.5" style={{ color:'#8A8A8E' }}>of {goal} goal</p>
      </div>
    </div>
  );
}

/* Single macro progress card */
function MacroCard({ label, current, goal, color, unit='g' }) {
  const pct = goal > 0 ? Math.min(current / goal, 1) : 0;
  const hit = current >= goal;
  return (
    <div className="bg-[#1A1A1C] rounded-2xl p-3 flex-1 border border-[#252527]">
      <div className="flex items-baseline justify-between mb-1.5">
        <span className="text-[#8A8A8E] text-[10px] uppercase tracking-wider">{label}</span>
        {hit && <span className="text-[9px] font-bold" style={{ color }}>✓</span>}
      </div>
      <p className="font-display text-xl leading-none mb-2"
        style={{ fontFamily:"'Bebas Neue',sans-serif", color:'#F5F5F0' }}>
        {Math.round(current)}<span className="text-xs font-body text-[#8A8A8E]">{unit}</span>
      </p>
      <div className="h-1.5 rounded-full bg-[#252527] overflow-hidden">
        <div className="h-full rounded-full transition-all duration-500"

}

/* Weight SVG line chart */
function WeightChart({ history, goalWeight }) {
  if (history.length < 2) return (
    <div className="text-center py-6 text-[#8A8A8E] text-sm">
      Log at least 2 days to see your trend
    </div>
  );
  const data = history.slice(-30);
  const W=320, H=100, PL=28, PR=8, PT=10, PB=22;
  const ws = data.map(h=>h.weight);
  const minW = Math.min(...ws) - 0.5;
  const maxW = Math.max(...ws) + 0.5;
  const px = i => PL + (i/(data.length-1))*(W-PL-PR);
  const py = w => PT + ((maxW-w)/(maxW-minW))*(H-PT-PB);
  // smooth cubic bezier path
  let d = `M${px(0)} ${py(ws[0])}`;
  for (let i=1;i<data.length;i++){
    const mx=(px(i-1)+px(i))/2;
    d+=` C${mx} ${py(ws[i-1])} ${mx} ${py(ws[i])} ${px(i)} ${py(ws[i])}`;
  }
  // 7-day moving average
  const avg = data.map((_,i)=>{
    const s=Math.max(0,i-3), e=Math.min(data.length-1,i+3);
    return data.slice(s,e+1).reduce((a,h)=>a+h.weight,0)/(e-s+1);
  });
  let ad=`M${px(0)} ${py(avg[0])}`;
  for(let i=1;i<avg.length;i++) ad+=` L${px(i)} ${py(avg[i])}`;

  const latest = ws[ws.length-1];
  const first  = ws[0];
  const change = latest - first;

  return (
    <div>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display:'block', marginBottom:4 }}>
        {/* goal line */}
        {goalWeight && goalWeight>=minW && goalWeight<=maxW && (
          <line x1={PL} y1={py(goalWeight)} x2={W-PR} y2={py(goalWeight)}
            stroke="#C8FF00" strokeWidth="1" strokeDasharray="4 3" opacity="0.5"/>
        )}
        {/* weight path */}
        <path d={d} fill="none" stroke="#F5F5F0" strokeWidth="1.5" opacity="0.5"/>
        {/* moving avg */}
        <path d={ad} fill="none" stroke="#C8FF00" strokeWidth="2" opacity="0.85"/>
        {/* dots */}
        {data.map((h,i)=>(
          <circle key={i} cx={px(i)} cy={py(h.weight)} r="2" fill="#F5F5F0" opacity="0.6"/>
        ))}
        <circle cx={px(data.length-1)} cy={py(latest)} r="4" fill="#C8FF00"/>
        {/* x labels: first, mid, last */}
        {[0, Math.floor((data.length-1)/2), data.length-1].map(i=>(
          <text key={i} x={px(i)} y={H-2} textAnchor="middle"
            fill="#8A8A8E" fontSize="7" fontFamily="DM Sans">
            {data[i].date.slice(5)}
          </text>
        ))}
        {/* y labels */}
        <text x={PL-2} y={py(maxW)+4} textAnchor="end" fill="#8A8A8E" fontSize="7" fontFamily="DM Sans">{maxW.toFixed(1)}</text>
        <text x={PL-2} y={py(minW)+4} textAnchor="end" fill="#8A8A8E" fontSize="7" fontFamily="DM Sans">{minW.toFixed(1)}</text>
      </svg>
      <div className="flex gap-3 mt-2">
        <div className="flex-1 text-center">
          <p className="text-[#8A8A8E] text-[10px] uppercase tracking-wider">Start</p>
          <p className="font-display text-lg text-[#F5F5F0]"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{first}kg</p>
        </div>
        <div className="flex-1 text-center">
          <p className="text-[#8A8A8E] text-[10px] uppercase tracking-wider">Now</p>
          <p className="font-display text-lg text-[#C8FF00]"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{latest}kg</p>
        </div>
        <div className="flex-1 text-center">
          <p className="text-[#8A8A8E] text-[10px] uppercase tracking-wider">Change</p>
          <p className={`font-display text-lg`}
            style={{ fontFamily:"'Bebas Neue',sans-serif",
              color: change===0?'#8A8A8E':change>0?'#C8FF00':'#FF453A' }}>
            {change>0?'+':''}{change.toFixed(1)}kg
          </p>
        </div>
      </div>
    </div>
  );
}

              <div className="text-center flex-1">
                <p className="text-[#8A8A8E] text-[10px]">{'🍽'} EATEN</p>
                <p className="font-display text-base text-[#F5F5F0]" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{totals.cal}</p>
              </div>
              <span className="text-[#3A3A3C] font-bold">{'−'}</span>
              <div className="text-center flex-1">
                <p className="text-[#8A8A8E] text-[10px]">{'🔥'} BURNED</p>
                <p className="font-display text-base text-[#FF9F0A]" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{burnedToday}</p>
              </div>
              <span className="text-[#3A3A3C] font-bold">=</span>
              <div className="text-center flex-1">
                <p className="text-[#8A8A8E] text-[10px]">{'⚡'} NET</p>
                <p className="font-display text-base text-[#C8FF00]" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{netCalories}</p>
              </div>
            </div>
          )}
          {showNudge && netCalories < (goals.calories || 2000) * 0.4 && (
            <div className="mb-3 px-3 py-2 bg-[rgba(255,159,10,0.08)] border border-[rgba(255,159,10,0.2)] rounded-xl">
              <p className="text-[#FF9F0A] text-xs text-center">{'⚠️'} You're well under your calorie goal today</p>
            </div>
          )}
          <div className="flex gap-2">
            <MacroCard label="PROTEIN" current={totals.pro}  goal={goals.protein || 150} color="#60A5FA"/>
            <MacroCard label="CARBS"   current={totals.carb} goal={goals.carbs   || 200} color="#FBBF24"/>
            <MacroCard label="FAT"     current={totals.fat}  goal={goals.fat     || 65}  color="#FB923C"/>
          </div>
        </div>
      </div>

      {/* Weight log card */}
      <div className="px-5 mb-4">
        <div className="bg-[#1A1A1C] rounded-2xl p-4 border border-[#252527]">
          <div className="flex items-center justify-between mb-3">
            <p className="font-display text-lg text-[#F5F5F0]"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
              {todayWeight ? 'TODAY\'S WEIGHT' : 'LOG TODAY\'S WEIGHT'}
            </p>
            {weightHistory.length >= 2 && (
              <button onClick={()=>setShowChart(c=>!c)}
                className="text-[#C8FF00] text-xs font-semibold active:scale-90">
                {showChart ? 'HIDE' : 'CHART'}
              </button>
            )}
          </div>
          {todayWeight ? (
            <div className="flex items-baseline gap-2">
              <span className="font-display text-4xl text-[#C8FF00]"
                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{todayWeight.weight}</span>
              <span className="text-[#8A8A8E]">kg</span>
              {nutritionGoals.goalWeight && (
                <span className="ml-auto text-[#8A8A8E] text-sm">
                  {Math.abs(todayWeight.weight - nutritionGoals.goalWeight).toFixed(1)} kg to goal
                </span>
              )}
            </div>
          ) : (
            <div className="flex items-center gap-3">
              <input type="number" value={weightInput}
                onChange={e=>setWeightInput(e.target.value)}
                placeholder={latestWeight ? `${latestWeight}` : '0.0'}
                className="set-input" style={{ width:96, fontSize:22 }}/>
              <span className="text-[#8A8A8E]">kg</span>
              <button onClick={handleLogWeight}
                className="ml-auto px-5 py-2.5 rounded-xl bg-[#C8FF00] text-[#0D0D0F] font-display text-base active:scale-95"
                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
                LOG
              </button>
            </div>
          )}
          {showChart && weightHistory.length >= 2 && (
            <div className="mt-4 pt-4 border-t border-[#252527]">
              <WeightChart history={weightHistory} goalWeight={nutritionGoals.goalWeight}/>
            </div>
          )}
        </div>
      </div>

      {/* Cardio section */}
      {(todayCardio.length > 0 || onAddCardio) && (
        <div className="px-5 mb-3">
          <div className="flex items-center justify-between py-2">
            <span className="font-display text-lg text-[#F5F5F0]"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>CARDIO</span>
            <div className="flex items-center gap-2">
              {burnedToday > 0 && (
                <span className="text-[#FF9F0A] text-xs font-display"
                  style={{ fontFamily:"'Bebas Neue',sans-serif" }}>-{burnedToday} kcal</span>
              )}
              <button onClick={()=>setShowCardio(true)}
                className="flex items-center gap-1 text-[#C8FF00] text-xs font-semibold active:scale-90">
                <Plus size={12} color="#C8FF00"/> ADD
              </button>
            </div>
          </div>
          {todayCardio.length > 0 && (
            <div className="bg-[#1A1A1C] rounded-2xl overflow-hidden border border-[#252527]">
              {todayCardio.map((entry, i) => (
                <div key={entry.id}
                  className={`flex items-center gap-3 px-4 py-3 ${i > 0 ? 'border-t border-[#252527]' : ''}`}>
                  <span className="text-xl flex-shrink-0">{entry.emoji}</span>
                  <div className="flex-1 min-w-0">
                    <p className="text-[#F5F5F0] text-sm font-medium">{entry.name}</p>
                    <p className="text-[#8A8A8E] text-xs">
                      {entry.duration}min &middot; {entry.intensity}
                      {entry.distance ? ` · ${entry.distance}km` : ''}
                    </p>
                  </div>
                  <div className="text-right flex-shrink-0 mr-2">
                    <p className="text-[#FF9F0A] text-sm font-display"
                      style={{ fontFamily:"'Bebas Neue',sans-serif" }}>-{entry.calories}</p>
                    <p className="text-[#8A8A8E] text-[10px]">kcal</p>
                  </div>
                  {onDeleteCardio && (
                    <button onClick={()=>onDeleteCardio(today, entry.id)}
                      className="w-8 h-8 rounded-lg bg-[#252527] flex items-center justify-center active:scale-90 flex-shrink-0">
                      <X size={13} color="#FF453A"/>
                    </button>
                  )}
                </div>
              ))}
            </div>
          )}
          {todayCardio.length === 0 && (
            <div className="bg-[#1A1A1C] rounded-2xl border border-[#252527] px-4 py-4 text-center">
              <p className="text-[#8A8A8E] text-xs">No cardio logged today</p>
            </div>
          )}
        </div>
      )}

      {/* Meal sections — manual macro entry */}
      {MEALS.map(mealName => {
        const items = todayLog.meals.filter(m => m.meal === mealName);
        return (
          <MealSection
            key={mealName}
            mealName={mealName}
            items={items}
            today={today}
            onAdd={handleAddFood}
            onDelete={onDeleteFood}
          />
        );
      })}
    </div>
  );
}

const BACKEND_URL = 'https://forge-backend-production-aa16.up.railway.app';

async function syncToBackend(key, value) {
  try {
    const token = localStorage.getItem('forge_token');
    if (!token) return;
    await fetch(`${BACKEND_URL}/data/${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ value }),
    });
  } catch {}
}

async function loadFromBackend(key) {
  try {
    const token = localStorage.getItem('forge_token');
    if (!token) return null;
    const res = await fetch(`${BACKEND_URL}/data/${key}`, {
      headers: { 'Authorization': 'Bearer ' + token },
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data.value !== undefined ? data.value : (data !== null ? data : null);
  } catch { return null; }
}

/* ═══════════════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════════════ */
function LoginScreen({ onAuth }) {
  const [email,    setEmail]    = useState('');
  const [password, setPassword] = useState('');
  const [error,    setError]    = useState('');
  const [loading,  setLoading]  = useState(false);

  const attempt = async (endpoint) => {
    if (!email.trim() || !password.trim()) { setError('Please enter your email and password.'); return; }
    setLoading(true); setError('');
    try {
      const res = await fetch(`${BACKEND_URL}/auth/${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email.trim().toLowerCase(), password }),
      });
      const data = await res.json();
      if (!res.ok) { setError(data.message || data.error || 'Something went wrong. Try again.'); return; }
      const token = data.token || data.access_token || data.jwt;
      if (!token) { setError('No token received. Please try again.'); return; }
      localStorage.setItem('forge_token', token);
      onAuth();
    } catch(e) {
      setError('Could not connect to server. Check your connection.');
    } finally { setLoading(false); }
  };

  return (
    <div style={{ position:'fixed', inset:0, background:'#0D0D0F', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', padding:'0 24px', fontFamily:"'DM Sans',sans-serif" }}>
      <div style={{ marginBottom:44, textAlign:'center' }}>
        <div style={{ width:64, height:64, borderRadius:'50%', background:'#C8FF00', display:'flex',
          alignItems:'center', justifyContent:'center', margin:'0 auto 14px' }}>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="#0D0D0F">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </div>
        <p style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:52, color:'#F5F5F0',
          letterSpacing:'0.05em', lineHeight:1, margin:0 }}>FORGE</p>
        <p style={{ color:'#8A8A8E', fontSize:14, marginTop:6 }}>AI-powered training</p>
      </div>

      <div style={{ width:'100%', maxWidth:380 }}>
        <input type="email" value={email} onChange={e=>{setEmail(e.target.value);setError('');}}
          placeholder="Email"
          style={{ width:'100%', background:'#1A1A1C', color:'#F5F5F0', border:'1px solid #252527',
            borderRadius:16, padding:'14px 18px', fontSize:16, fontFamily:"'DM Sans',sans-serif",
            outline:'none', boxSizing:'border-box', marginBottom:10 }}/>
        <input type="password" value={password} onChange={e=>{setPassword(e.target.value);setError('');}}
          onKeyDown={e=>{ if(e.key==='Enter') attempt('login'); }}
          placeholder="Password"
          style={{ width:'100%', background:'#1A1A1C', color:'#F5F5F0', border:'1px solid #252527',
            borderRadius:16, padding:'14px 18px', fontSize:16, fontFamily:"'DM Sans',sans-serif",
            outline:'none', boxSizing:'border-box', marginBottom: error ? 8 : 18 }}/>
        {error && (
          <p style={{ color:'#FF453A', fontSize:13, marginBottom:14, textAlign:'center' }}>{error}</p>
        )}
        <button onClick={()=>attempt('login')} disabled={loading}
          style={{ width:'100%', padding:'16px 0', background: loading ? '#8A8A8E' : '#C8FF00',
            color:'#0D0D0F', fontFamily:"'Bebas Neue',sans-serif", fontSize:20, letterSpacing:'0.08em',
            border:'none', borderRadius:16, cursor: loading ? 'not-allowed' : 'pointer', marginBottom:10 }}>
          {loading ? 'LOADING...' : 'LOGIN'}
        </button>
        <button onClick={()=>attempt('register')} disabled={loading}
          style={{ width:'100%', padding:'16px 0', background:'transparent', color:'#C8FF00',
            fontFamily:"'Bebas Neue',sans-serif", fontSize:20, letterSpacing:'0.08em',
            border:'1px solid rgba(200,255,0,0.3)', borderRadius:16,
            cursor: loading ? 'not-allowed' : 'pointer' }}>
          CREATE ACCOUNT
        </button>
      </div>
    </div>
  );
}
