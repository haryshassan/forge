  <script>

      theme: {
        extend: {
          colors: {
            lime: '#C8FF00',
            carbon: '#0D0D0F',
            surface: '#1A1A1C',

  <style>
    *{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
    html,body{margin:0;padding:0;background:#0D0D0F;font-family:'DM Sans',sans-serif;overscroll-behavior:none;-webkit-font-smoothing:antialiased}
    ::-webkit-scrollbar{display:none}
    input[type=number]{-moz-appearance:textfield}
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

    @keyframes confettiFall{
      0%{transform:translateY(-5vh) rotate(0deg) translateX(0px);opacity:1}
      100%{transform:translateY(110vh) rotate(720deg) translateX(var(--tx,0px));opacity:0}
    }
    @keyframes pulseRing{
      0%{box-shadow:0 0 0 0 rgba(200,255,0,0.6)}
      70%{box-shadow:0 0 0 22px rgba(200,255,0,0)}
      100%{box-shadow:0 0 0 0 rgba(200,255,0,0)}
    }
    @keyframes slideUp{
      from{transform:translateY(100%);opacity:0}
      to{transform:translateY(0);opacity:1}
    }
    @keyframes fadeSlide{
      from{opacity:0;transform:translateY(10px)}
      to{opacity:1;transform:translateY(0)}
    }
    @keyframes scaleIn{
      from{transform:scale(0.85);opacity:0}
      to{transform:scale(1);opacity:1}
    }
    @keyframes toastIn{
      from{transform:translateY(-20px) translateX(-50%);opacity:0}
      to{transform:translateY(0) translateX(-50%);opacity:1}
    }
    @keyframes spin{
      from{transform:rotate(0deg)}
      to{transform:rotate(360deg)}
    }

    .animate-slide-up{animation:slideUp 0.45s cubic-bezier(0.16,1,0.3,1)}
    .animate-fade-slide{animation:fadeSlide 0.3s ease-out}
    .animate-scale-in{animation:scaleIn 0.35s cubic-bezier(0.16,1,0.3,1)}
    .animate-pulse-ring{animation:pulseRing 1.6s ease-out infinite}
    .animate-toast{animation:toastIn 0.35s cubic-bezier(0.16,1,0.3,1) forwards}
    .animate-spin-slow{animation:spin 2s linear infinite}

    .set-input{
      background:#252527;border:1.5px solid #3A3A3C;border-radius:10px;
      color:#F5F5F0;font-family:'DM Sans',sans-serif;font-weight:600;
      font-size:17px;text-align:center;width:100%;height:48px;outline:none;
      transition:border-color 0.15s
    }
    .set-input:focus{border-color:#C8FF00}
    .set-input.done{border-color:rgba(200,255,0,0.4);background:rgba(200,255,0,0.06);color:#C8FF00}
    .set-input:disabled{cursor:default}

    .font-display{font-family:'Bebas Neue',sans-serif !important}
  </style>
</head>

const FOOD_CATEGORIES = ['Meats & Fish','Vegetables','Fruits','Grains & Legumes','Dairy & Alternatives','Nuts & Seeds'];

/* ── Nutrition utilities ── */
function scaleMacros(food, grams) {
  const s = grams / 100;
  return {
    cal: Math.round(food.cal * s),
    pro: Math.round(food.pro * s * 10) / 10,
    carb: Math.round(food.carb * s * 10) / 10,
    fat: Math.round(food.fat * s * 10) / 10,
    fib: Math.round(food.fib * s * 10) / 10,
  };
}

function sumMacros(meals) {
  return meals.reduce((t, m) => ({
    cal:  t.cal  + (m.macros?.cal  || 0),
    pro:  t.pro  + (m.macros?.pro  || 0),
    carb: t.carb + (m.macros?.carb || 0),
    fat:  t.fat  + (m.macros?.fat  || 0),
    fib:  t.fib  + (m.macros?.fib  || 0),
  }), { cal:0, pro:0, carb:0, fat:0, fib:0 });
}

function calcNutritionGoals(profile, nutritionGoals) {
  const bw = nutritionGoals.bodyweight || 80;
  const days = profile.trainingDaysPerWeek || 3;
  const mult = days <= 2 ? 26 : days <= 4 ? 28 : 30;
  const goalType = nutritionGoals.goalType || 'maintain';
  const tdee = bw * mult;
  const calories = goalType === 'lose' ? Math.round(tdee * 0.82)
                 : goalType === 'gain' ? Math.round(tdee * 1.12)
                 : Math.round(tdee);
  const proMult = goalType === 'lose' ? 2.2 : goalType === 'gain' ? 2.4 : 2.0;
  const protein = Math.round(bw * proMult);
  const fatCals = Math.round(calories * 0.25);
  const fatG = Math.round(fatCals / 9);
  const carbCals = calories - (protein * 4) - fatCals;
  const carbs = Math.max(50, Math.round(carbCals / 4));
  return { calories, protein, carbs, fat: fatG };
}

function fuzzySearch(query, limit=20) {
  if (!query.trim()) return [];
  const q = query.toLowerCase();
  return FOOD_DB
    .filter(f => f.name.toLowerCase().includes(q) || f.cat.toLowerCase().includes(q))
    .slice(0, limit);
}

function getNutritionLog(nutritionLog, date) {
  return nutritionLog[date] || { meals: [] };
}

function checkNutritionBadges(nutritionLog, weightHistory, nutritionGoals, existing) {
  const now = new Date().toISOString();
  const earned = {};
  const allMeals = Object.values(nutritionLog).flatMap(d => d.meals || []);
  if (allMeals.length >= 1 && !existing.first_meal) earned.first_meal = { unlockedAt: now };
  // Count nutrition streaks
  let streak = 0, maxStreak = 0;
  const sorted = Object.keys(nutritionLog).sort();
  for (let i = 0; i < sorted.length; i++) {
    const d = nutritionLog[sorted[i]];
    const total = sumMacros(d.meals || []);
    if (total.cal >= (nutritionGoals.calories || 1500) * 0.8) {
      streak++;
      maxStreak = Math.max(maxStreak, streak);
    } else streak = 0;
  }
  if (maxStreak >= 14 && !existing.fuel_streak) earned.fuel_streak = { unlockedAt: now };
  // Protein goal streak
  let proStreak = 0;
  for (let i = sorted.length - 1; i >= 0; i--) {
    const d = nutritionLog[sorted[i]];
    const total = sumMacros(d.meals || []);
    if (total.pro >= (nutritionGoals.protein || 150)) proStreak++;
    else break;
  }
  if (proStreak >= 5 && !existing.protein_king) earned.protein_king = { unlockedAt: now };
  // Goal weight
  if (weightHistory.length > 0 && nutritionGoals.goalWeight) {
    const latest = weightHistory[weightHistory.length - 1].weight;
    const goalType = nutritionGoals.goalType;
    const hit = goalType === 'lose' ? latest <= nutritionGoals.goalWeight
              : goalType === 'gain' ? latest >= nutritionGoals.goalWeight
              : Math.abs(latest - nutritionGoals.goalWeight) <= 0.5;
    if (hit && !existing.goal_weight) earned.goal_weight = { unlockedAt: now };
  }
  return earned;
}

function useLocalStorage(key, initial) {
  const [val, setVal] = useState(() => {
    try { const item = localStorage.getItem(key); return item ? JSON.parse(item) : initial; }
    catch { return initial; }
  });
  const setStored = useCallback((v) => {
    setVal(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      return next;
    });
  }, [key]);
  return [val, setStored];
}

   CLAUDE API
═══════════════════════════════════════════════ */
async function callClaude(apiKey, messages, maxTokens = 4000) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: maxTokens, messages }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `API error ${res.status}`);
  }
  const data = await res.json();
  return data.content[0].text;
}

async function generatePlan(profile) {
  const prompt = `You are an expert personal trainer. Generate a personalised weekly training plan.

ATHLETE PROFILE:
- Name: ${profile.name}
- Fitness Level: ${profile.fitnessLevel}
- Goal: ${profile.goal}
- Equipment: ${profile.equipment.join(', ')}
- Training Days Per Week: ${profile.trainingDaysPerWeek}
- Preferred Training Days: ${profile.trainingDays.join(', ')}
- Session Length: ${profile.sessionLength} minutes

Create a structured plan ONLY for the preferred training days. Each session should have 4–7 exercises appropriate for the session length and equipment. Lead with compound movements.

Return ONLY a valid JSON object (no markdown, no explanation) matching this EXACT schema:
{
  "planName": "string",
  "weeklySchedule": [
    {
      "day": "Monday",
      "focus": "Push – Chest & Shoulders",
      "workouts": [
        {
          "exercise": "string",
          "sets": 4,
          "reps": "8-10",
          "rest": "90s",
          "notes": "string",
          "muscleGroup": "string"
        }
      ]
    }
  ],
  "motivationalMessage": "string",
  "coachTip": "string"
}`;
  const text = await callClaude(profile.apiKey, [{ role:'user', content: prompt }], 4000);
  const match = text.match(/\{[\s\S]*\}/);

}

async function generateInsights(profile, logs, prs) {
  const recent = logs.slice(-20);
  const logSummary = recent.map(l =>
    `${l.date}: ${l.focus}, volume: ${Math.round(l.totalVolume||0)}kg, duration: ${l.duration}min`
  ).join('\n');
  const prSummary = Object.entries(prs).slice(0,6).map(([ex,pr]) =>
    `${ex}: ${pr.weight}kg × ${pr.reps}`
  ).join(', ') || 'None yet';

  const prompt = `You are a fitness coach analysing an athlete's training data.

ATHLETE: ${profile.name}, Goal: ${profile.goal}, Level: ${profile.fitnessLevel}

RECENT WORKOUTS (last ${recent.length}):
${logSummary}

PERSONAL RECORDS: ${prSummary}

Provide exactly 3 specific, actionable, motivating coaching insights based on this data.
Return ONLY a JSON array (no markdown): ["insight 1", "insight 2", "insight 3"]`;
  const text = await callClaude(profile.apiKey, [{ role:'user', content: prompt }], 800);
  const match = text.match(/\[[\s\S]*\]/);
  if (!match) return null;
  return JSON.parse(match[0]);
}

/* ═══════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════ */
function getTodayName() {
  const d = new Date().getDay(); // 0=Sun
  return DAYS[d === 0 ? 6 : d - 1];
}
function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'GOOD MORNING';
  if (h < 17) return 'GOOD AFTERNOON';
  return 'GOOD EVENING';
}
function getTodayISO() { return new Date().toISOString().split('T')[0]; }
function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'2-digit' });
}
function getDailyQuote() {
  const start = new Date(new Date().getFullYear(), 0, 0);
  const dayOfYear = Math.floor((Date.now() - start) / 86400000);
  return QUOTES[dayOfYear % QUOTES.length];
}
function getWeekStart(date = new Date()) {
  const d = new Date(date);
  const dow = d.getDay();
  const diff = dow === 0 ? 6 : dow - 1;
  d.setDate(d.getDate() - diff);
  d.setHours(0,0,0,0);
  return d.toISOString().split('T')[0];
}
function calcTotalVolume(exercises) {
  return exercises.reduce((tot, ex) =>
    tot + ex.sets.filter(s => s.done).reduce((s2, s) =>
      s2 + (parseFloat(s.weight)||0) * (parseFloat(s.reps)||0), 0
    ), 0
  );
}
function updateStreak(current, lastDate) {
  const today = getTodayISO();
  if (lastDate === today) return current;
  const yest = new Date(); yest.setDate(yest.getDate() - 1);
  const yesterdayISO = yest.toISOString().split('T')[0];
  if (lastDate === yesterdayISO) {
    const next = current.current + 1;
    return { current: next, longest: Math.max(current.longest, next), lastWorkoutDate: today };
  }
  return { current: 1, longest: Math.max(current.longest, 1), lastWorkoutDate: today };
}
function checkNewBadges(logs, prs, streak, existing) {
  const now = new Date().toISOString();
  const earned = {};
  const total = logs.reduce((s,l) => s + (l.totalVolume||0), 0);
  if (logs.length >= 1  && !existing.first_workout) earned.first_workout = { unlockedAt: now };
  if (streak.current >= 7 && !existing.week_streak)  earned.week_streak   = { unlockedAt: now };
  if (logs.length >= 10 && !existing.ten_workouts)   earned.ten_workouts  = { unlockedAt: now };
  if (Object.keys(prs).length > 0 && !existing.pr_crusher) earned.pr_crusher = { unlockedAt: now };
  if (total >= 10000    && !existing.volume_king)    earned.volume_king   = { unlockedAt: now };
  if (logs.length >= 20 && !existing.consistency)    earned.consistency   = { unlockedAt: now };
  return earned;
}

          <button onClick={() => { onSave({ ...profile, onboardingComplete: false }); }}
            className="w-full py-4 rounded-2xl bg-[#252527] text-[#F5F5F0] font-display text-xl tracking-wider active:scale-95 transition-all border border-[#3A3A3C]"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
            EDIT PROFILE
          </button>

          <button onClick={() => onGeneratePlan({ ...profile, apiKey: form.apiKey })}
            className="w-full py-4 rounded-2xl bg-[#C8FF00] text-[#0D0D0F] font-display text-xl tracking-wider active:scale-95 transition-all"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
            REGENERATE PLAN
          </button>

          {/* Nutrition goals link */}
          <button onClick={onNutritionGoals}
            className="w-full py-4 rounded-2xl bg-[#1A1A1C] text-[#C8FF00] font-display text-xl tracking-wider active:scale-95 transition-all border border-[rgba(200,255,0,0.2)] flex items-center justify-center gap-2"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
            <Flame size={18} color="#C8FF00"/> NUTRITION GOALS
          </button>
        </div>
      </div>
    );
  }

  /* ── Onboarding wizard ── */
  return (
    <div className="h-full flex flex-col bg-[#0D0D0F]">
      {/* Progress bar */}
      <div className="flex-shrink-0 px-5 pt-14 pb-0">
        <div className="flex gap-1.5 mb-8">
          {Array.from({ length: TOTAL_STEPS }).map((_,i) => (
            <div key={i} className="h-1 flex-1 rounded-full transition-all duration-300"
              style={{ background: i <= step ? '#C8FF00' : '#252527' }}/>
          ))}
        </div>
      </div>

      {/* Step content */}
      <div className="flex-1 overflow-y-auto px-5 pb-4">

        {/* Step 0: Name */}
        {step === 0 && (
          <div className="animate-fade-slide">
            <p className="text-[#C8FF00] font-display text-sm tracking-widest mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>STEP 1 OF 6</p>
            <h2 className="font-display text-5xl text-[#F5F5F0] mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>WHAT'S YOUR NAME?</h2>
            <p className="text-[#8A8A8E] mb-8">We'll use this to personalise everything.</p>
            <input type="text" value={form.name}
              onChange={e => set('name', e.target.value)}
              onKeyDown={e => e.key === 'Enter' && canAdvance() && setStep(1)}
              placeholder="Your name…" autoFocus
              className="w-full bg-[#1A1A1C] text-[#F5F5F0] rounded-2xl px-5 py-5 text-2xl font-display border border-[#3A3A3C] focus:border-[#C8FF00] outline-none tracking-wider"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}/>
          </div>
        )}

        {/* Step 1: Level */}
        {step === 1 && (
          <div className="animate-fade-slide">
            <p className="text-[#C8FF00] font-display text-sm tracking-widest mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>STEP 2 OF 6</p>
            <h2 className="font-display text-5xl text-[#F5F5F0] mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>YOUR LEVEL?</h2>
            <p className="text-[#8A8A8E] mb-8">Be honest — it helps us build the right plan.</p>
            <div className="space-y-3">
              {LEVELS.map(level => (
                <button key={level} onClick={() => set('fitnessLevel', level)}
                  className={`w-full text-left px-6 py-5 rounded-2xl border-2 transition-all active:scale-95
                    ${form.fitnessLevel === level
                      ? 'border-[#C8FF00] bg-[rgba(200,255,0,0.07)]'
                      : 'border-[#3A3A3C] bg-[#1A1A1C]'}`}>
                  <p className={`font-display text-2xl ${form.fitnessLevel === level ? 'text-[#C8FF00]' : 'text-[#F5F5F0]'}`}
                    style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{level.toUpperCase()}</p>
                  <p className="text-[#8A8A8E] text-sm mt-0.5">{LEVEL_DESC[level]}</p>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Step 2: Goal */}
        {step === 2 && (
          <div className="animate-fade-slide">
            <p className="text-[#C8FF00] font-display text-sm tracking-widest mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>STEP 3 OF 6</p>
            <h2 className="font-display text-5xl text-[#F5F5F0] mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>YOUR GOAL?</h2>
            <p className="text-[#8A8A8E] mb-8">What are you training for?</p>
            <div className="space-y-3">
              {GOALS.map(goal => (
                <button key={goal} onClick={() => set('goal', goal)}
                  className={`w-full text-left px-6 py-4 rounded-2xl border-2 transition-all active:scale-95
                    ${form.goal === goal
                      ? 'border-[#C8FF00] bg-[rgba(200,255,0,0.07)]'
                      : 'border-[#3A3A3C] bg-[#1A1A1C]'}`}>
                  <p className={`font-display text-xl ${form.goal === goal ? 'text-[#C8FF00]' : 'text-[#F5F5F0]'}`}
                    style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{goal.toUpperCase()}</p>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Step 3: Equipment */}
        {step === 3 && (
          <div className="animate-fade-slide">
            <p className="text-[#C8FF00] font-display text-sm tracking-widest mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>STEP 4 OF 6</p>
            <h2 className="font-display text-5xl text-[#F5F5F0] mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>EQUIPMENT?</h2>
            <p className="text-[#8A8A8E] mb-8">Select everything you have access to.</p>
            <div className="flex flex-wrap gap-3">
              {EQUIPMENT_OPTIONS.map(eq => (
                <Pill key={eq} active={form.equipment.includes(eq)} onClick={() => toggleArr('equipment', eq)}>{eq}</Pill>
              ))}
            </div>
          </div>
        )}

        {/* Step 4: Training days */}
        {step === 4 && (
          <div className="animate-fade-slide">
            <p className="text-[#C8FF00] font-display text-sm tracking-widest mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>STEP 5 OF 6</p>
            <h2 className="font-display text-5xl text-[#F5F5F0] mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>TRAINING DAYS?</h2>
            <p className="text-[#8A8A8E] mb-6">Which days will you train each week?</p>
            <div className="flex justify-between gap-1 mb-5">
              {DAY_ABBR.map((abbr, i) => {
                const day = DAYS[i];
                const on = form.trainingDays.includes(day);
                return (
                  <button key={day} onClick={() => toggleArr('trainingDays', day)}
                    className={`w-10 h-10 rounded-xl text-xs font-display transition-all active:scale-90
                      ${on ? 'bg-[#C8FF00] text-[#0D0D0F]' : 'bg-[#1A1A1C] text-[#8A8A8E] border border-[#3A3A3C]'}`}
                    style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
                    {abbr}
                  </button>
                );
              })}
            </div>
            {form.trainingDays.length > 0 && (
              <div className="bg-[#1A1A1C] rounded-2xl p-4 border border-[#252527] flex flex-wrap gap-2">
                {form.trainingDays.map(d => (
                  <span key={d} className="text-[#C8FF00] text-xs bg-[rgba(200,255,0,0.1)] px-2 py-0.5 rounded-full">{d.slice(0,3)}</span>
                ))}
                <span className="text-[#8A8A8E] text-xs ml-auto self-center">{form.trainingDays.length} days</span>
              </div>
            )}
          </div>
        )}

        {/* Step 5: Session length + API key */}
        {step === 5 && (
          <div className="animate-fade-slide">
            <p className="text-[#C8FF00] font-display text-sm tracking-widest mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>STEP 6 OF 6</p>
            <h2 className="font-display text-5xl text-[#F5F5F0] mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>LAST DETAILS</h2>
            <p className="text-[#8A8A8E] mb-6">Session length and your API key.</p>

            <div className="grid grid-cols-4 gap-3 mb-8">
              {SESSION_LENGTHS.map(len => (
                <button key={len} onClick={() => set('sessionLength', len)}
                  className={`py-4 rounded-2xl text-center border-2 transition-all active:scale-95
                    ${form.sessionLength === len
                      ? 'border-[#C8FF00] bg-[rgba(200,255,0,0.07)]'
                      : 'border-[#3A3A3C] bg-[#1A1A1C]'}`}>
                  <p className={`font-display text-2xl ${form.sessionLength === len ? 'text-[#C8FF00]' : 'text-[#F5F5F0]'}`}
                    style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{len}</p>
                  <p className="text-[#8A8A8E] text-xs">min</p>
                </button>
              ))}
            </div>

            <div className="bg-[#1A1A1C] rounded-2xl p-5 border border-[#252527]">
              <p className="text-[#F5F5F0] font-semibold mb-1">Anthropic API Key</p>
              <p className="text-[#8A8A8E] text-xs mb-3">
                Get yours at <span className="text-[#C8FF00]">console.anthropic.com</span> — required to generate your AI plan.
              </p>
              <input type="password" value={form.apiKey}
                onChange={e => set('apiKey', e.target.value)}
                placeholder="sk-ant-api03-…"
                className="w-full bg-[#252527] text-[#F5F5F0] rounded-xl px-4 py-3 text-sm border border-[#3A3A3C] focus:border-[#C8FF00] outline-none"/>
            </div>
          </div>
        )}
      </div>

      {/* CTA row */}
      <div className="flex-shrink-0 px-5 py-4 flex gap-3"
        style={{ paddingBottom:'max(1.5rem, env(safe-area-inset-bottom))' }}>
        {step > 0 && (
          <button onClick={() => setStep(s => s - 1)}
            className="w-14 h-14 rounded-2xl bg-[#1A1A1C] flex items-center justify-center active:scale-95 transition-all border border-[#3A3A3C]">
            <ChevronLeft size={24} color="#F5F5F0"/>
          </button>
        )}
        <button
          onClick={() => step < TOTAL_STEPS - 1 ? setStep(s => s + 1) : handleFinish()}
          disabled={!canAdvance()}
          className={`flex-1 py-4 rounded-2xl font-display text-xl tracking-wider transition-all active:scale-95
            ${canAdvance() ? 'bg-[#C8FF00] text-[#0D0D0F]' : 'bg-[#252527] text-[#8A8A8E]'}`}
          style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
          {step === TOTAL_STEPS - 1 ? 'GENERATE MY PLAN' : 'CONTINUE'}
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   HOME SCREEN
═══════════════════════════════════════════════ */
function HomeScreen({ profile, plan, logs, streak, prs, onStartWorkout, onSetTab }) {
  const today      = getTodayName();
  const todayISO   = getTodayISO();
  const weekStart  = getWeekStart();
  const todayPlan  = plan?.weeklySchedule?.find(s => s.day === today);
  const isTrainingDay   = profile.trainingDays?.includes(today);
  const workedOutToday  = logs.some(l => l.date === todayISO);
  const workoutsThisWeek = logs.filter(l => l.date >= weekStart).length;
  const totalVolume = logs.reduce((s,l) => s + (l.totalVolume||0), 0);
  const quote = getDailyQuote();
  const fmtVol = v => v >= 1000 ? `${(v/1000).toFixed(1)}t` : `${Math.round(v)}kg`;

  return (
    <div className="h-full overflow-y-auto pb-28">
      <div className="px-5 pt-14 pb-4">
        <div className="flex items-start justify-between">
          <div className="flex-1 min-w-0 pr-3">
            <p className="text-[#8A8A8E] text-xs uppercase tracking-widest mb-1">
              {new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' })}
            </p>
            <h1 className="font-display leading-tight" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
              <span className="text-3xl text-[#F5F5F0] block">{getGreeting()},</span>
              <span className="text-4xl text-[#C8FF00] block">{(profile.name||'ATHLETE').toUpperCase()}.</span>
            </h1>
          </div>
          {streak.current > 0 && (
            <div className="bg-[#1A1A1C] rounded-2xl px-3 py-2 flex items-center gap-1.5 border border-[#252527] flex-shrink-0">
              <span className="text-xl">🔥</span>
              <div>
                <p className="font-display text-2xl text-[#C8FF00] leading-none"
                  style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{streak.current}</p>
                <p className="text-[#8A8A8E] text-[9px] uppercase tracking-wider leading-none mt-0.5">STREAK</p>
              </div>
            </div>
          )}
        </div>
      </div>

      <div className="px-5 mb-4">
        {isTrainingDay && todayPlan ? (
          <div className="rounded-3xl overflow-hidden border border-[#252527]"
            style={{ background:'linear-gradient(140deg, #1A1A1C 0%, #252527 100%)' }}>
            <div className="p-5">
              <div className="flex items-center justify-between mb-3">
                <span className="text-[#C8FF00] text-xs font-display tracking-widest bg-[rgba(200,255,0,0.12)] px-3 py-1 rounded-full border border-[rgba(200,255,0,0.2)]"
                  style={{ fontFamily:"'Bebas Neue',sans-serif" }}>TODAY'S SESSION</span>
                {workedOutToday && (
                  <span className="flex items-center gap-1 text-[#C8FF00] text-xs font-semibold">
                    <Check size={12}/> DONE
                  </span>
                )}
              </div>
              <h2 className="font-display text-3xl text-[#F5F5F0] mb-1"
                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{todayPlan.focus}</h2>
              <div className="flex items-center gap-4 text-[#8A8A8E] text-sm mb-5">
                <span className="flex items-center gap-1.5"><Dumbbell size={13}/>{todayPlan.workouts?.length} exercises</span>
                <span className="flex items-center gap-1.5"><Clock size={13}/>~{profile.sessionLength} min</span>
              </div>
              <div className="space-y-2 mb-5">
                {todayPlan.workouts?.slice(0,3).map((w,i) => (
                  <div key={i} className="flex items-center justify-between">
                    <div className="flex items-center gap-2 min-w-0 flex-1">
                      <span className="text-[#8A8A8E] text-xs w-4 flex-shrink-0">{i+1}</span>
                      <span className="text-[#F5F5F0] text-sm truncate">{w.exercise}</span>
                    </div>
                    <span className="text-[#8A8A8E] text-xs ml-2 flex-shrink-0">{w.sets}×{w.reps}</span>
                  </div>
                ))}
                {(todayPlan.workouts?.length||0) > 3 && (
                  <p className="text-[#8A8A8E] text-xs pl-6">+{todayPlan.workouts.length - 3} more exercises</p>
                )}
              </div>
              <button onClick={() => onStartWorkout(todayPlan)}
                className="w-full py-4 rounded-2xl bg-[#C8FF00] text-[#0D0D0F] font-display text-xl tracking-wider active:scale-95 transition-all"
                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
                {workedOutToday ? 'WORKOUT AGAIN' : 'START WORKOUT'}
              </button>
            </div>
          </div>
        ) : !isTrainingDay ? (
          <div className="bg-[#1A1A1C] rounded-3xl p-6 border border-[#252527] text-center">
            <div className="text-5xl mb-3">😴</div>
            <h2 className="font-display text-2xl text-[#F5F5F0] mb-2"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>REST DAY</h2>
            <p className="text-[#8A8A8E] text-sm leading-relaxed">
              Recovery is where the gains happen. Hydrate, sleep well, and come back stronger.
            </p>
          </div>
        ) : (
          <div className="bg-[#1A1A1C] rounded-3xl p-6 border border-[rgba(200,255,0,0.15)]">
            <div className="text-5xl mb-3">⚡</div>
            <h2 className="font-display text-2xl text-[#F5F5F0] mb-2"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>NO PLAN YET</h2>
            <p className="text-[#8A8A8E] text-sm mb-4">Generate your AI-powered training plan to get started.</p>
            <button onClick={() => onSetTab('profile')}
              className="px-5 py-3 rounded-xl bg-[#C8FF00] text-[#0D0D0F] font-display text-base tracking-wider active:scale-95 transition-all"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
              BUILD MY PLAN →
            </button>
          </div>
        )}
      </div>

      <div className="px-5 mb-4">
        <div className="flex gap-3">
          <StatCard label="THIS WEEK" value={`${workoutsThisWeek}`} sub="sessions"/>
          <StatCard label="TOTAL VOL" value={fmtVol(totalVolume)} sub="lifted"/>
          <StatCard label="SESSIONS"  value={`${logs.length}`} sub="all time"/>
        </div>
      </div>

      {plan?.coachTip && (
        <div className="px-5 mb-4">
          <div className="bg-[#1A1A1C] rounded-2xl p-4 border border-[#252527] flex gap-3">
            <Zap size={18} color="#C8FF00" className="flex-shrink-0 mt-0.5"/>
            <div>
              <p className="text-[#C8FF00] text-[10px] font-display tracking-widest mb-1"
                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>COACH TIP</p>
              <p className="text-[#F5F5F0] text-sm leading-relaxed">{plan.coachTip}</p>
            </div>
          </div>
        </div>
      )}

      <div className="px-5 mb-4">
        <div className="bg-[#1A1A1C] rounded-2xl p-5 border border-[#252527]">
          <p className="font-display text-lg text-[#F5F5F0] leading-snug"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>"{quote}"</p>
        </div>
      </div>

      {Object.keys(prs).length > 0 && (
        <div className="px-5 mb-4">
          <p className="text-[#8A8A8E] text-xs uppercase tracking-widest mb-2">Personal Records</p>
          <div className="flex gap-2 overflow-x-auto pb-1" style={{ scrollbarWidth:'none' }}>
            {Object.entries(prs).slice(0,5).map(([ex, pr]) => (
              <div key={ex} className="flex-shrink-0 bg-[#1A1A1C] rounded-xl px-4 py-3 border border-[#252527]">
                <p className="font-display text-lg text-[#C8FF00] leading-none"
                  style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{pr.weight}kg</p>
                <p className="text-[#F5F5F0] text-xs mt-0.5 whitespace-nowrap max-w-[100px] truncate">{ex}</p>
                <p className="text-[#8A8A8E] text-[10px]">×{pr.reps} reps</p>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   PLAN SCREEN
═══════════════════════════════════════════════ */
function PlanScreen({ plan, profile, onRegenerate }) {
  const [selDay, setSelDay] = useState(getTodayName());
  const today = getTodayName();

  if (!plan) {
    return (
      <div className="h-full flex flex-col items-center justify-center px-5 pb-24 text-center">
        <div className="text-6xl mb-4">📋</div>
        <h2 className="font-display text-3xl text-[#F5F5F0] mb-2"
          style={{ fontFamily:"'Bebas Neue',sans-serif" }}>NO PLAN YET</h2>
        <p className="text-[#8A8A8E]">Complete your profile to generate an AI-powered training plan.</p>
      </div>
    );
  }

  const scheduledDays = plan.weeklySchedule.map(s => s.day);
  const selSchedule   = plan.weeklySchedule.find(s => s.day === selDay);

  return (
    <div className="h-full overflow-y-auto pb-28">
      <div className="px-5 pt-14 pb-4">
        <div className="flex items-start justify-between">
          <div className="flex-1 min-w-0 pr-2">
            <h1 className="font-display text-4xl text-[#F5F5F0] leading-tight"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{plan.planName || 'MY PLAN'}</h1>
            <p className="text-[#8A8A8E] text-xs mt-0.5">
              {plan.weeklySchedule.length} training days · {profile.sessionLength} min sessions
            </p>
          </div>
          <button onClick={onRegenerate}
            className="w-10 h-10 rounded-xl bg-[#1A1A1C] flex items-center justify-center active:scale-95 transition-all border border-[#252527] flex-shrink-0">
            <RefreshCw size={17} color="#C8FF00"/>
          </button>
        </div>
      </div>

      <div className="px-5 mb-4">
        <div className="flex gap-2 overflow-x-auto pb-1" style={{ scrollbarWidth:'none' }}>
          {DAYS.map(day => {
            const has = scheduledDays.includes(day);
            const sel = selDay === day;
            const isToday = day === today;
            return (
              <button key={day} onClick={() => setSelDay(day)}
                className={`flex-shrink-0 px-3 py-2 rounded-xl text-xs font-display tracking-wider transition-all active:scale-95 relative
                  ${sel ? 'bg-[#C8FF00] text-[#0D0D0F]'
                        : has ? 'bg-[#1A1A1C] text-[#F5F5F0] border border-[#3A3A3C]'
                              : 'bg-[#0D0D0F] text-[#3A3A3C] border border-[#1A1A1C]'}`}
                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
                {day.slice(0,3).toUpperCase()}
                {isToday && (
                  <span className={`absolute -top-1 -right-1 w-2 h-2 rounded-full ${sel ? 'bg-[#0D0D0F]' : 'bg-[#C8FF00]'}`}/>
                )}
              </button>
            );
          })}
        </div>
      </div>

      <div className="px-5">
        {selSchedule ? (
          <div className="animate-fade-slide">
            <div className="mb-4">
              <h2 className="font-display text-3xl text-[#F5F5F0]"
                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{selSchedule.focus}</h2>
              <p className="text-[#8A8A8E] text-sm">{selSchedule.workouts.length} exercises · ~{profile.sessionLength} min</p>
            </div>
            <div className="space-y-3">
              {selSchedule.workouts.map((w,i) => (
                <div key={i} className="bg-[#1A1A1C] rounded-2xl p-4 border border-[#252527]">
                  <div className="flex items-start justify-between">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 mb-1.5">
                        <span className="text-[#8A8A8E] text-xs font-display w-5 flex-shrink-0"
                          style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{i+1}</span>
                        <h3 className="font-semibold text-[#F5F5F0] truncate">{w.exercise}</h3>
                      </div>
                      <div className="pl-7"><MuscleTag group={w.muscleGroup}/></div>
                    </div>
                    <div className="text-right ml-3 flex-shrink-0">
                      <p className="font-display text-xl text-[#C8FF00]"
                        style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{w.sets}×{w.reps}</p>
                      <p className="text-[#8A8A8E] text-xs">{w.rest} rest</p>
                    </div>
                  </div>
                  {w.notes && (
                    <p className="text-[#8A8A8E] text-xs mt-2 pl-7 italic leading-relaxed">"{w.notes}"</p>
                  )}
                </div>
              ))}
            </div>
          </div>
        ) : (
          <div className="text-center py-12">
            <div className="text-4xl mb-3">🛌</div>
            <p className="font-display text-2xl text-[#F5F5F0] mb-2"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>REST DAY</p>
            <p className="text-[#8A8A8E] text-sm">Recovery is part of the programme.</p>
          </div>
        )}
      </div>

      {plan.motivationalMessage && (
        <div className="px-5 mt-6 mb-2">
          <div className="bg-[rgba(200,255,0,0.05)] rounded-2xl p-5 border border-[rgba(200,255,0,0.12)]">
            <p className="text-[#C8FF00] text-[10px] font-display tracking-widest mb-2"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>FROM YOUR COACH</p>
            <p className="text-[#F5F5F0] text-sm leading-relaxed">{plan.motivationalMessage}</p>
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   LOG SCREEN — Active Workout
═══════════════════════════════════════════════ */
function LogScreen({ planDay, onComplete, onClose }) {
  const [exLogs, setExLogs] = useState(() =>
    (planDay?.workouts || []).map(w => ({
      ...w,
      sets: Array.from({ length: w.sets }, () => ({ reps:'', weight:'', done:false }))
    }))
  );
  const [restTimer, setRestTimer]  = useState(null); // { seconds, total }
  const [elapsed, setElapsed]      = useState(0);
  const startTime = useRef(Date.now());

  /* elapsed ticker — update every 30s */
  useEffect(() => {
    const t = setInterval(() => setElapsed(Math.round((Date.now() - startTime.current) / 60000)), 30000);
    return () => clearInterval(t);
  }, []);

  /* rest timer countdown */
  useEffect(() => {
    if (!restTimer || restTimer.seconds <= 0) { if (restTimer) setRestTimer(null); return; }
    const t = setTimeout(() => setRestTimer(r => r ? { ...r, seconds: r.seconds - 1 } : null), 1000);
    return () => clearTimeout(t);
  }, [restTimer]);

  const updateSet = (ei, si, field, value) =>
    setExLogs(prev => prev.map((ex, eidx) =>
      eidx !== ei ? ex : { ...ex, sets: ex.sets.map((s, sidx) =>
        sidx !== si ? s : { ...s, [field]: value }
      )}
    ));

  const completeSet = (ei, si) => {
    setExLogs(prev => prev.map((ex, eidx) =>
      eidx !== ei ? ex : { ...ex, sets: ex.sets.map((s, sidx) =>
        sidx !== si ? s : { ...s, done: true }
      )}
    ));
    /* start rest timer */
    const restStr = exLogs[ei]?.rest || '60s';
    const secs = parseInt(restStr) || 60;
    setRestTimer({ seconds: secs, total: secs });
  };

  const handleFinish = () => {
    const duration = Math.max(1, Math.round((Date.now() - startTime.current) / 60000));
    const totalVolume = calcTotalVolume(exLogs);
    onComplete({ day: planDay.day, focus: planDay.focus, duration, exercises: exLogs, totalVolume });
  };

  const completedSets = exLogs.reduce((n, ex) => n + ex.sets.filter(s => s.done).length, 0);
  const totalSets     = exLogs.reduce((n, ex) => n + ex.sets.length, 0);
  const progress      = totalSets > 0 ? completedSets / totalSets : 0;

  return (
    <div className="fixed inset-0 bg-[#0D0D0F] z-40 flex flex-col animate-slide-up"
      style={{ maxWidth:430, left:'50%', transform:'translateX(-50%)' }}>

      {/* Header */}
      <div className="flex-shrink-0 px-5 pt-14 pb-3 border-b border-[#1A1A1C]">
        <div className="flex items-center justify-between mb-3">
          <div className="min-w-0 flex-1">
            <p className="text-[#8A8A8E] text-xs uppercase tracking-widest">{planDay.day}</p>
            <h1 className="font-display text-2xl text-[#F5F5F0] leading-tight truncate"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{planDay.focus}</h1>
          </div>
          <div className="flex items-center gap-3 ml-3 flex-shrink-0">
            <div className="text-right">
              <p className="font-display text-xl text-[#C8FF00] leading-none"
                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{elapsed}m</p>
              <p className="text-[#8A8A8E] text-[10px]">elapsed</p>
            </div>
            <button onClick={onClose}
              className="w-9 h-9 rounded-xl bg-[#1A1A1C] flex items-center justify-center active:scale-90 border border-[#252527]">
              <X size={16} color="#8A8A8E"/>
            </button>
          </div>
        </div>
        <div className="h-1.5 bg-[#252527] rounded-full overflow-hidden">
          <div className="h-full bg-[#C8FF00] rounded-full transition-all duration-500"
            style={{ width:`${progress * 100}%` }}/>
        </div>
        <p className="text-[#8A8A8E] text-xs mt-1">{completedSets} / {totalSets} sets</p>
      </div>

      {/* Exercise list */}
      <div className="flex-1 overflow-y-auto px-5 py-4 pb-28">
        {exLogs.map((ex, ei) => {
          const allDone = ex.sets.every(s => s.done);
          const doneSets = ex.sets.filter(s => s.done).length;
          return (
            <div key={ei} className={`mb-4 rounded-2xl overflow-hidden border transition-all
              ${allDone
                ? 'border-[rgba(200,255,0,0.25)] bg-[rgba(200,255,0,0.03)]'
                : 'border-[#252527] bg-[#1A1A1C]'}`}>

              {/* Exercise header */}
              <div className="px-4 py-3 flex items-center justify-between">
                <div className="min-w-0 flex-1">
                  <h3 className={`font-semibold truncate ${allDone ? 'text-[#C8FF00]' : 'text-[#F5F5F0]'}`}>
                    {ex.exercise}
                  </h3>
                  <div className="flex items-center gap-2 mt-0.5 flex-wrap">
                    <MuscleTag group={ex.muscleGroup}/>
                    <span className="text-[#8A8A8E] text-xs">{ex.sets.length} sets · {ex.reps} reps · {ex.rest}</span>
                  </div>
                </div>
                <div className="ml-3 flex-shrink-0 text-right">
                  {allDone
                    ? <Check size={20} color="#C8FF00"/>
                    : <span className="text-[#8A8A8E] text-xs">{doneSets}/{ex.sets.length}</span>}
                </div>
              </div>

              {/* Set rows */}
              <div className="px-4 pb-4">
                {/* Column labels */}
                <div className="flex items-center gap-2 mb-2">
                  <span className="w-7 text-[#8A8A8E] text-xs text-center">SET</span>
                  <span className="flex-1 text-[#8A8A8E] text-xs text-center">KG</span>
                  <span className="flex-1 text-[#8A8A8E] text-xs text-center">REPS</span>
                  <span className="w-12 text-[#8A8A8E] text-xs text-center">✓</span>
                </div>

                {ex.sets.map((s, si) => (
                  <div key={si}
                    className={`flex items-center gap-2 mb-2 transition-opacity ${s.done ? 'opacity-60' : ''}`}>
                    <span className={`w-7 text-center font-display text-sm flex-shrink-0
                      ${s.done ? 'text-[#C8FF00]' : 'text-[#8A8A8E]'}`}
                      style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
                      {si + 1}
                    </span>
                    <input type="number" value={s.weight}
                      onChange={e => updateSet(ei, si, 'weight', e.target.value)}
                      placeholder="0" disabled={s.done}
                      className={`set-input flex-1 ${s.done ? 'done' : ''}`}/>
                    <input type="number" value={s.reps}
                      onChange={e => updateSet(ei, si, 'reps', e.target.value)}
                      placeholder="0" disabled={s.done}
                      className={`set-input flex-1 ${s.done ? 'done' : ''}`}/>
                    <button
                      onClick={() => !s.done && completeSet(ei, si)}
                      disabled={s.done}
                      className={`w-12 h-12 rounded-xl flex items-center justify-center transition-all active:scale-90 flex-shrink-0
                        ${s.done
                          ? 'bg-[rgba(200,255,0,0.12)] border border-[rgba(200,255,0,0.3)]'
                          : 'bg-[#252527] border border-[#3A3A3C]'}`}>
                      <Check size={18} color={s.done ? '#C8FF00' : '#8A8A8E'}/>
                    </button>
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>

      {/* Rest timer float */}
      {restTimer && restTimer.seconds > 0 && (
        <div className="absolute bottom-24 left-1/2 -translate-x-1/2 bg-[#1A1A1C] rounded-2xl px-5 py-3
          flex items-center gap-4 border border-[#3A3A3C] shadow-2xl z-10 animate-scale-in">
          <div className="relative w-12 h-12 flex-shrink-0">
            <svg className="w-12 h-12 -rotate-90" viewBox="0 0 44 44">
              <circle cx="22" cy="22" r="18" fill="none" stroke="#252527" strokeWidth="3"/>
              <circle cx="22" cy="22" r="18" fill="none" stroke="#C8FF00" strokeWidth="3"
                strokeDasharray={`${2 * Math.PI * 18}`}
                strokeDashoffset={`${2 * Math.PI * 18 * (1 - restTimer.seconds / restTimer.total)}`}
                strokeLinecap="round" className="transition-all duration-1000"/>
            </svg>
            <span className="absolute inset-0 flex items-center justify-center font-display text-xs text-[#C8FF00]"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{restTimer.seconds}</span>
          </div>
          <div className="min-w-0">
            <p className="font-display text-lg text-[#F5F5F0] leading-none"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>REST</p>
            <p className="text-[#8A8A8E] text-xs">{restTimer.seconds}s remaining</p>
          </div>
          <button onClick={() => setRestTimer(null)}
            className="px-3 py-1.5 rounded-lg bg-[#252527] text-[#F5F5F0] text-xs font-semibold active:scale-95 flex items-center gap-1 flex-shrink-0">
            <SkipForward size={12}/> SKIP
          </button>
        </div>
      )}

      {/* Finish button */}
      <div className="absolute bottom-0 left-0 right-0 px-5 py-3 bg-[#0D0D0F] border-t border-[#1A1A1C]"
        style={{ paddingBottom:'max(1.25rem, env(safe-area-inset-bottom))' }}>
        <button onClick={handleFinish}
          className="w-full py-4 rounded-2xl bg-[#C8FF00] text-[#0D0D0F] font-display text-xl tracking-wider active:scale-95 transition-all"
          style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
          FINISH WORKOUT
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   PROGRESS SCREEN
═══════════════════════════════════════════════ */
function ProgressScreen({ logs, prs, badges, profile, nutritionLog={}, nutritionGoals={}, weightHistory=[] }) {
  const [insights, setInsights]         = useState(null);
  const [loadingInsights, setLoading]   = useState(false);
  const [insightError, setInsightError] = useState(null);

  /* Weekly volume — last 8 weeks */
  const weeklyData = useMemo(() => {
    return Array.from({ length: 8 }, (_, i) => {
      const d = new Date();
      d.setDate(d.getDate() - (7 - i) * 7);
      const wStart = getWeekStart(d);
      const wEnd   = new Date(wStart);
      wEnd.setDate(wEnd.getDate() + 6);
      const wEndISO = wEnd.toISOString().split('T')[0];
      const vol = logs.filter(l => l.date >= wStart && l.date <= wEndISO)
                      .reduce((s,l) => s + (l.totalVolume||0), 0);
      const isNow = i === 7;
      const label = isNow ? 'Now' : `-${7-i}w`;
      return { label, volume: Math.round(vol), isNow };
    });
  }, [logs]);

  const maxVol = Math.max(...weeklyData.map(w => w.volume), 1);

  /* Heatmap — last 56 days */
  const heatmapData = useMemo(() => {
    return Array.from({ length: 56 }, (_, i) => {
      const d = new Date();
      d.setDate(d.getDate() - (55 - i));
      const iso = d.toISOString().split('T')[0];
      const log = logs.find(l => l.date === iso);
      return { iso, volume: log?.totalVolume || 0, has: !!log };
    });
  }, [logs]);

  const maxCell = Math.max(...heatmapData.map(c => c.volume), 1);

  const totalVolume = logs.reduce((s,l) => s + (l.totalVolume||0), 0);
  const fmtVol = v => v >= 1000 ? `${(v/1000).toFixed(1)}t` : `${Math.round(v)}kg`;

  const loadInsights = async () => {
    if (!profile.apiKey) { setInsightError('Add your API key in Profile to unlock AI insights.'); return; }
    setLoading(true); setInsightError(null);
    try {
      const data = await generateInsights(profile, logs, prs);
      setInsights(data);
    } catch(e) { setInsightError(e.message); }
    finally { setLoading(false); }
  };

  return (
    <div className="h-full overflow-y-auto pb-28">
      <div className="px-5 pt-14 pb-4">
        <h1 className="font-display text-5xl text-[#F5F5F0]"
          style={{ fontFamily:"'Bebas Neue',sans-serif" }}>PROGRESS</h1>
        <p className="text-[#8A8A8E] text-sm">{logs.length} workouts logged</p>
      </div>

      {logs.length === 0 ? (
        <div className="px-5 py-16 text-center">
          <div className="text-6xl mb-4">📊</div>
          <h2 className="font-display text-3xl text-[#F5F5F0] mb-2"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>THE IRON AWAITS</h2>
          <p className="text-[#8A8A8E]">Hit that LOG button to start tracking your gains.</p>
        </div>
      ) : (
        <>
          {/* Quick stats */}
          <div className="px-5 mb-6">
            <div className="flex gap-3">
              <StatCard label="SESSIONS" value={logs.length}/>
              <StatCard label="TOTAL VOL" value={fmtVol(totalVolume)}/>
              <StatCard label="PRs SET" value={Object.keys(prs).length}/>
            </div>
          </div>

          {/* Volume bar chart */}
          <div className="px-5 mb-6">
            <h2 className="font-display text-2xl text-[#F5F5F0] mb-3"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>WEEKLY VOLUME</h2>
            <div className="bg-[#1A1A1C] rounded-2xl p-4 border border-[#252527]">
              <svg viewBox="0 0 336 110" width="100%" style={{ display:'block' }}>
                {weeklyData.map((w, i) => {
                  const barH = Math.max(2, (w.volume / maxVol) * 72);
                  const x    = i * 42 + 4;
                  const y    = 80 - barH;
                  return (
                    <g key={i}>
                      <rect x={x} y={y} width={34} height={barH} rx="4"
                        fill={w.isNow ? '#C8FF00' : '#3A3A3C'}/>
                      <text x={x+17} y={97} textAnchor="middle"
                        fill={w.isNow ? '#C8FF00' : '#8A8A8E'} fontSize="8" fontFamily="DM Sans">
                        {w.label}
                      </text>
                      {w.volume > 0 && (
                        <text x={x+17} y={y-4} textAnchor="middle"
                          fill={w.isNow ? '#C8FF00' : '#8A8A8E'} fontSize="7" fontFamily="DM Sans">
                          {fmtVol(w.volume)}
                        </text>
                      )}
                    </g>
                  );
                })}
              </svg>
            </div>
          </div>

          {/* Heatmap */}
          <div className="px-5 mb-6">
            <h2 className="font-display text-2xl text-[#F5F5F0] mb-3"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>CONSISTENCY</h2>
            <div className="bg-[#1A1A1C] rounded-2xl p-4 border border-[#252527]">
              <div style={{ display:'grid', gridTemplateColumns:'repeat(8,1fr)', gap:4 }}>
                {heatmapData.map((cell, i) => {
                  let bg = '#252527';
                  if (cell.has) {
                    const pct = cell.volume / maxCell;
                    bg = pct > 0.7 ? '#C8FF00'
                       : pct > 0.4 ? 'rgba(200,255,0,0.65)'
                       : pct > 0.15 ? 'rgba(200,255,0,0.35)'
                       : 'rgba(200,255,0,0.15)';
                  }
                  return (
                    <div key={i} style={{ background:bg, borderRadius:3, aspectRatio:'1' }}
                      title={cell.iso}/>
                  );
                })}
              </div>
              <p className="text-[#8A8A8E] text-xs mt-3">Last 8 weeks · darker = more volume</p>
            </div>
          </div>

          {/* PRs */}
          {Object.keys(prs).length > 0 && (
            <div className="px-5 mb-6">
              <h2 className="font-display text-2xl text-[#F5F5F0] mb-3"
                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>PERSONAL RECORDS</h2>
              <div className="bg-[#1A1A1C] rounded-2xl overflow-hidden border border-[#252527]">
                {Object.entries(prs).map(([exercise, pr], i) => (
                  <div key={exercise}
                    className={`flex items-center justify-between px-4 py-3
                      ${i > 0 ? 'border-t border-[#252527]' : ''}`}>
                    <div className="min-w-0 flex-1">
                      <p className="text-[#F5F5F0] text-sm font-medium truncate">{exercise}</p>
                      <p className="text-[#8A8A8E] text-xs">{formatDate(pr.date)}</p>
                    </div>
                    <div className="text-right ml-3 flex-shrink-0">
                      <p className="font-display text-xl text-[#C8FF00]"
                        style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{pr.weight}kg</p>
                      <p className="text-[#8A8A8E] text-xs">× {pr.reps} reps</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      )}

      {/* AI Insights — always visible */}
      <div className="px-5 mb-6">
        <h2 className="font-display text-2xl text-[#F5F5F0] mb-3"
          style={{ fontFamily:"'Bebas Neue',sans-serif" }}>AI INSIGHTS</h2>
        {!insights && !loadingInsights && (
          <button onClick={loadInsights}
            className="w-full py-4 rounded-2xl bg-[#1A1A1C] border border-[#3A3A3C] text-[#C8FF00] font-display text-lg tracking-wider active:scale-95 transition-all flex items-center justify-center gap-2"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
            <Zap size={18}/> ANALYSE MY TRAINING
          </button>
        )}
        {loadingInsights && (

/* Circular calorie ring */
function CalorieRing({ consumed, goal }) {
  const r = 72, cx = 90, cy = 90;
  const circ = 2 * Math.PI * r;
  const pct = goal > 0 ? Math.min(consumed / goal, 1.05) : 0;
  const dash = circ * Math.min(pct, 1);
  const color = consumed < goal * 0.5 ? '#FF453A'
              : consumed < goal * 0.85 ? '#FF9F0A'
              : consumed <= goal       ? '#C8FF00'
              : '#F5F5F0';
  return (
    <div className="relative flex items-center justify-center" style={{ width:180,height:180 }}>
      <svg width="180" height="180" viewBox="0 0 180 180" style={{ position:'absolute' }}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#252527" strokeWidth="14"/>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="14"
          strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
          transform={`rotate(-90 ${cx} ${cy})`}
          style={{ transition:'stroke-dasharray 0.7s ease, stroke 0.4s ease' }}/>
      </svg>
      <div className="flex flex-col items-center justify-center" style={{ zIndex:1 }}>
        <p className="font-display leading-none" style={{ fontFamily:"'Bebas Neue',sans-serif",
          fontSize:42, color:'#F5F5F0' }}>{consumed}</p>
        <p className="font-display text-sm tracking-widest" style={{ fontFamily:"'Bebas Neue',sans-serif",
          color }}>KCAL</p>
        <p className="text-xs mt-0.5" style={{ color:'#8A8A8E' }}>of {goal} goal</p>
      </div>
    </div>
  );
}

/* Single macro progress card */
function MacroCard({ label, current, goal, color, unit='g' }) {
  const pct = goal > 0 ? Math.min(current / goal, 1) : 0;
  const hit = current >= goal;
  return (
    <div className="bg-[#1A1A1C] rounded-2xl p-3 flex-1 border border-[#252527]">
      <div className="flex items-baseline justify-between mb-1.5">
        <span className="text-[#8A8A8E] text-[10px] uppercase tracking-wider">{label}</span>
        {hit && <span className="text-[9px] font-bold" style={{ color }}>✓</span>}
      </div>
      <p className="font-display text-xl leading-none mb-2"
        style={{ fontFamily:"'Bebas Neue',sans-serif", color:'#F5F5F0' }}>
        {Math.round(current)}<span className="text-xs font-body text-[#8A8A8E]">{unit}</span>
      </p>
      <div className="h-1.5 rounded-full bg-[#252527] overflow-hidden">
        <div className="h-full rounded-full transition-all duration-500"
          style={{ width:`${pct*100}%`, background: color }}/>
      </div>
      <p className="text-[#8A8A8E] text-[10px] mt-1">of {goal}{unit}</p>
    </div>
  );
}

/* Weight SVG line chart */
function WeightChart({ history, goalWeight }) {
  if (history.length < 2) return (
    <div className="text-center py-6 text-[#8A8A8E] text-sm">
      Log at least 2 days to see your trend
    </div>
  );
  const data = history.slice(-30);
  const W=320, H=100, PL=28, PR=8, PT=10, PB=22;
  const ws = data.map(h=>h.weight);
  const minW = Math.min(...ws) - 0.5;
  const maxW = Math.max(...ws) + 0.5;
  const px = i => PL + (i/(data.length-1))*(W-PL-PR);
  const py = w => PT + ((maxW-w)/(maxW-minW))*(H-PT-PB);
  // smooth cubic bezier path
  let d = `M${px(0)} ${py(ws[0])}`;
  for (let i=1;i<data.length;i++){
    const mx=(px(i-1)+px(i))/2;
    d+=` C${mx} ${py(ws[i-1])} ${mx} ${py(ws[i])} ${px(i)} ${py(ws[i])}`;
  }
  // 7-day moving average
  const avg = data.map((_,i)=>{
    const s=Math.max(0,i-3), e=Math.min(data.length-1,i+3);
    return data.slice(s,e+1).reduce((a,h)=>a+h.weight,0)/(e-s+1);
  });
  let ad=`M${px(0)} ${py(avg[0])}`;
  for(let i=1;i<avg.length;i++) ad+=` L${px(i)} ${py(avg[i])}`;

  const latest = ws[ws.length-1];
  const first  = ws[0];
  const change = latest - first;

  return (
    <div>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display:'block', marginBottom:4 }}>
        {/* goal line */}
        {goalWeight && goalWeight>=minW && goalWeight<=maxW && (
          <line x1={PL} y1={py(goalWeight)} x2={W-PR} y2={py(goalWeight)}
            stroke="#C8FF00" strokeWidth="1" strokeDasharray="4 3" opacity="0.5"/>
        )}
        {/* weight path */}
        <path d={d} fill="none" stroke="#F5F5F0" strokeWidth="1.5" opacity="0.5"/>
        {/* moving avg */}
        <path d={ad} fill="none" stroke="#C8FF00" strokeWidth="2" opacity="0.85"/>
        {/* dots */}
        {data.map((h,i)=>(
          <circle key={i} cx={px(i)} cy={py(h.weight)} r="2" fill="#F5F5F0" opacity="0.6"/>
        ))}
        <circle cx={px(data.length-1)} cy={py(latest)} r="4" fill="#C8FF00"/>
        {/* x labels: first, mid, last */}
        {[0, Math.floor((data.length-1)/2), data.length-1].map(i=>(
          <text key={i} x={px(i)} y={H-2} textAnchor="middle"
            fill="#8A8A8E" fontSize="7" fontFamily="DM Sans">
            {data[i].date.slice(5)}
          </text>
        ))}
        {/* y labels */}
        <text x={PL-2} y={py(maxW)+4} textAnchor="end" fill="#8A8A8E" fontSize="7" fontFamily="DM Sans">{maxW.toFixed(1)}</text>
        <text x={PL-2} y={py(minW)+4} textAnchor="end" fill="#8A8A8E" fontSize="7" fontFamily="DM Sans">{minW.toFixed(1)}</text>
      </svg>
      <div className="flex gap-3 mt-2">
        <div className="flex-1 text-center">
          <p className="text-[#8A8A8E] text-[10px] uppercase tracking-wider">Start</p>
          <p className="font-display text-lg text-[#F5F5F0]"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{first}kg</p>
        </div>
        <div className="flex-1 text-center">
          <p className="text-[#8A8A8E] text-[10px] uppercase tracking-wider">Now</p>
          <p className="font-display text-lg text-[#C8FF00]"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{latest}kg</p>
        </div>
        <div className="flex-1 text-center">
          <p className="text-[#8A8A8E] text-[10px] uppercase tracking-wider">Change</p>
          <p className={`font-display text-lg`}
            style={{ fontFamily:"'Bebas Neue',sans-serif",
              color: change===0?'#8A8A8E':change>0?'#C8FF00':'#FF453A' }}>
            {change>0?'+':''}{change.toFixed(1)}kg
          </p>
        </div>
      </div>
    </div>
  );
}
