/* ── Nutrition utilities ── */

function sumMacros(meals) {
  return meals.reduce((t, m) => ({
    cal:  t.cal  + (m.macros?.cal  || 0),
    pro:  t.pro  + (m.macros?.pro  || 0),
    carb: t.carb + (m.macros?.carb || 0),
    fat:  t.fat  + (m.macros?.fat  || 0),
    fib:  t.fib  + (m.macros?.fib  || 0),
  }), { cal:0, pro:0, carb:0, fat:0, fib:0 });
}

function calcNutritionGoals(profile, nutritionGoals) {
  const bw = nutritionGoals.bodyweight || 80;
  const days = profile.trainingDaysPerWeek || 3;
  const mult = days <= 2 ? 26 : days <= 4 ? 28 : 30;
  const goalType = nutritionGoals.goalType || 'maintain';
  const tdee = bw * mult;
  const calories = goalType === 'lose' ? Math.round(tdee * 0.82)
                 : goalType === 'gain' ? Math.round(tdee * 1.12)
                 : Math.round(tdee);
  const proMult = goalType === 'lose' ? 2.2 : goalType === 'gain' ? 2.4 : 2.0;
  const protein = Math.round(bw * proMult);
  const fatCals = Math.round(calories * 0.25);
  const fatG = Math.round(fatCals / 9);
  const carbCals = calories - (protein * 4) - fatCals;
  const carbs = Math.max(50, Math.round(carbCals / 4));
  return { calories, protein, carbs, fat: fatG };
}


// Mifflin-St Jeor BMR
function calcBMR({ weight, height, age, sex }) {
  if (!weight || !height || !age) return null;
  const base = 10 * weight + 6.25 * height - 5 * age;
  return Math.round(sex === 'female' ? base - 161 : base + 5);
}
const ACTIVITY_MULTIPLIERS = {
  sedentary:    { label:'Sedentary (desk job, no exercise)',   mult:1.2 },
  light:        { label:'Lightly active (1–3 days/week)',      mult:1.375 },
  moderate:     { label:'Moderately active (3–5 days/week)',   mult:1.55 },
  very_active:  { label:'Very active (6–7 days/week)',         mult:1.725 },
  extra_active: { label:'Extra active (physical job + train)', mult:1.9 },
};
function calcTDEE(bmr, activityLevel) {
  const mult = ACTIVITY_MULTIPLIERS[activityLevel]?.mult || 1.55;
  return bmr ? Math.round(bmr * mult) : null;
}
function calcCardioCalories(activity, durationMin, intensity, weightKg) {
  const met = activity?.met?.[intensity] || 6;
  return Math.round(met * (weightKg || 75) * (durationMin / 60));
}

function getNutritionLog(nutritionLog, date) {
  return nutritionLog[date] || { meals: [] };
}

function checkNutritionBadges(nutritionLog, weightHistory, nutritionGoals, existing) {
  const now = new Date().toISOString();
  const earned = {};
  const allMeals = Object.values(nutritionLog).flatMap(d => d.meals || []);
  if (allMeals.length >= 1 && !existing.first_meal) earned.first_meal = { unlockedAt: now };
  // Count nutrition streaks
  let streak = 0, maxStreak = 0;
  const sorted = Object.keys(nutritionLog).sort();
  for (let i = 0; i < sorted.length; i++) {
    const d = nutritionLog[sorted[i]];
    const total = sumMacros(d.meals || []);
    if (total.cal >= (nutritionGoals.calories || 1500) * 0.8) {
      streak++;
      maxStreak = Math.max(maxStreak, streak);
    } else streak = 0;
  }
  if (maxStreak >= 14 && !existing.fuel_streak) earned.fuel_streak = { unlockedAt: now };
  // Protein goal streak
  let proStreak = 0;
  for (let i = sorted.length - 1; i >= 0; i--) {
    const d = nutritionLog[sorted[i]];
    const total = sumMacros(d.meals || []);
    if (total.pro >= (nutritionGoals.protein || 150)) proStreak++;
    else break;
  }
  if (proStreak >= 5 && !existing.protein_king) earned.protein_king = { unlockedAt: now };
  // Goal weight
  if (weightHistory.length > 0 && nutritionGoals.goalWeight) {
    const latest = weightHistory[weightHistory.length - 1].weight;
    const goalType = nutritionGoals.goalType;
    const hit = goalType === 'lose' ? latest <= nutritionGoals.goalWeight
              : goalType === 'gain' ? latest >= nutritionGoals.goalWeight
              : Math.abs(latest - nutritionGoals.goalWeight) <= 0.5;
    if (hit && !existing.goal_weight) earned.goal_weight = { unlockedAt: now };
  }
  return earned;
}

function useLocalStorage(key, initial) {
  const [val, setVal] = useState(() => {
    try { const item = localStorage.getItem(key); return item ? JSON.parse(item) : initial; }
    catch { return initial; }
  });
  const setStored = useCallback((v) => {
    setVal(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      syncToBackend(key, next);
      return next;
    });
  }, [key]);
  return [val, setStored];
}

async function callClaude(messages, maxTokens = 4000, system = '') {
  const token = localStorage.getItem('forge_token');
  const res = await fetch(`${BACKEND_URL}/ai/chat`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + (token || ''),
    },
    body: JSON.stringify({ messages, max_tokens: maxTokens, system }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || err.message || `API error ${res.status}`);
  }
  const data = await res.json();
  return data.content[0].text;
}

  return `TRAINING SPLIT INSTRUCTION:

- If they named a specific split (e.g. Push Pull Legs, Upper Lower, Bro Split, Arnold Split, conjugate, DUP, etc.) use it exactly as described.

- If they said they have no preference, or left it blank, choose the optimal split for their goal (${profile.goal}), experience level (${profile.fitnessLevel}), and number of training days (${daysCount}), and explain the choice in the motivationalMessage field.
Never limit yourself to a predefined list. If the athlete wants a Weider split, daily undulating periodisation, a classic bro split, a conjugate method, or any other legitimate structure — build it. You are an elite coach and can programme any training structure.
Distribute the sessions across these specific days: ${days.join(', ') || 'choose appropriate days'}.`;
}

async function generatePlan(profile) {
  const splitInstructions = getSplitInstructions(profile);
  const prompt = `You are an expert strength and conditioning coach with deep knowledge of exercise science, programming, and periodisation. You have fully internalised the following research-backed programming principles and apply them to every plan you generate. Your job is to design the perfect training program for this specific athlete. Every exercise must be intentional, evidence based, and grounded in the principles below.

SPLIT-SPECIFIC PROGRAMMING PRINCIPLES:

Upper Lower (4 day): Upper days alternate horizontal push/pull focus and vertical push/pull focus. Lower days alternate quad dominant and posterior chain dominant. Muscle building: 8-12 reps, 3-4 sets, 10-20 sets per muscle per week, 60-90s rest. Fat loss: 10-15 reps, 45-60s rest, add 8 min conditioning finisher. Athletic performance: add one power movement first each session.

Arnold Split (6 day): Day 1 chest/back, Day 2 shoulders/arms, Day 3 legs, repeat. Muscle building: 6-10 reps compounds, 10-15 reps isolation, 14-18 sets per muscle per week. Fat loss: 10-12 sets per muscle per week, add cardio on leg days.

Arnold + Upper Lower Hybrid (5 day): Heavy compounds, shoulders/arms, legs quad focus, upper moderate, lower posterior chain. Advanced split — high volume with adequate recovery. Reduce session volume 20% for fat loss.

Full Body (3 day): Every major muscle group each session. 3 sets per exercise, 6-10 reps, progressive overload each session. Add power work first for athletic performance. Add conditioning finisher for fat loss.

PPL / PPL x2: Push/pull/legs cycling. Muscle building: 8-12 reps, prioritise loaded stretch exercises. Strength: 5-8 reps on main compounds. Fat loss: 12-15 reps, shorter rest, finisher each session.

PHUL (4 day): Two power days (3-5 reps, heavy barbell compounds) + two hypertrophy days (8-12 reps). Effective for strength and size. Intermediate trainees.

PHAT (5 day): Upper power, lower power, rest, upper hypertrophy, lower hypertrophy. Advanced protocol. Alternate power and hypertrophy stimulus.

DUP (Daily Undulating Periodisation): Rotate power (3-5 reps), strength (5-8 reps), hypertrophy (8-15 reps) across sessions in the same week. Best for intermediate to advanced, 3-5 days.

Bro Split (5-6 day): One muscle group per session at high volume. Each muscle once per week. Works for advanced trainees with strong mind-muscle connection.

Progression: Add weight when top of rep range achieved for all sets. Deload every 4-6 weeks — 40% volume reduction, keep intensity.

Recovery: For fat loss clients in a deficit reduce volume 15-20%. Never increase volume and intensity in the same week.

ATHLETE PROFILE:
- Name: ${profile.name}
- Fitness Level: ${profile.fitnessLevel}
- Goal: ${profile.goal}
- Equipment: ${profile.equipment.join(', ')}
- Training Days Per Week: ${profile.trainingDaysPerWeek || profile.trainingDays?.length || 3}
- Preferred Training Days: ${(profile.trainingDays||[]).join(', ')}
- Session Length: ${profile.sessionLength} minutes

GENERAL RULES FOR ALL PLANS:
Every session must be completable in the athlete's stated session length — never exceed it. A session should have no more than 6 exercises for strength and muscle goals, no more than 7 for athletic performance, and no more than 5 for fat loss circuits. Quality over quantity always. Straight sets only for muscle and strength goals. No supersets except for fat loss circuits. Never program supersets for strength or muscle goals.

EXERCISE SELECTION — SCIENCE BASED:
Every exercise you select must be chosen based on sports science and evidence based training principles. Apply the following rules strictly:

For muscle building — select exercises based on these criteria in order of priority: exercises that provide maximum mechanical tension through a full range of motion, exercises with a strong stretch at the bottom position as research shows stretched position loading maximises hypertrophic stimulus, exercises that allow progressive overload over time, and exercises that match the user's available equipment. For each muscle group prioritise the most effective movements — for example Romanian deadlift over leg curl for hamstrings due to superior stretch stimulus, incline dumbbell curl over standing curl for biceps due to shoulder flexion increasing long head stretch, chest supported row over bent over row for back when fatigue management matters. Avoid exercises with poor mind muscle connection for beginners. Never choose an exercise just to fill a slot.

For strength — select movements based on specificity to the competition lifts or movement patterns, neurological efficiency through low rep heavy loading, and structural balance to prevent injury. Always include a primary compound lift as the centrepiece of each session. Accessory work should directly address weak points in the primary lift — for example if deadlift is the focus include Romanian deadlifts for hamstring strength, lat pulldowns for upper back tightness, and hip flexor work for lockout.

For fat loss — select exercises based on metabolic demand. Compound movements that recruit the most muscle mass burn the most calories. Order exercises from highest metabolic demand to lowest. Include a conditioning finisher every session. Choose exercises the user can perform with good form when fatigued.

For athletic performance — select exercises based on the SAID principle — Specific Adaptations to Imposed Demands. Every session must include at least one power development exercise performed first — box jumps, broad jumps, med ball throws, hang cleans, or sprint work depending on equipment. Strength work must include unilateral movements every session because sport is played on one leg. Include rotational power work. Include deceleration and change of direction work where possible. All exercise selection should mimic or support the demands of sport.

For every single exercise in every plan the notes field must explain in one specific sentence why this exercise was chosen for this person's exact goal, experience level, and how it fits into the session. The notes must reference the science — mention mechanical tension, stretch stimulus, progressive overload, metabolic demand, power transfer, or whatever principle applies. Never write a generic notes entry. It must be specific to this person.

EQUIPMENT AWARENESS:
Always check the athlete's listed equipment before programming any exercise. Never program a barbell exercise for someone without a barbell. Never program a cable exercise for someone without cables. Substitute intelligently — if no cables use dumbbells or bands, if no barbell use dumbbells or trap bar if available, if no equipment use bodyweight progressions.

EXPERIENCE LEVEL ADJUSTMENTS:
Beginner — simpler movement patterns, machines over free weights where available, higher reps, longer rest, 3 to 4 exercises per session maximum, focus on learning movement patterns.
Intermediate — free weights, moderate complexity, full session length used, balanced volume.
Advanced — higher volume, more complex movements, can include Olympic lift variations if athletic performance goal, periodised intensity across the week.

SESSION LENGTH TARGETS:
30 minutes — 3 to 4 exercises, minimal rest.
45 minutes — 4 to 5 exercises, standard rest.
60 minutes — 5 to 6 exercises, full rest periods.
75 minutes plus — 6 to 7 exercises, full rest plus warm up block included in plan.

${splitInstructions}

Return ONLY a valid JSON object (no markdown, no explanation) matching this EXACT schema. The notes field must contain one specific sentence explaining exactly why this exercise was chosen for this person's goal — not generic, directly tied to their stated goal and experience level:
{
  "planName": "string",
  "weeklySchedule": [
    {
      "day": "Monday",
      "focus": "string",
      "workouts": [
        {
          "exercise": "string",
          "sets": 4,
          "reps": "8-12",
          "rest": "90s",
          "notes": "one sentence: why this specific exercise for this specific person's goal",
          "muscleGroup": "string"
        }
      ]
    }
  ],
  "motivationalMessage": "string",
  "coachTip": "string"
}`;
  const text = await callClaude([{ role:'user', content: prompt }], 4000);
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('Could not parse plan — please try again.');
  return JSON.parse(match[0]);
}

async function generateInsights(profile, logs, prs) {
  const recent = logs.slice(-20);
  const logSummary = recent.map(l =>
    `${l.date}: ${l.focus}, volume: ${Math.round(l.totalVolume||0)}kg, duration: ${l.duration}min`
  ).join('\n');
  const prSummary = Object.entries(prs).slice(0,6).map(([ex,pr]) =>
    `${ex}: ${pr.weight}kg × ${pr.reps}`
  ).join(', ') || 'None yet';

  const prompt = `You are a fitness coach analysing an athlete's training data.

ATHLETE: ${profile.name}, Goal: ${profile.goal}, Level: ${profile.fitnessLevel}

RECENT WORKOUTS (last ${recent.length}):
${logSummary}

PERSONAL RECORDS: ${prSummary}

Provide exactly 3 specific, actionable, motivating coaching insights based on this data.
Return ONLY a JSON array (no markdown): ["insight 1", "insight 2", "insight 3"]`;
  const text = await callClaude([{ role:'user', content: prompt }], 800);
  const match = text.match(/\[[\s\S]*\]/);
  if (!match) return null;
  return JSON.parse(match[0]);
}

function getTodayName() {
  const d = new Date().getDay(); // 0=Sun
  return DAYS[d === 0 ? 6 : d - 1];
}
function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'GOOD MORNING';
  if (h < 17) return 'GOOD AFTERNOON';
  return 'GOOD EVENING';
}
function getTodayISO() { return new Date().toISOString().split('T')[0]; }
function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'2-digit' });
}
function getDailyQuote() {
  const start = new Date(new Date().getFullYear(), 0, 0);
  const dayOfYear = Math.floor((Date.now() - start) / 86400000);
  return QUOTES[dayOfYear % QUOTES.length];
}
function getWeekStart(date = new Date()) {
  const d = new Date(date);
  const dow = d.getDay();
  const diff = dow === 0 ? 6 : dow - 1;
  d.setDate(d.getDate() - diff);
  d.setHours(0,0,0,0);
  return d.toISOString().split('T')[0];
}
function calcTotalVolume(exercises) {
  return exercises.reduce((tot, ex) =>
    tot + ex.sets.filter(s => s.done).reduce((s2, s) =>
      s2 + (parseFloat(s.weight)||0) * (parseFloat(s.reps)||0), 0
    ), 0
  );
}
function updateStreak(current, lastDate) {
  const today = getTodayISO();
  if (lastDate === today) return current;
  const yest = new Date(); yest.setDate(yest.getDate() - 1);
  const yesterdayISO = yest.toISOString().split('T')[0];
  if (lastDate === yesterdayISO) {
    const next = current.current + 1;
    return { current: next, longest: Math.max(current.longest, next), lastWorkoutDate: today };
  }
  return { current: 1, longest: Math.max(current.longest, 1), lastWorkoutDate: today };
}
function checkNewBadges(logs, prs, streak, existing) {
  const now = new Date().toISOString();
  const earned = {};
  const total = logs.reduce((s,l) => s + (l.totalVolume||0), 0);
  if (logs.length >= 1  && !existing.first_workout) earned.first_workout = { unlockedAt: now };
  if (streak.current >= 7 && !existing.week_streak)  earned.week_streak   = { unlockedAt: now };
  if (logs.length >= 10 && !existing.ten_workouts)   earned.ten_workouts  = { unlockedAt: now };
  if (Object.keys(prs).length > 0 && !existing.pr_crusher) earned.pr_crusher = { unlockedAt: now };
  if (total >= 10000    && !existing.volume_king)    earned.volume_king   = { unlockedAt: now };
  if (logs.length >= 20 && !existing.consistency)    earned.consistency   = { unlockedAt: now };
  return earned;
}

function formatCoachMessage(text) {
  return text.split('\n').filter((p, i, arr) => p.trim() !== '' || i < arr.length - 1).map((para, i) => {
    if (para.trim() === '') return <div key={i} style={{ height: 4 }}/>;
    const parts = [];
    let remaining = para;
    let key = 0;
    const bold = /\*\*(.+?)\*\*/g;
    let last = 0;
    let m;
    bold.lastIndex = 0;
    while ((m = bold.exec(para)) !== null) {
      if (m.index > last) parts.push(<span key={key++}>{para.slice(last, m.index)}</span>);
      parts.push(<span key={key++} style={{ color:'#C8FF00', fontWeight:700 }}>{m[1]}</span>);
      last = m.index + m[0].length;
    }
    if (last < para.length) parts.push(<span key={key++}>{para.slice(last)}</span>);
    return <div key={i} style={{ marginBottom: 6 }}>{parts}</div>;
  });
}

/* ── Plan-change helpers ── */
function parsePlanChange(text) {
  const marker = 'PLAN_CHANGE_SUGGESTED:';
  const idx = text.indexOf(marker);
  if (idx === -1) return { displayText: text, planChange: null };
  const displayText = text.slice(0, idx).trim();
  try {
    const planChange = JSON.parse(text.slice(idx + marker.length).trim());
    return { displayText, planChange };
  } catch {
    return { displayText, planChange: null };
  }
}

function applyPlanChangesToPlan(plan, changes) {
  if (!plan?.weeklySchedule) return plan;
  const updated = { ...plan, weeklySchedule: plan.weeklySchedule.map(d => ({ ...d, workouts: [...(d.workouts||[])] })) };
  (changes||[]).forEach(change => {
    const day = updated.weeklySchedule.find(d =>
      d.day?.toLowerCase().includes((change.day||'').toLowerCase()) ||
      (change.day||'').toLowerCase().includes(d.day?.toLowerCase())
    );
    if (!day) return;
    day.workouts = day.workouts.map(w => {
      const wName = (w.exercise||'').toLowerCase();
      const toReplace = (change.exercise_to_replace||'').toLowerCase();
      if (wName.includes(toReplace) || toReplace.includes(wName)) {
        return { ...w, exercise: change.replacement_exercise, sets: change.new_sets, reps: change.new_reps };
      }
      return w;
    });
  });
  return updated;
}

function PlanChangeCard({ planChange, onApply, onKeep }) {
  const summary = (planChange.changes||[]).map(c =>
    `Replace ${c.exercise_to_replace} on ${c.day} with ${c.replacement_exercise} (${c.new_sets}×${c.new_reps})`
  ).join('. ');
  return (
    <div style={{ borderLeft:'3px solid #C8FF00', background:'#1A1A1C', borderRadius:16, padding:'14px 16px', margin:'8px 0 4px 0' }}>
      <p style={{ fontFamily:"'Bebas Neue',sans-serif", color:'#C8FF00', fontSize:13, letterSpacing:'0.08em', marginBottom:6 }}>
        PLAN UPDATE SUGGESTED
      </p>
      {planChange.reason && (
        <p style={{ color:'#8A8A8E', fontSize:12, marginBottom:6, fontFamily:"'DM Sans',sans-serif" }}>{planChange.reason}</p>
      )}
      <p style={{ color:'#F5F5F0', fontSize:13, lineHeight:1.5, marginBottom:12, fontFamily:"'DM Sans',sans-serif" }}>{summary}</p>
      <div style={{ display:'flex', gap:8 }}>
        <button onClick={onApply}
          style={{ flex:1, padding:'10px 0', borderRadius:12, background:'#C8FF00', color:'#0D0D0F', fontFamily:"'Bebas Neue',sans-serif", fontSize:14, letterSpacing:'0.05em', border:'none', cursor:'pointer' }}>
          APPLY CHANGES
        </button>
        <button onClick={onKeep}
          style={{ flex:1, padding:'10px 0', borderRadius:12, background:'#252527', color:'#8A8A8E', fontFamily:"'Bebas Neue',sans-serif", fontSize:14, letterSpacing:'0.05em', border:'1px solid #3A3A3C', cursor:'pointer' }}>
          KEEP CURRENT
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════

    let recentLogs = 'No workouts logged yet.';

      recentLogs = (logs||[]).slice(-10).reverse().map(log => {

          const best = done.length ? `(best: ${done.reduce((b,s)=>parseFloat(s.weight||0)>parseFloat(b.weight||0)?s:b,done[0]).weight}kg)` : '';
          return `${e.exercise||''}${best}`;

      }).join('\n') || 'No workouts logged yet.';
    } catch(e) { recentLogs = 'Workout data unavailable.'; }

    let prsText = 'None yet.';

    return `You are an expert strength and conditioning coach with deep knowledge of exercise science, programming, and periodisation. You have fully internalised the following research-backed programming principles and apply them to every response, plan, and recommendation you give. You know everything about the athlete listed below. Always address them by their first name. You never diagnose injuries but can give training guidance around discomfort.

CORE PROGRAMMING KNOWLEDGE:

Upper Lower Split (4 day): Two upper days and two lower days per week. Upper days alternate between horizontal push and pull focus and vertical push and pull focus. Lower days alternate between quad dominant and posterior chain dominant. Muscle building: 8-12 reps, 3-4 sets per exercise, 10-20 sets per muscle group per week across the split, 60-90s rest. Fat loss: 10-15 reps, 45-60s rest, add 8 min conditioning finisher each session. Athletic performance: add one power movement first each session — box jumps or broad jumps on lower days, medicine ball chest pass or overhead throw on upper days. General fitness: 3 sets per exercise, sessions under 55 minutes, focus on movement quality.

Arnold Split (6 day): Day 1 chest and back, Day 2 shoulders and arms, Day 3 legs, repeat. Muscle building: 6-10 reps on compounds, 10-15 reps on isolation, 14-18 sets per muscle per week. Fat loss: reduce to 10-12 sets per muscle per week, add cardio on leg days. Athletic performance: replace one arm day with a power and athleticism day. General fitness: reduce to 4 days by removing one chest/back and one shoulder/arm day.

Arnold Plus Upper Lower Hybrid (5 day): Day 1 chest and back heavy compounds, Day 2 shoulders and arms, Day 3 legs quad focus, Day 4 upper body moderate intensity, Day 5 lower body posterior chain. Advanced split for intermediate to advanced trainees. Muscle building: one of the most effective splits — 5 days allows high volume with adequate recovery. Athletic performance: replace Day 4 with a power and speed session. Fat loss: reduce session volume by 20%, add conditioning to Day 3 and Day 5.

Full Body (3 day): Mon/Wed/Fri or similar. Each session hits every major muscle group. Muscle building: compound only — squat pattern, hip hinge, horizontal push, horizontal pull, vertical push, vertical pull — 3 sets each, 6-10 reps, progressive overload each session. Fat loss: high metabolic demand, preserves muscle, easy to add conditioning. Athletic performance: power work first every session, heavy compounds, sport-specific conditioning finisher. General fitness: best split — balanced, time-efficient, beginner friendly, 45-55 minutes.

Push Pull Legs and variants: Cycles push muscles (chest/shoulders/triceps), pull muscles (back/biceps/rear delts), and legs through 3, 5, or 6-day frequencies. Muscle building: 8-12 reps, prioritise loaded stretch exercises. Strength: 5-8 rep range on main compounds. Fat loss: 12-15 reps, shorter rest, conditioning finisher.

PHUL (4 day): Two power days (3-5 reps, heavy barbell compounds) and two hypertrophy days (8-12 reps, compound plus isolation). Effective for both strength and size simultaneously. Best for intermediate trainees.

PHAT (5 day): Upper power, lower power, rest, upper hypertrophy, lower hypertrophy. Advanced protocol combining heavy power work with high-volume hypertrophy. Best for advanced intermediate to advanced trainees.

Daily Undulating Periodisation (DUP): Vary rep ranges across sessions in the same week — power day (3-5 reps), strength day (5-8 reps), hypertrophy day (8-15 reps). Prevents accommodation, maximises strength and size simultaneously. Best for intermediate to advanced trainees with 3-5 training days.

Bro Split (5-6 day): One muscle group per session — chest, back, shoulders, arms, legs. Each muscle trained once per week at very high volume. Works for advanced trainees with strong mind-muscle connection. Low weekly frequency not optimal for beginners.

Progression strategy: Add weight when the top end of the rep range is achieved for all sets with good form. For strength use double progression — add reps first then weight. For muscle use progressive overload weekly on compound lifts and every 2 weeks on isolation. Deload every 4-6 weeks — reduce volume by 40%, keep intensity. Never increase both volume and intensity in the same week.

Recovery protocol: 7-9 hours sleep is when muscle is built. For fat loss clients in a calorie deficit reduce training volume 15-20% to account for reduced recovery capacity. Mobility work 10 min post session minimum. Flag deload need when check-in data shows low motivation, high soreness, or declining performance.

Goal-specific principles:
Muscle building — mechanical tension drives hypertrophy. Choose exercises with a loaded stretch. Progressive overload is non-negotiable. Volume 10-20 sets per muscle per week. Protein 1.6-2.2g per kg bodyweight.
Fat loss — calorie deficit drives fat loss, training preserves muscle. High protein essential. Compound movements maximise calorie burn. Do not reduce weights — reduce rest periods or add conditioning instead.
Athletic performance — power before strength always. Train movements not muscles. Unilateral work every session. Include deceleration and change of direction. Periodise intensity — heavy weeks and speed weeks alternating.
General fitness — consistency beats intensity. Build habits first. Keep sessions enjoyable. Balance cardio and strength. Progress gradually.

Apply all of this knowledge when giving advice. Always reference specific principles when explaining exercise choices. Be specific and evidence based. Never give generic advice.

When the athlete reports pain, fatigue, soreness, injury, or asks to modify their plan, you may suggest specific changes. To do so, end your message with PLAN_CHANGE_SUGGESTED: followed immediately by a valid JSON object (no extra text after the JSON) with fields: reason (string), changes (array of objects each with day, exercise_to_replace, replacement_exercise, new_sets, new_reps). Only suggest a plan change when clearly warranted — not every message.

function buildQuestions(selectedMuscles) {
  const seen = new Set();
  const qs = [];
  Object.keys(selectedMuscles).forEach(muscle => {
    const cat = MUSCLE_CATEGORY[muscle];
    if (cat && !seen.has(cat) && QUESTION_SETS[cat]) {
      seen.add(cat);
      QUESTION_SETS[cat].forEach(q => qs.push({ ...q, category: cat }));
    }
  });
  return qs;
}

    const lbl = <text key={`n${r.n}`} x={r.tx} y={r.ty} textAnchor="middle" dominantBaseline="middle" fontSize="7" fill="#8A8A8E" style={{pointerEvents:'none',fontFamily:"'DM Sans',sans-serif"}}>{r.n}</text>;
    return [shape, lbl];
  };
  const BodyMapSVG = ({regions, label}) => (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
      <div style={{color:'#C8FF00',fontFamily:"'Bebas Neue',sans-serif",fontSize:13,letterSpacing:'0.1em'}}>{label}</div>
      <svg viewBox="0 0 160 380" width="160" height="380" style={{display:'block'}}>
        <circle cx="80" cy="28" r="22" fill="none" stroke="#3A3A3C" strokeWidth="1.5"/>
        <path d={BODY_PATH} fill="none" stroke="#3A3A3C" strokeWidth="1.5"/>
        {regions.map(r => renderRegion(r))}
      </svg>
    </div>
  );


  const selectedCount = Object.keys(selected).length;

  // ── Render phases ────────────────────────────
  if (phase === 'redflag') return (
    <div className="px-5 py-6">
      <div style={{ background:'rgba(255,69,58,0.08)', border:'1px solid rgba(255,69,58,0.4)', borderRadius:20, padding:24 }}>
        <p style={{ fontFamily:"'Bebas Neue',sans-serif", color:'#FF453A', fontSize:22, letterSpacing:'0.06em', marginBottom:10 }}>⚠ SEEK MEDICAL ATTENTION</p>
        <p style={{ color:'#F5F5F0', fontSize:14, lineHeight:1.6, fontFamily:"'DM Sans',sans-serif", marginBottom:16 }}>{redFlag}</p>
        <button onClick={resetAll} style={{ width:'100%', padding:'14px 0', background:'#252527', color:'#8A8A8E', fontFamily:"'Bebas Neue',sans-serif", fontSize:16, letterSpacing:'0.06em', border:'1px solid #3A3A3C', borderRadius:14, cursor:'pointer' }}>
          START OVER
        </button>
      </div>
    </div>
  );

  if (phase === 'questions') {
    const q = qList[qIdx];
    return (
      <div className="px-5 py-4">
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
          <p style={{ fontFamily:"'Bebas Neue',sans-serif", color:'#C8FF00', fontSize:14, letterSpacing:'0.08em' }}>
            QUESTION {qIdx+1} OF {qList.length}
          </p>
          <button onClick={resetAll} style={{ color:'#8A8A8E', fontSize:12, background:'none', border:'none', cursor:'pointer', fontFamily:"'DM Sans',sans-serif" }}>Cancel</button>
        </div>
        <div style={{ height:4, background:'#252527', borderRadius:2, marginBottom:20 }}>
          <div style={{ height:4, background:'#C8FF00', borderRadius:2, width:`${((qIdx)/(qList.length))*100}%`, transition:'width 0.3s' }}/>
        </div>
        <div style={{ background:'#1A1A1C', border:'1px solid #252527', borderRadius:20, padding:'18px 20px', marginBottom:16 }}>
          <p style={{ color:'#F5F5F0', fontSize:15, lineHeight:1.55, fontFamily:"'DM Sans',sans-serif", fontWeight:600 }}>{q.q}</p>
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {q.opts.map(opt => (
            <button key={opt} onClick={() => handleAnswer(opt)}
              style={{ width:'100%', padding:'14px 18px', background:'#252527', color:'#F5F5F0', fontFamily:"'DM Sans',sans-serif", fontSize:14, fontWeight:500, border:'1px solid #3A3A3C', borderRadius:14, cursor:'pointer', textAlign:'left', transition:'border-color 0.15s' }}
              onMouseEnter={e=>e.currentTarget.style.borderColor='#C8FF00'}
              onMouseLeave={e=>e.currentTarget.style.borderColor='#3A3A3C'}>
              {opt}
            </button>
          ))}
        </div>
      </div>
    );
  }

  if (phase === 'response') return (
    <div className="px-5 py-4">
      {loading ? (
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', paddingTop:40 }}>
          <div style={{ display:'flex', gap:8, marginBottom:16 }}>
            {[0,1,2].map(i=>(
              <div key={i} style={{ width:10, height:10, borderRadius:'50%', background:'#C8FF00', animation:`dotPulse 1.2s ${i*0.2}s ease-in-out infinite`, opacity:0.4 }}/>
            ))}
          </div>
          <p style={{ color:'#8A8A8E', fontSize:13, fontFamily:"'DM Sans',sans-serif" }}>Analysing your assessment...</p>
        </div>
      ) : (
        <div>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
            <p style={{ fontFamily:"'Bebas Neue',sans-serif", color:'#C8FF00', fontSize:16, letterSpacing:'0.08em' }}>PHYSIO ASSESSMENT</p>
            <button onClick={resetAll} style={{ color:'#8A8A8E', fontSize:12, background:'none', border:'none', cursor:'pointer', fontFamily:"'DM Sans',sans-serif" }}>New Assessment</button>
          </div>
          <div style={{ background:'#1A1A1C', border:'1px solid #252527', borderRadius:20, padding:'16px 18px', marginBottom:12 }}>
            <div style={{ fontSize:13, lineHeight:1.6, fontFamily:"'DM Sans',sans-serif" }}>
              {formatCoachMessage(advice||'')}
            </div>
          </div>
          {bmPlanChange && !bmCardDismissed && (
            <PlanChangeCard
              planChange={bmPlanChange}
              onApply={() => {
                const updated = applyPlanChangesToPlan(plan, bmPlanChange.changes);
                if (onPlanUpdate) onPlanUpdate(updated);
                if (setPlanChanges) setPlanChanges(prev=>[...prev,{date:getTodayISO(),reason:bmPlanChange.reason,changes:bmPlanChange.changes}].slice(-50));
                setBmCardDismissed(true);
              }}
              onKeep={() => setBmCardDismissed(true)}
            />
          )}
        </div>
      )}
    </div>
  );

  // ── Map phase ────────────────────────────────
  return (
    <div>
      {/* Body Maps */}
      <div style={{ display:'flex', justifyContent:'center', gap:16, padding:'8px 8px 4px', overflowX:'auto' }}>
        <BodyMapSVG regions={FRONT_REGIONS} label="FRONT"/>
        <BodyMapSVG regions={BACK_REGIONS}  label="BACK"/>
      </div>

      {/* Legend */}
      <div style={{ display:'flex', gap:20, justifyContent:'center', padding:'4px 16px 8px' }}>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <div style={{ width:8, height:8, borderRadius:'50%', background:'#FF9F0A' }}/>
          <span style={{ color:'#8A8A8E', fontSize:10, fontFamily:"'DM Sans',sans-serif" }}>Moderate — tap once</span>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <div style={{ width:8, height:8, borderRadius:'50%', background:'#FF453A' }}/>
          <span style={{ color:'#8A8A8E', fontSize:10, fontFamily:"'DM Sans',sans-serif" }}>Severe — tap twice</span>
        </div>
      </div>

      {/* Selected pills */}
      {selectedCount > 0 && (
        <div style={{ margin:'0 16px 10px', display:'flex', flexWrap:'wrap', gap:6 }}>
          {Object.entries(selected).map(([m,s])=>(
            <span key={m} style={{ display:'inline-flex', alignItems:'center', gap:5, fontSize:11, padding:'4px 8px 4px 10px', borderRadius:20,
              background: s==='severe'?'rgba(255,69,58,0.15)':'rgba(255,159,10,0.15)',
              color: s==='severe'?'#FF453A':'#FF9F0A',
              border: `1px solid ${s==='severe'?'rgba(255,69,58,0.4)':'rgba(255,159,10,0.4)'}`,
              fontFamily:"'DM Sans',sans-serif", fontWeight:600 }}>
              {m} · {s}
              <button onClick={()=>clearMuscle(m)} style={{ background:'none', border:'none', cursor:'pointer',
                color: s==='severe'?'#FF453A':'#FF9F0A', fontSize:13, lineHeight:1, padding:0, opacity:0.7 }}>×</button>
            </span>
          ))}
        </div>
      )}

      {/* Get advice button */}
      {selectedCount > 0 && (
        <div style={{ padding:'0 16px 16px' }}>
          <button onClick={startAssessment}
            style={{ width:'100%', padding:'15px 0', background:'#C8FF00', color:'#0D0D0F',
              fontFamily:"'Bebas Neue',sans-serif", fontSize:18, letterSpacing:'0.08em',
              border:'none', borderRadius:16, cursor:'pointer', transition:'opacity 0.15s' }}>
            GET COACH ADVICE ({selectedCount} area{selectedCount>1?'s':''})
          </button>
        </div>
      )}
    </div>
  );
}

function LoadingPlan({ error }) {

    'BUILDING YOUR PLAN…',
    'CALCULATING YOUR GAINS…',
    'OPTIMISING EXERCISES…',
    'ALMOST READY…',

/* ═══════════════════════════════════════════════
   CONVERSATIONAL ONBOARDING
═══════════════════════════════════════════════ */
function ConversationalOnboarding({ onComplete }) {
  const QUESTIONS = [
    { id:'name',           text:"What should I call you?",                                                                                                                                                                                                                                                                      type:'text',       placeholder:'Your name…' },
    { id:'goal',           text:"What's your main goal right now?",                                                                                                                                                                                                                                                                  type:'chips',      options:['Build Muscle','Get Stronger','Lose Fat','Athletic Performance','General Fitness'] },
    { id:'experience',     text:"How long have you been training seriously?",                                                                                                                                                                                                                                                         type:'chips',      options:['Less than 6 months','6 months to 2 years','2 to 5 years','5+ years'] },
    { id:'trainingDays',   text:"How many days per week can you commit to training? Be honest — consistency beats frequency every time.",                                                                                                                                                                                              type:'textchips',  options:['2 days','3 days','4 days','5 days','6 days'], placeholder:'e.g. 3 days, or 4 days…' },
    { id:'preferredSplit', text:"splitpicker", type:'splitpicker' },
    { id:'currentRoutine', text:"Tell me about your current training. What does your week look like right now?",                                                                                                                                                                                                                      type:'text',       placeholder:'e.g. I go to the gym 3x a week…' },
    { id:'obstacle',       text:"What's the biggest thing that's stopped you from reaching your goal before?",                                                                                                                                                                                                                       type:'text',       placeholder:'Be honest…' },
    { id:'equipment',      text:"What equipment do you have access to?",                                                                                                                                                                                                                                                              type:'multichips', options:['Full Gym','Dumbbells Only','Barbell and Rack','Cables','Resistance Bands','Pull Up Bar','No Equipment'] },
    { id:'sessionLength',  text:"How long can you train per session?",                                                                                                                                                                                                                                                               type:'chips',      options:['30 minutes','45 minutes','60 minutes','75+ minutes'] },
    { id:'limitations',    text:"Do you have any injuries, pain, or physical limitations I should know about?",                                                                                                                                                                                                                       type:'text',       placeholder:'e.g. Lower back pain, bad knees…', skippable:true },
    { id:'lifestyle',      text:"How's your sleep and stress generally?",                                                                                                                                                                                                                                                            type:'chips',      options:['Pretty good','Could be better','Pretty poor'] },
  ];

  const LOADING_PHRASES = [
    'Analysing your goals…',
    'Reviewing your training history…',
    'Selecting your exercises…',
    'Building your weekly structure…',
    'Calibrating recovery protocols…',
    'Finalising your program…',
  ];

  const EXP_MAP = {
    'Less than 6 months':'Beginner',
    '6 months to 2 years':'Beginner',
    '2 to 5 years':'Intermediate',
    '5+ years':'Advanced',
  };
  const DAYS_MAP = {
    2:['Monday','Thursday'],
    3:['Monday','Wednesday','Friday'],
    4:['Monday','Tuesday','Thursday','Friday'],
    5:['Monday','Tuesday','Wednesday','Thursday','Friday'],
    6:['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],
  };
  const SESSION_MAP = { '30 minutes':30,'45 minutes':45,'60 minutes':60,'75+ minutes':75 };

  const SPLITS = [
    { id:'Full Body',                     desc:'Train every muscle group each session' },
    { id:'Upper Lower',                   desc:'Alternate upper and lower body sessions' },
    { id:'Push Pull Legs',                desc:'Push muscles, pull muscles, legs — 3-day cycle' },
    { id:'PPL x2',                        desc:'Push Pull Legs run twice per week — 6 days' },
    { id:'Arnold Split',                  desc:'Chest & back, shoulders & arms, legs — 3-day cycle' },
    { id:'Arnold + Upper Lower',          desc:'Arnold split paired with upper/lower days — 5 days' },
    { id:'Bro Split',                     desc:'One muscle group per session — classic bodybuilder style' },
    { id:'PHUL',                          desc:'Power Hypertrophy Upper Lower — 4 days' },
    { id:'PHAT',                          desc:'Power Hypertrophy Adaptive Training — 5 days' },
    { id:'Daily Undulating Periodisation',desc:'Vary intensity and volume each day for strength and size' },
    { id:'5 Day Upper Lower PPL Hybrid',  desc:'Upper, lower, push, pull, legs over 5 days' },
  ];

  const getSplitBadges = (splitId, goal, daysCount) => {
    const byDays = {
      2:['Full Body','Upper Lower'],
      3:['Full Body','Upper Lower'],
      4:['Upper Lower','PHUL'],
      5:['Push Pull Legs','Arnold + Upper Lower'],
      6:['PPL x2','Arnold Split'],
    };
    const byGoal = {
      'Build Muscle':        ['Push Pull Legs','Arnold Split','PHUL','PHAT'],
      'Get Stronger':        ['PHUL','PHAT','Daily Undulating Periodisation'],
      'Lose Fat':            ['Full Body','Push Pull Legs'],
      'Athletic Performance':['Full Body','Upper Lower','Daily Undulating Periodisation'],
      'General Fitness':     ['Full Body','Upper Lower'],
    };
    const badges = [];
    if ((byDays[daysCount] || []).includes(splitId)) badges.push('Best for your days');
    if ((byGoal[goal]      || []).includes(splitId)) badges.push('Best for your goal');
    return badges;
  };

  const [messages,        setMessages]        = useState([]);
  const [phase,           setPhase]           = useState('chat');
  const [currentQ,        setCurrentQ]        = useState(-1);
  const [answers,         setAnswers]         = useState({});
  const [inputText,       setInputText]       = useState('');
  const [selectedChips,   setSelectedChips]   = useState([]);
  const [typing,          setTyping]          = useState(false);
  const [recommendation,  setRecommendation]  = useState('');
  const [loadingPhrase,   setLoadingPhrase]   = useState(0);
  const [showSplitPicker, setShowSplitPicker] = useState(false);
  const [selectedSplit,   setSelectedSplit]   = useState('');
  const chatEndRef = React.useRef(null);
  const inputRef   = React.useRef(null);

  React.useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior:'smooth' });
  }, [messages, typing]);

  React.useEffect(() => {
    if (phase !== 'loading') return;
    const t = setInterval(() => setLoadingPhrase(p => (p + 1) % LOADING_PHRASES.length), 1800);
    return () => clearInterval(t);
  }, [phase]);

  React.useEffect(() => {
    const t1 = setTimeout(() => {
      setMessages([{ role:'coach', text:"Hey, I'm your FORGE Coach. Before I build your program, I want to get to know you properly. This will only take a couple of minutes — and everything I ask will shape exactly how I train you. Let's go." }]);
      const t2 = setTimeout(() => {
        setCurrentQ(0);
        setMessages(prev => [...prev, { role:'coach', text:QUESTIONS[0].text }]);
      }, 900);
      return () => clearTimeout(t2);
    }, 400);
    return () => clearTimeout(t1);
  }, []);

  const canSubmit = () => {
    if (currentQ < 0 || currentQ >= QUESTIONS.length) return false;
    const q = QUESTIONS[currentQ];
    if (q.type === 'text' || q.type === 'textchips') return inputText.trim().length > 0;
    if (q.type === 'chips')      return selectedChips.length === 1;
    if (q.type === 'multichips') return selectedChips.length > 0;
    return false;
  };

  const handleChipToggle = (chip) => {
    const q = QUESTIONS[currentQ];
    if (!q) return;
    if (q.type === 'textchips') {
      setInputText(chip);
    } else if (q.type === 'chips') {
      setSelectedChips([chip]);
    } else {
      setSelectedChips(prev => prev.includes(chip) ? prev.filter(c => c !== chip) : [...prev, chip]);
    }
  };

  const handleSubmit = async () => {
    if (!canSubmit()) return;
    const q = QUESTIONS[currentQ];
    const answer = (q.type === 'text' || q.type === 'textchips') ? inputText.trim()
      : q.type === 'chips' ? selectedChips[0]
      : [...selectedChips];
    const displayText = Array.isArray(answer) ? answer.join(', ') : answer;
    const newAnswers = { ...answers, [q.id]: answer };

    setMessages(prev => [...prev, { role:'user', text:displayText }]);
    setAnswers(newAnswers);
    setInputText('');
    setSelectedChips([]);
    setCurrentQ(-1);

    if (currentQ === QUESTIONS.length - 1) {
      await buildRecommendation(newAnswers);
    } else {
      await getAcknowledgement(q.text, answer, currentQ + 1, newAnswers);
    }
  };

  const handleSkip = () => {
    const newAnswers = { ...answers, limitations:'' };
    setAnswers(newAnswers);
    setMessages(prev => [...prev, { role:'user', text:'No limitations' }]);
    setInputText('');
    const nextIdx = currentQ + 1;
    setCurrentQ(nextIdx);
    setTimeout(() => setMessages(prev => [...prev, { role:'coach', text:QUESTIONS[nextIdx].text }]), 300);
  };

  const handleSplitConfirm = async (splitName) => {
    setShowSplitPicker(false);
    setSelectedSplit('');
    const splitQIdx = QUESTIONS.findIndex(q => q.id === 'preferredSplit');
    const nextIdx = splitQIdx + 1;
    const newAnswers = { ...answers, preferredSplit: splitName };
    setAnswers(newAnswers);
    setMessages(prev => [...prev, { role:'user', text: splitName }]);
    await getAcknowledgement('preferred split', splitName, nextIdx, newAnswers);
  };

  const getAcknowledgement = async (qText, answer, nextIdx, allAnswers) => {
    const _ans = allAnswers || answers;
    setTyping(true);
    try {
      const displayText = Array.isArray(answer) ? answer.join(', ') : answer;
      const ackPrompt = 'You are an elite fitness coach named FORGE. The athlete answered "' + displayText + '" to: "' + qText + '". Reply with ONE short motivating acknowledgement (max 12 words). Natural and specific. No questions. No emoji.';
      const ack = await callClaude([{ role:'user', content:ackPrompt }], 80);
      setTyping(false);
      setMessages(prev => [...prev, { role:'coach', text:ack.trim() }]);
      if (QUESTIONS[nextIdx] && QUESTIONS[nextIdx].type === 'splitpicker') {
        const daysStr = _ans.trainingDays || '3 days';
        const goalStr = _ans.goal || 'your goal';
        setTimeout(() => {
          setMessages(prev => [...prev, { role:'coach', text:'Based on your goal and ' + daysStr + ' a week, here are the splits I would recommend for you — but the choice is yours.' }]);
          setTimeout(() => setShowSplitPicker(true), 400);
        }, 500);
      } else {
        setTimeout(() => {
          setCurrentQ(nextIdx);
          setMessages(prev => [...prev, { role:'coach', text:QUESTIONS[nextIdx].text }]);
        }, 500);
      }
    } catch {
      setTyping(false);
      if (QUESTIONS[nextIdx] && QUESTIONS[nextIdx].type === 'splitpicker') {
        const daysStr = _ans.trainingDays || '3 days';
        setMessages(prev => [...prev, { role:'coach', text:'Based on your goal and ' + daysStr + ' a week, here are the splits I would recommend for you — but the choice is yours.' }]);
        setTimeout(() => setShowSplitPicker(true), 400);
      } else {
        setCurrentQ(nextIdx);
        setMessages(prev => [...prev, { role:'coach', text:QUESTIONS[nextIdx].text }]);
      }
    }
  };

  const buildRecommendation = async (finalAnswers) => {
    setPhase('loading');
    try {
      const eqStr = Array.isArray(finalAnswers.equipment) ? finalAnswers.equipment.join(', ') : (finalAnswers.equipment || 'Not specified');
      const recPrompt = `You are an elite personal trainer. Based on this athlete profile, write a personalised program recommendation with EXACTLY these 5 bold headings, one short paragraph each:

**Your Program** — recommended split and why it suits them
**Your Week** — day-by-day structure
**First 4 Weeks** — what to focus on and expect
**Addressing Your Obstacle** — advice based on what held them back
**Recovery Note** — based on their sleep/stress

Profile: Name: ${finalAnswers.name}. Goal: ${finalAnswers.goal}. Experience: ${finalAnswers.experience}. Training days: ${finalAnswers.trainingDays}. Preferred split: ${finalAnswers.preferredSplit || 'no preference'}. Current routine: ${finalAnswers.currentRoutine}. Obstacle: ${finalAnswers.obstacle}. Equipment: ${eqStr}. Session: ${finalAnswers.sessionLength}. Limitations: ${finalAnswers.limitations || 'None'}. Sleep/stress: ${finalAnswers.lifestyle}.

Be direct and specific. Max 220 words total.`;
      const rec = await callClaude([{ role:'user', content:recPrompt }], 600);
      setRecommendation(rec.trim());
      setPhase('recommendation');
    } catch {
      setRecommendation(`**Your Program**

Program analysis complete based on your profile.

**Your Week**

A personalised schedule will be generated for you.

**First 4 Weeks**

Focus on form and building the habit.

**Addressing Your Obstacle**

We'll tackle this together with the right structure.

**Recovery Note**

Prioritise sleep — it's when you actually get stronger.`);
      setPhase('recommendation');
    }
  };

  const handleConfirm = () => {
    const daysCount = parseInt(answers.trainingDays) || 3;
    const profile = {
      name:                answers.name || '',
      goal:                answers.goal || '',
      fitnessLevel:        EXP_MAP[answers.experience] || 'Beginner',
      currentRoutine:      answers.currentRoutine || '',
      obstacle:            answers.obstacle || '',
      equipment:           Array.isArray(answers.equipment) ? answers.equipment : (answers.equipment ? [answers.equipment] : []),
      trainingDays:        DAYS_MAP[daysCount] || DAYS_MAP[3],
      trainingDaysPerWeek: daysCount,
      sessionLength:       SESSION_MAP[answers.sessionLength] || 60,
      limitations:         answers.limitations || '',
      lifestyle:           answers.lifestyle || '',
      preferredSplit:      answers.preferredSplit || '',
      onboardingComplete:  true,
    };
    onComplete(profile);
  };

  const handleAdjust = () => {
    setPhase('chat');
    setRecommendation('');
    setSelectedChips([]);
    setInputText('');
    const backIdx = 7;
    setCurrentQ(backIdx);
    setMessages(prev => [...prev,
      { role:'coach', text:"No problem — let's refine a few things." },
      { role:'coach', text:QUESTIONS[backIdx].text },
    ]);
  };

  /* ─── LOADING ─── */
  if (phase === 'loading') {
    return (
      <div style={{ background:'#0D0D0F', height:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:32, padding:'0 40px' }}>
        <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:52, color:'#C8FF00', letterSpacing:'0.08em' }}>FORGE</div>
        <div style={{ textAlign:'center' }}>
          <p style={{ color:'#F5F5F0', fontSize:18, fontWeight:700, marginBottom:8, margin:'0 0 8px' }}>Building your program</p>
          <p style={{ color:'#8A8A8E', fontSize:14, margin:0 }}>{LOADING_PHRASES[loadingPhrase]}</p>
        </div>
        <div style={{ width:'100%', height:4, background:'#1A1A1C', borderRadius:99, overflow:'hidden' }}>
          <div style={{ height:'100%', background:'#C8FF00', borderRadius:99, animation:'forgeProgress 3s ease-in-out infinite' }}/>
        </div>
      </div>
    );
  }

  /* ─── RECOMMENDATION ─── */
  if (phase === 'recommendation') {
    const parseRec = (text) => {
      const parts = [];
      const regex = /\*\*(.+?)\*\*\s*[—-]?\s*([\s\S]*?)(?=\*\*|$)/g;
      let m;
      while ((m = regex.exec(text)) !== null) {
        parts.push({ heading: m[1].trim(), body: m[2].trim() });
      }
      if (parts.length === 0) parts.push({ heading: null, body: text });
      return parts;
    };
    const sections = parseRec(recommendation);

    return (
      <div style={{ background:'#0D0D0F', height:'100%', display:'flex', flexDirection:'column' }}>
        <div style={{ flexShrink:0, padding:'52px 20px 16px', display:'flex', alignItems:'center', gap:12 }}>
          <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:34, color:'#C8FF00', letterSpacing:'0.08em' }}>FORGE</div>
          <div style={{ flex:1 }}>
            <p style={{ color:'#F5F5F0', fontWeight:700, fontSize:16, margin:'0 0 2px' }}>Your Program is Ready</p>
            <p style={{ color:'#8A8A8E', fontSize:13, margin:0 }}>Here's what I've built for you, {answers.name}</p>
          </div>
        </div>

        <div style={{ flex:1, overflowY:'auto', padding:'0 20px 12px' }}>
          <div style={{ background:'#1A1A1C', borderRadius:20, padding:'20px', border:'1px solid #252527', display:'flex', flexDirection:'column', gap:16 }}>
            {sections.map((s, i) => (
              <div key={i}>
                {s.heading && (
                  <p style={{ color:'#C8FF00', fontFamily:"'Bebas Neue',sans-serif", fontSize:13, letterSpacing:'0.1em', margin:'0 0 5px' }}>{s.heading.toUpperCase()}</p>
                )}
                <p style={{ color:'#F5F5F0', fontSize:14, lineHeight:1.65, margin:0 }}>{s.body}</p>
              </div>
            ))}
          </div>
        </div>

        <div style={{ flexShrink:0, padding:'12px 20px', paddingBottom:'max(20px, env(safe-area-inset-bottom))', display:'flex', flexDirection:'column', gap:10 }}>
          <button onClick={handleConfirm}
            style={{ background:'#C8FF00', color:'#0D0D0F', border:'none', borderRadius:16, padding:'18px 0', fontFamily:"'Bebas Neue',sans-serif", fontSize:20, letterSpacing:'0.08em', cursor:'pointer', width:'100%', fontWeight:700 }}>
            LOOKS GOOD — LET'S GO
          </button>
          <button onClick={handleAdjust}
            style={{ background:'#1A1A1C', color:'#F5F5F0', border:'1.5px solid #3A3A3C', borderRadius:16, padding:'15px 0', fontFamily:"'Bebas Neue',sans-serif", fontSize:18, letterSpacing:'0.08em', cursor:'pointer', width:'100%' }}>
            ADJUST THIS
          </button>
        </div>
      </div>
    );
  }

  /* ─── SPLIT PICKER ─── */
  if (showSplitPicker) {
    const daysCount = parseInt(answers.trainingDays) || 3;
    const goal = answers.goal || '';
    return (
      <div style={{ background:'#0D0D0F', height:'100%', display:'flex', flexDirection:'column' }}>
        {/* Header */}
        <div style={{ flexShrink:0, padding:'52px 20px 12px', display:'flex', alignItems:'center', gap:10 }}>
          <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:32, color:'#C8FF00', letterSpacing:'0.08em' }}>FORGE</div>
          <div style={{ flex:1, marginLeft:8 }}>
            <p style={{ color:'#F5F5F0', fontWeight:700, fontSize:15, margin:0 }}>Choose Your Split</p>
            <p style={{ color:'#8A8A8E', fontSize:13, margin:0 }}>Tap a card to select</p>
          </div>
        </div>

        {/* Cards */}
        <div style={{ flex:1, overflowY:'auto', padding:'4px 16px 12px', display:'flex', flexDirection:'column', gap:10 }}>
          {SPLITS.map(split => {
            const badges = getSplitBadges(split.id, goal, daysCount);
            const active = selectedSplit === split.id;
            return (
              <button key={split.id} onClick={() => setSelectedSplit(split.id)}
                style={{ background: active ? 'rgba(200,255,0,0.07)' : '#1A1A1C', border: active ? '2px solid #C8FF00' : '1.5px solid #252527', borderRadius:16, padding:'14px 16px', textAlign:'left', cursor:'pointer', transition:'all 0.12s', position:'relative' }}>
                <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:8 }}>
                  <p style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:20, color: active ? '#C8FF00' : '#F5F5F0', margin:0, letterSpacing:'0.04em', lineHeight:1.1 }}>{split.id}</p>
                  {badges.length > 0 && (
                    <div style={{ display:'flex', flexDirection:'column', gap:4, flexShrink:0 }}>
                      {badges.map(b => (
                        <span key={b} style={{ fontSize:10, fontWeight:700, color:'#0D0D0F', background:'#C8FF00', borderRadius:99, padding:'3px 8px', whiteSpace:'nowrap' }}>{b}</span>
                      ))}
                    </div>
                  )}
                </div>
                <p style={{ color:'#8A8A8E', fontSize:13, margin:'5px 0 0', lineHeight:1.4 }}>{split.desc}</p>
              </button>
            );
          })}
        </div>

        {/* Confirm button */}
        <div style={{ flexShrink:0, padding:'12px 16px', paddingBottom:'max(20px, env(safe-area-inset-bottom))', borderTop:'1px solid #1A1A1C' }}>
          <button onClick={() => selectedSplit && handleSplitConfirm(selectedSplit)}
            disabled={!selectedSplit}
            style={{ width:'100%', padding:'18px 0', borderRadius:16, border:'none', background: selectedSplit ? '#C8FF00' : '#252527', color: selectedSplit ? '#0D0D0F' : '#8A8A8E', fontFamily:"'Bebas Neue',sans-serif", fontSize:20, letterSpacing:'0.08em', cursor: selectedSplit ? 'pointer' : 'not-allowed', transition:'background 0.12s, color 0.12s' }}>
            CONFIRM SPLIT
          </button>
        </div>
      </div>
    );
  }

  /* ─── CHAT ─── */
  const q = (currentQ >= 0 && currentQ < QUESTIONS.length) ? QUESTIONS[currentQ] : null;

  return (
    <div style={{ background:'#0D0D0F', height:'100%', display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <div style={{ flexShrink:0, padding:'52px 20px 10px', display:'flex', alignItems:'center', gap:10 }}>
        <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:32, color:'#C8FF00', letterSpacing:'0.08em' }}>FORGE</div>
        <div style={{ width:7, height:7, borderRadius:'50%', background:'#C8FF00', marginLeft:4, opacity:0.8 }}/>
        <p style={{ color:'#8A8A8E', fontSize:13, margin:0 }}>Coach Assessment</p>
      </div>

      {/* Chat feed */}
      <div style={{ flex:1, overflowY:'auto', padding:'4px 16px 8px', display:'flex', flexDirection:'column', gap:10 }}>
        {messages.map((m, i) => (
          <div key={i} style={{ display:'flex', justifyContent: m.role === 'user' ? 'flex-end' : 'flex-start' }}>
            {m.role === 'coach' && (
              <div style={{ maxWidth:'82%', background:'#1A1A1C', borderRadius:'18px 18px 18px 4px', padding:'12px 16px', border:'1px solid #252527' }}>
                <p style={{ color:'#F5F5F0', fontSize:15, lineHeight:1.55, margin:0 }}>{m.text}</p>
              </div>
            )}
            {m.role === 'user' && (
              <div style={{ maxWidth:'82%', background:'#C8FF00', borderRadius:'18px 18px 4px 18px', padding:'12px 16px' }}>
                <p style={{ color:'#0D0D0F', fontSize:15, lineHeight:1.55, margin:0, fontWeight:600 }}>{m.text}</p>
              </div>
            )}
          </div>
        ))}

        {typing && (
          <div style={{ display:'flex', justifyContent:'flex-start' }}>
            <div style={{ background:'#1A1A1C', borderRadius:'18px 18px 18px 4px', padding:'13px 18px', border:'1px solid #252527', display:'flex', gap:6, alignItems:'center' }}>
              {[0,1,2].map(i => (
                <div key={i} style={{ width:7, height:7, borderRadius:'50%', background:'#C8FF00', animation:'dotPulse 1.2s ' + (i*0.2) + 's ease-in-out infinite', opacity:0.4 }}/>
              ))}
            </div>
          </div>
        )}
        <div ref={chatEndRef}/>
      </div>

      {/* Input area */}
      {q && (
        <div style={{ flexShrink:0, padding:'10px 16px', paddingBottom:'max(16px, env(safe-area-inset-bottom))', borderTop:'1px solid #1A1A1C', background:'#111113' }}>
          {(q.type === 'chips' || q.type === 'multichips') && (
            <div style={{ display:'flex', flexWrap:'wrap', gap:8, marginBottom:10 }}>
              {q.options.map(opt => {
                const active = selectedChips.includes(opt);
                return (
                  <button key={opt} onClick={() => handleChipToggle(opt)}
                    style={{ padding:'9px 15px', borderRadius:99, border: active ? '1.5px solid #C8FF00' : '1.5px solid #3A3A3C', background: active ? 'rgba(200,255,0,0.12)' : '#1A1A1C', color: active ? '#C8FF00' : '#F5F5F0', fontSize:14, fontWeight:500, cursor:'pointer', transition:'all 0.12s' }}>
                    {opt}
                  </button>
                );
              })}
            </div>
          )}

          {q.type === 'textchips' && (
            <div>
              <div style={{ display:'flex', flexWrap:'wrap', gap:8, marginBottom:10 }}>
                {q.options.map(opt => (
                  <button key={opt} onClick={() => handleChipToggle(opt)}
                    style={{ padding:'8px 14px', borderRadius:99, border: inputText === opt ? '1.5px solid #C8FF00' : '1.5px solid #3A3A3C', background: inputText === opt ? 'rgba(200,255,0,0.12)' : '#1A1A1C', color: inputText === opt ? '#C8FF00' : '#F5F5F0', fontSize:14, fontWeight:500, cursor:'pointer', transition:'all 0.12s' }}>
                    {opt}
                  </button>
                ))}
              </div>
              <div style={{ marginBottom:10 }}>
                <input
                  ref={inputRef}
                  value={inputText}
                  onChange={e => setInputText(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey && canSubmit()) { e.preventDefault(); handleSubmit(); } }}
                  placeholder={q.placeholder || 'Or type your answer…'}
                  style={{ width:'100%', background:'#1A1A1C', border:'1.5px solid #3A3A3C', borderRadius:14, padding:'12px 16px', color:'#F5F5F0', fontSize:15, outline:'none', boxSizing:'border-box', fontFamily:"'DM Sans',sans-serif" }}
                />
              </div>
            </div>
          )}

          {q.type === 'text' && (
            <div style={{ marginBottom:10 }}>
              <input
                ref={inputRef}
                value={inputText}
                onChange={e => setInputText(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey && canSubmit()) { e.preventDefault(); handleSubmit(); } }}
                placeholder={q.placeholder || 'Type your answer…'}
                style={{ width:'100%', background:'#1A1A1C', border:'1.5px solid #3A3A3C', borderRadius:14, padding:'12px 16px', color:'#F5F5F0', fontSize:15, outline:'none', boxSizing:'border-box', fontFamily:"'DM Sans',sans-serif" }}
                autoFocus
              />
            </div>
          )}

          <div style={{ display:'flex', gap:10 }}>
            {q.skippable && (
              <button onClick={handleSkip}
                style={{ padding:'14px 18px', borderRadius:14, border:'1.5px solid #3A3A3C', background:'#1A1A1C', color:'#8A8A8E', fontSize:15, fontWeight:600, cursor:'pointer', flexShrink:0 }}>
                Skip
              </button>
            )}
            <button onClick={handleSubmit} disabled={!canSubmit()}
              style={{ flex:1, padding:'14px 0', borderRadius:14, border:'none', background: canSubmit() ? '#C8FF00' : '#252527', color: canSubmit() ? '#0D0D0F' : '#8A8A8E', fontFamily:"'Bebas Neue',sans-serif", fontSize:19, letterSpacing:'0.08em', cursor: canSubmit() ? 'pointer' : 'not-allowed', transition:'background 0.12s, color 0.12s' }}>
              {currentQ === QUESTIONS.length - 1 ? 'DONE' : 'SEND'}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

                <p className="text-[#8A8A8E] text-[9px] uppercase tracking-wider leading-none mt-0.5">STREAK</p>

            <h2 className="font-display text-2xl text-[#F5F5F0] mb-2"
