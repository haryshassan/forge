/* ── Nutrition utilities ── */

function sumMacros(meals) {
  return meals.reduce((t, m) => ({
    cal:  t.cal  + (m.macros?.cal  || 0),
    pro:  t.pro  + (m.macros?.pro  || 0),
    carb: t.carb + (m.macros?.carb || 0),
    fat:  t.fat  + (m.macros?.fat  || 0),
    fib:  t.fib  + (m.macros?.fib  || 0),
  }), { cal:0, pro:0, carb:0, fat:0, fib:0 });
}

function calcNutritionGoals(profile, nutritionGoals) {
  const bw = nutritionGoals.bodyweight || 80;
  const days = profile.trainingDaysPerWeek || 3;
  const mult = days <= 2 ? 26 : days <= 4 ? 28 : 30;
  const goalType = nutritionGoals.goalType || 'maintain';
  const tdee = bw * mult;
  const calories = goalType === 'lose' ? Math.round(tdee * 0.82)
                 : goalType === 'gain' ? Math.round(tdee * 1.12)
                 : Math.round(tdee);
  const proMult = goalType === 'lose' ? 2.2 : goalType === 'gain' ? 2.4 : 2.0;
  const protein = Math.round(bw * proMult);
  const fatCals = Math.round(calories * 0.25);
  const fatG = Math.round(fatCals / 9);
  const carbCals = calories - (protein * 4) - fatCals;
  const carbs = Math.max(50, Math.round(carbCals / 4));
  return { calories, protein, carbs, fat: fatG };
}


// Mifflin-St Jeor BMR
function calcBMR({ weight, height, age, sex }) {
  if (!weight || !height || !age) return null;
  const base = 10 * weight + 6.25 * height - 5 * age;
  return Math.round(sex === 'female' ? base - 161 : base + 5);
}
const ACTIVITY_MULTIPLIERS = {
  sedentary:    { label:'Sedentary (desk job, no exercise)',   mult:1.2 },
  light:        { label:'Lightly active (1–3 days/week)',      mult:1.375 },
  moderate:     { label:'Moderately active (3–5 days/week)',   mult:1.55 },
  very_active:  { label:'Very active (6–7 days/week)',         mult:1.725 },
  extra_active: { label:'Extra active (physical job + train)', mult:1.9 },
};
function calcTDEE(bmr, activityLevel) {
  const mult = ACTIVITY_MULTIPLIERS[activityLevel]?.mult || 1.55;
  return bmr ? Math.round(bmr * mult) : null;
}
function calcCardioCalories(activity, durationMin, intensity, weightKg) {
  const met = activity?.met?.[intensity] || 6;
  return Math.round(met * (weightKg || 75) * (durationMin / 60));
}

function getNutritionLog(nutritionLog, date) {
  return nutritionLog[date] || { meals: [] };
}

function checkNutritionBadges(nutritionLog, weightHistory, nutritionGoals, existing) {
  const now = new Date().toISOString();
  const earned = {};
  const allMeals = Object.values(nutritionLog).flatMap(d => d.meals || []);
  if (allMeals.length >= 1 && !existing.first_meal) earned.first_meal = { unlockedAt: now };
  // Count nutrition streaks
  let streak = 0, maxStreak = 0;
  const sorted = Object.keys(nutritionLog).sort();
  for (let i = 0; i < sorted.length; i++) {
    const d = nutritionLog[sorted[i]];
    const total = sumMacros(d.meals || []);
    if (total.cal >= (nutritionGoals.calories || 1500) * 0.8) {
      streak++;
      maxStreak = Math.max(maxStreak, streak);
    } else streak = 0;
  }
  if (maxStreak >= 14 && !existing.fuel_streak) earned.fuel_streak = { unlockedAt: now };
  // Protein goal streak
  let proStreak = 0;
  for (let i = sorted.length - 1; i >= 0; i--) {
    const d = nutritionLog[sorted[i]];
    const total = sumMacros(d.meals || []);
    if (total.pro >= (nutritionGoals.protein || 150)) proStreak++;
    else break;
  }
  if (proStreak >= 5 && !existing.protein_king) earned.protein_king = { unlockedAt: now };
  // Goal weight
  if (weightHistory.length > 0 && nutritionGoals.goalWeight) {
    const latest = weightHistory[weightHistory.length - 1].weight;
    const goalType = nutritionGoals.goalType;
    const hit = goalType === 'lose' ? latest <= nutritionGoals.goalWeight
              : goalType === 'gain' ? latest >= nutritionGoals.goalWeight
              : Math.abs(latest - nutritionGoals.goalWeight) <= 0.5;
    if (hit && !existing.goal_weight) earned.goal_weight = { unlockedAt: now };
  }
  return earned;
}

function useLocalStorage(key, initial) {
  const [val, setVal] = useState(() => {
    try { const item = localStorage.getItem(key); return item ? JSON.parse(item) : initial; }
    catch { return initial; }
  });
  const setStored = useCallback((v) => {
    setVal(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch {}
      syncToBackend(key, next);
      return next;
    });
  }, [key]);
  return [val, setStored];
}

async function callClaude(messages, maxTokens = 4000, system = '') {
  const token = localStorage.getItem('forge_token');
  const res = await fetch(`${BACKEND_URL}/ai/chat`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + (token || ''),
    },
    body: JSON.stringify({ messages, max_tokens: maxTokens, system }),
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || err.message || `API error ${res.status}`);
  }
  const data = await res.json();
  return data.content[0].text;
}

Straight sets only. No supersets. No substitutions. You MUST follow this day-by-day structure exactly with these exact exercises, sets, and reps. Do not merge days, swap exercises, or deviate from this list.`;
  }
  if (split === 'pplul' && days.length >= 5) {
    return `MANDATORY SPLIT: PPL + Upper/Lower over 5 days:

- ${days[1]}: Pull (back, biceps, rear delts)
- ${days[2]}: Legs (quads, hamstrings, glutes, calves)

  }

}

async function generatePlan(profile) {
  const splitInstructions = getSplitInstructions(profile);
  const prompt = `You are an elite personal trainer and strength and conditioning coach with 20 years of experience working with everyone from beginners to professional athletes. Your job is to design the perfect training program for this specific athlete based on their goal, experience level, available equipment, and schedule. Every exercise you choose must be intentional and evidence based. You will explain briefly why each exercise is selected.

ATHLETE PROFILE:
- Name: ${profile.name}
- Fitness Level: ${profile.fitnessLevel}
- Goal: ${profile.goal}
- Equipment: ${profile.equipment.join(', ')}
- Training Days Per Week: ${profile.trainingDaysPerWeek || profile.trainingDays?.length || 3}
- Preferred Training Days: ${(profile.trainingDays||[]).join(', ')}
- Session Length: ${profile.sessionLength} minutes

GENERAL RULES FOR ALL PLANS:
Every session must be completable in the athlete's stated session length — never exceed it. A session should have no more than 6 exercises for strength and muscle goals, no more than 7 for athletic performance, and no more than 5 for fat loss circuits. Quality over quantity always. Straight sets only — no supersets unless the goal is fat loss and the user has selected circuit style. Never program supersets for strength or muscle goals.
For each exercise include: exercise name, sets, reps or duration, rest period in seconds, and a one sentence reason explaining exactly why this exercise is in the program for this person's specific goal.

GOAL-SPECIFIC PROGRAMMING:

If goal is Build Muscle: prioritise compound movements first in each session — squat pattern, hip hinge, horizontal push, horizontal pull, vertical push, vertical pull. Follow with one or two isolation exercises targeting the session's focus muscle. Rep ranges 8 to 12. Rest 60 to 90 seconds. Choose exercises that maximise mechanical tension and muscle damage for hypertrophy. Avoid exercises with poor muscle activation for the target group. For example choose Romanian deadlift over straight leg deadlift for hamstring development because of superior stretch under load.

If goal is Get Stronger: prioritise barbell compound lifts. Deadlift, squat, bench press, overhead press, barbell row are the backbone. Rep ranges 3 to 6. Rest 2 to 4 minutes between heavy sets. Include one accessory block of 2 to 3 exercises at higher reps to build supporting muscle. Periodise across the week — do not repeat the same primary lift twice in the same week unless the split specifically calls for it.

If goal is Lose Fat: design sessions that maximise calorie burn and preserve muscle. Use compound movements performed at a moderate tempo with shorter rest periods of 30 to 45 seconds. Include a conditioning finisher at the end of every session — 8 to 10 minutes of circuit work, kettlebell swings, sled pushes, or bodyweight intervals depending on equipment. Rep ranges 12 to 15. Keep sessions fast paced and efficient.

If goal is Athletic Performance: this is the most technical plan. Structure every session with this order — movement prep and activation 5 minutes, power and plyometric block first while the nervous system is fresh, strength block second, accessory and stability work last. Power block must include at least one explosive movement per session — box jumps, broad jumps, medicine ball throws, power cleans, hang cleans, sprint variations depending on equipment. Strength block uses 5 to 8 rep ranges for main lifts. Include unilateral work every session — single leg squats, single leg RDLs, split squats — because athletic performance demands single leg strength and stability. Include one rotational or anti-rotation core exercise every session. Rest periods vary — 2 to 3 minutes after power work, 60 to 90 seconds after strength, 30 to 45 seconds in accessory block.

If goal is No Equipment or Calisthenics: build the program entirely from bodyweight progressions. Use progressive difficulty variations — for example if the user is a beginner program push ups, intermediate program archer push ups or decline push ups, advanced program pike push ups or pseudo planche push ups. Apply the same progressions to squat patterns, hip hinge patterns, pulling patterns using a bar or rings if available, and core patterns. Include plyometric variations where appropriate based on level. Rep ranges 8 to 15 or to near failure.

EQUIPMENT AWARENESS:
Always check the athlete's listed equipment before programming any exercise. Never program a barbell exercise for someone without a barbell. Never program a cable exercise for someone without cables. Substitute intelligently — if no cables use dumbbells or bands, if no barbell use dumbbells or trap bar if available, if no equipment use bodyweight progressions.

EXPERIENCE LEVEL ADJUSTMENTS:
Beginner — simpler movement patterns, machines over free weights where available, higher reps, longer rest, 3 to 4 exercises per session maximum, focus on learning movement patterns.
Intermediate — free weights, moderate complexity, full session length used, balanced volume.
Advanced — higher volume, more complex movements, can include Olympic lift variations if athletic performance goal, periodised intensity across the week.

SESSION LENGTH TARGETS:
30 minutes — 3 to 4 exercises, minimal rest.
45 minutes — 4 to 5 exercises, standard rest.
60 minutes — 5 to 6 exercises, full rest periods.
75 minutes plus — 6 to 7 exercises, full rest plus warm up block included in plan.

${splitInstructions}

Return ONLY a valid JSON object (no markdown, no explanation) matching this EXACT schema. The notes field must contain one specific sentence explaining exactly why this exercise was chosen for this person's goal — not generic, directly tied to their stated goal and experience level:
{
  "planName": "string",
  "weeklySchedule": [
    {
      "day": "Monday",
      "focus": "string",
      "workouts": [
        {
          "exercise": "string",
          "sets": 4,
          "reps": "8-12",
          "rest": "90s",
          "notes": "one sentence: why this specific exercise for this specific person's goal",
          "muscleGroup": "string"
        }
      ]
    }
  ],
  "motivationalMessage": "string",
  "coachTip": "string"
}`;
  const text = await callClaude([{ role:'user', content: prompt }], 4000);
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('Could not parse plan — please try again.');
  return JSON.parse(match[0]);
}

async function generateInsights(profile, logs, prs) {
  const recent = logs.slice(-20);
  const logSummary = recent.map(l =>
    `${l.date}: ${l.focus}, volume: ${Math.round(l.totalVolume||0)}kg, duration: ${l.duration}min`
  ).join('\n');
  const prSummary = Object.entries(prs).slice(0,6).map(([ex,pr]) =>
    `${ex}: ${pr.weight}kg × ${pr.reps}`
  ).join(', ') || 'None yet';

  const prompt = `You are a fitness coach analysing an athlete's training data.

ATHLETE: ${profile.name}, Goal: ${profile.goal}, Level: ${profile.fitnessLevel}

RECENT WORKOUTS (last ${recent.length}):
${logSummary}

PERSONAL RECORDS: ${prSummary}

Provide exactly 3 specific, actionable, motivating coaching insights based on this data.
Return ONLY a JSON array (no markdown): ["insight 1", "insight 2", "insight 3"]`;
  const text = await callClaude([{ role:'user', content: prompt }], 800);
  const match = text.match(/\[[\s\S]*\]/);
  if (!match) return null;
  return JSON.parse(match[0]);
}

/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */
function getTodayName() {
  const d = new Date().getDay(); // 0=Sun
  return DAYS[d === 0 ? 6 : d - 1];
}
function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'GOOD MORNING';
  if (h < 17) return 'GOOD AFTERNOON';
  return 'GOOD EVENING';
}
function getTodayISO() { return new Date().toISOString().split('T')[0]; }
function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'2-digit' });
}
function getDailyQuote() {
  const start = new Date(new Date().getFullYear(), 0, 0);
  const dayOfYear = Math.floor((Date.now() - start) / 86400000);
  return QUOTES[dayOfYear % QUOTES.length];
}
function getWeekStart(date = new Date()) {
  const d = new Date(date);
  const dow = d.getDay();
  const diff = dow === 0 ? 6 : dow - 1;
  d.setDate(d.getDate() - diff);
  d.setHours(0,0,0,0);
  return d.toISOString().split('T')[0];
}
function calcTotalVolume(exercises) {
  return exercises.reduce((tot, ex) =>
    tot + ex.sets.filter(s => s.done).reduce((s2, s) =>
      s2 + (parseFloat(s.weight)||0) * (parseFloat(s.reps)||0), 0
    ), 0
  );
}
function updateStreak(current, lastDate) {
  const today = getTodayISO();
  if (lastDate === today) return current;
  const yest = new Date(); yest.setDate(yest.getDate() - 1);
  const yesterdayISO = yest.toISOString().split('T')[0];
  if (lastDate === yesterdayISO) {
    const next = current.current + 1;
    return { current: next, longest: Math.max(current.longest, next), lastWorkoutDate: today };
  }
  return { current: 1, longest: Math.max(current.longest, 1), lastWorkoutDate: today };
}
function checkNewBadges(logs, prs, streak, existing) {
  const now = new Date().toISOString();
  const earned = {};
  const total = logs.reduce((s,l) => s + (l.totalVolume||0), 0);
  if (logs.length >= 1  && !existing.first_workout) earned.first_workout = { unlockedAt: now };
  if (streak.current >= 7 && !existing.week_streak)  earned.week_streak   = { unlockedAt: now };
  if (logs.length >= 10 && !existing.ten_workouts)   earned.ten_workouts  = { unlockedAt: now };
  if (Object.keys(prs).length > 0 && !existing.pr_crusher) earned.pr_crusher = { unlockedAt: now };
  if (total >= 10000    && !existing.volume_king)    earned.volume_king   = { unlockedAt: now };
  if (logs.length >= 20 && !existing.consistency)    earned.consistency   = { unlockedAt: now };
  return earned;
}

function formatCoachMessage(text) {
  return text.split('\n').filter((p, i, arr) => p.trim() !== '' || i < arr.length - 1).map((para, i) => {
    if (para.trim() === '') return <div key={i} style={{ height: 4 }}/>;
    const parts = [];
    let remaining = para;
    let key = 0;
    const bold = /\*\*(.+?)\*\*/g;
    let last = 0;
    let m;
    bold.lastIndex = 0;
    while ((m = bold.exec(para)) !== null) {
      if (m.index > last) parts.push(<span key={key++}>{para.slice(last, m.index)}</span>);
      parts.push(<span key={key++} style={{ color:'#C8FF00', fontWeight:700 }}>{m[1]}</span>);
      last = m.index + m[0].length;
    }
    if (last < para.length) parts.push(<span key={key++}>{para.slice(last)}</span>);
    return <div key={i} style={{ marginBottom: 6 }}>{parts}</div>;
  });
}

/* ── Plan-change helpers ── */
function parsePlanChange(text) {
  const marker = 'PLAN_CHANGE_SUGGESTED:';
  const idx = text.indexOf(marker);
  if (idx === -1) return { displayText: text, planChange: null };
  const displayText = text.slice(0, idx).trim();
  try {
    const planChange = JSON.parse(text.slice(idx + marker.length).trim());
    return { displayText, planChange };
  } catch {
    return { displayText, planChange: null };
  }
}

function applyPlanChangesToPlan(plan, changes) {
  if (!plan?.weeklySchedule) return plan;
  const updated = { ...plan, weeklySchedule: plan.weeklySchedule.map(d => ({ ...d, workouts: [...(d.workouts||[])] })) };
  (changes||[]).forEach(change => {
    const day = updated.weeklySchedule.find(d =>
      d.day?.toLowerCase().includes((change.day||'').toLowerCase()) ||
      (change.day||'').toLowerCase().includes(d.day?.toLowerCase())
    );
    if (!day) return;
    day.workouts = day.workouts.map(w => {
      const wName = (w.exercise||'').toLowerCase();
      const toReplace = (change.exercise_to_replace||'').toLowerCase();
      if (wName.includes(toReplace) || toReplace.includes(wName)) {
        return { ...w, exercise: change.replacement_exercise, sets: change.new_sets, reps: change.new_reps };
      }
      return w;
    });
  });
  return updated;
}

function PlanChangeCard({ planChange, onApply, onKeep }) {
  const summary = (planChange.changes||[]).map(c =>
    `Replace ${c.exercise_to_replace} on ${c.day} with ${c.replacement_exercise} (${c.new_sets}×${c.new_reps})`
  ).join('. ');
  return (
    <div style={{ borderLeft:'3px solid #C8FF00', background:'#1A1A1C', borderRadius:16, padding:'14px 16px', margin:'8px 0 4px 0' }}>
      <p style={{ fontFamily:"'Bebas Neue',sans-serif", color:'#C8FF00', fontSize:13, letterSpacing:'0.08em', marginBottom:6 }}>
        PLAN UPDATE SUGGESTED
      </p>
      {planChange.reason && (
        <p style={{ color:'#8A8A8E', fontSize:12, marginBottom:6, fontFamily:"'DM Sans',sans-serif" }}>{planChange.reason}</p>
      )}
      <p style={{ color:'#F5F5F0', fontSize:13, lineHeight:1.5, marginBottom:12, fontFamily:"'DM Sans',sans-serif" }}>{summary}</p>
      <div style={{ display:'flex', gap:8 }}>
        <button onClick={onApply}
          style={{ flex:1, padding:'10px 0', borderRadius:12, background:'#C8FF00', color:'#0D0D0F', fontFamily:"'Bebas Neue',sans-serif", fontSize:14, letterSpacing:'0.05em', border:'none', cursor:'pointer' }}>
          APPLY CHANGES
        </button>
        <button onClick={onKeep}
          style={{ flex:1, padding:'10px 0', borderRadius:12, background:'#252527', color:'#8A8A8E', fontFamily:"'Bebas Neue',sans-serif", fontSize:14, letterSpacing:'0.05em', border:'1px solid #3A3A3C', cursor:'pointer' }}>
          KEEP CURRENT
        </button>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   COACH SCREEN
═══════════════════════════════════════════════ */
function CoachScreen({ coachCheckins, profile, plan, logs, prs, streak,
  nutritionLog, nutritionGoals, weightHistory, cardioLog, badges, onPlanUpdate }) {

  const [section,  setSection]  = useState('CHAT');
  const [messages, setMessages] = useLocalStorage('forge_coach_messages', []);
  const [input,    setInput]    = useState('');
  const [typing,   setTyping]   = useState(false);
  const [planChanges, setPlanChanges] = useLocalStorage('forge_plan_changes', []);
  const [pendingPlanChanges, setPendingPlanChanges] = useState({});
  const [dismissedCheckinCard, setDismissedCheckinCard] = useState(false);
  const messagesEndRef = useRef(null);
  const inputRef       = useRef(null);
  const today = getTodayISO();

  /* ── Build system prompt from all user data ── */
  const buildSystemPrompt = () => {
    const name = (profile.name || 'Athlete').replace(/[^\x20-\x7E]/g, '');

    let planText = 'No plan generated yet.';
    try {
      if (plan?.weeklySchedule?.length) {
        planText = plan.weeklySchedule.map(d =>
          `${d.day||''} (${d.focus||''}): ${(d.workouts||[]).map(w=>`${w.exercise||''} ${w.sets||''}×${w.reps||''}`).join(', ')}`
        ).join('\n');
      }
    } catch(e) { planText = 'Plan data unavailable.'; }

    let recentLogs = 'No workouts logged yet.';
    try {
      recentLogs = (logs||[]).slice(-10).reverse().map(log => {
        const exList = (log.exercises||[]).map(e => {
          const done = (e.sets||[]).filter(s=>s.done&&s.weight);
          const best = done.length ? `(best: ${done.reduce((b,s)=>parseFloat(s.weight||0)>parseFloat(b.weight||0)?s:b,done[0]).weight}kg)` : '';
          return `${e.exercise||''}${best}`;
        }).join(', ');
        return `${log.date||''} — ${log.focus||''}: ${exList || 'no exercises recorded'}`;
      }).join('\n') || 'No workouts logged yet.';
    } catch(e) { recentLogs = 'Workout data unavailable.'; }

    let prsText = 'None yet.';
    try {
      prsText = Object.entries(prs||{}).slice(0,20)
        .map(([ex,d])=>`${ex}: ${d.weight}kg × ${d.reps}`).join(', ') || 'None yet.';
    } catch(e) { prsText = 'PR data unavailable.'; }

    const last7 = Array.from({length:7},(_,i)=>{
      const d=new Date(); d.setDate(d.getDate()-i); return d.toISOString().split('T')[0];
    });

    let nutritionText = 'No nutrition logged.';
    try {
      nutritionText = last7.filter(d=>(nutritionLog||{})[d]).map(d=>{
        const meals = (nutritionLog[d]?.meals)||[];
        const t = meals.reduce((acc,m)=>({
          cal:acc.cal+(m.macros?.cal||0), pro:acc.pro+(m.macros?.pro||0),
          carb:acc.carb+(m.macros?.carb||0), fat:acc.fat+(m.macros?.fat||0)
        }),{cal:0,pro:0,carb:0,fat:0});
        return `${d}: ${t.cal}kcal P:${t.pro}g C:${t.carb}g F:${t.fat}g`;
      }).join('\n') || 'No nutrition logged.';
    } catch(e) { nutritionText = 'Nutrition data unavailable.'; }

    let weightText = 'No weight entries.';
    try {
      weightText = (weightHistory||[]).slice(-30)
        .map(w=>`${w.date}: ${w.weight}kg`).join(', ') || 'No weight entries.';
    } catch(e) { weightText = 'Weight data unavailable.'; }

    let cardioText = 'No cardio logged.';
    try {
      cardioText = last7.map(d=>{
        const s=(cardioLog||{})[d]||[];
        return s.length ? `${d}: ${s.map(c=>`${c.name||''} ${c.duration||''}min ${c.intensity||''} -${c.calories||0}kcal`).join(', ')}` : null;
      }).filter(Boolean).join('\n') || 'No cardio logged.';
    } catch(e) { cardioText = 'Cardio data unavailable.'; }

    let journalText = 'No check-ins yet.';
    try {
      journalText = Object.entries(coachCheckins||{})
        .sort((a,b)=>b[0].localeCompare(a[0])).slice(0,7)
        .map(([d,v])=>v.workout ? `${d}: ${(v.workout.coachResponse||'').split('PLAN_CHANGE_SUGGESTED:')[0].trim().slice(0,120)}` : null)
        .filter(Boolean).join('\n') || 'No check-ins yet.';
    } catch(e) { journalText = 'Check-in data unavailable.'; }

    let badgeText = 'None yet.';
    try {
      badgeText = Object.entries(badges||{}).filter(([,v])=>v).map(([k])=>k).join(', ') || 'None yet.';
    } catch(e) { badgeText = 'Badge data unavailable.'; }

    let planChangesText = 'None yet.';
    try {
      planChangesText = (planChanges||[]).slice(-5).map(c =>
        `${c.date||''}: ${c.reason||''} — ${(c.changes||[]).map(ch=>`${ch.exercise_to_replace||''}→${ch.replacement_exercise||''} on ${ch.day||''}`).join(', ')}`
      ).join('\n') || 'None yet.';
    } catch(e) { planChangesText = 'Plan change data unavailable.'; }

    return `You are FORGE Coach, a world class personal trainer and nutritionist. You know everything about this athlete. You never diagnose injuries but can give training guidance around discomfort. Always address the athlete by their first name. When the athlete reports pain, fatigue, soreness, injury, or asks to modify their plan, you may suggest specific changes. To do so, end your message with PLAN_CHANGE_SUGGESTED: followed immediately by a valid JSON object (no extra text after the JSON) with fields: reason (string), changes (array of objects each with day, exercise_to_replace, replacement_exercise, new_sets, new_reps). Only suggest a plan change when clearly warranted — not every message.

Keep every response under 120 words total. Use short sentences. Use line breaks between every separate point or idea. Use a short bold heading before each new topic if covering more than one thing — for example **Recovery** or **Nutrition** or **Today's Focus**. Never write more than 2 sentences under any single heading. Never write a wall of text. If the user asks a simple question give a simple short answer. If the user asks something complex cover the top 2 or 3 points only and keep each one brief. Always sound like a coach sending a quick message not writing a report. Never cut off a response mid sentence. Always finish your thought completely. If you are running low on space wrap up the response early rather than stopping halfway through a sentence or paragraph. Keep responses concise but always complete.

ATHLETE: ${name} | Level: ${profile.fitnessLevel||'unknown'} | Goal: ${profile.goal||'unknown'} | Equipment: ${(profile.equipment||[]).join(', ')||'unknown'} | Split: ${profile.trainingSplit||'unknown'} | Days: ${(profile.trainingDays||[]).join(', ')||'unknown'} | Session: ${profile.sessionLength||60}min

CURRENT PLAN:
${planText}

LAST 10 WORKOUTS:
${recentLogs}

PERSONAL RECORDS: ${prsText}

STREAK: ${streak?.current||0} days current, ${streak?.longest||0} days longest

NUTRITION (last 7 days):
${nutritionText}

NUTRITION GOALS: ${nutritionGoals?.calories||2000}kcal | P:${nutritionGoals?.protein||150}g C:${nutritionGoals?.carbs||200}g F:${nutritionGoals?.fat||65}g

WEIGHT LOG: ${weightText}

CARDIO (last 7 days):
${cardioText}

CHECK-IN JOURNAL:
${journalText}

BADGES: ${badgeText}

RECENT PLAN CHANGES (last 5):
${planChangesText}`;
  };

  /* ── Auto-scroll ── */
  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior:'smooth' });
  }, [messages, typing]);

  /* ── Opening message on first load ── */
  useEffect(() => {
    if (messages.length === 0) {
      const name = profile.name || 'there';
      const splitLabel = profile.trainingSplit
        ? profile.trainingSplit.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())
        : 'your training program';
      const streakLine = (streak?.current||0) > 0
        ? `You're on a ${streak.current}-day streak`
        : "You haven't logged a workout yet — let's change that";
      const lastLog = (logs||[]).slice(-1)[0];
      const obsLine = lastLog
        ? `Your last session was ${lastLog.focus} on ${lastLog.date}`
        : 'No sessions logged yet, so there\'s nowhere to go but up';
      setMessages([{
        role: 'assistant',
        content: `Hey ${name}! ${streakLine} and you're running ${splitLabel}. ${obsLine}. I have full visibility into your training, nutrition, and recovery — so fire away. Whether it's about your plan, your macros, hitting a plateau, or simply what to focus on today, I'm here for all of it.`
      }]);
    }
  }, []);

  /* ── Plan change handlers ── */
  const handleApplyPlanChange = (planChange, cardKey) => {
    const updated = applyPlanChangesToPlan(plan, planChange.changes);
    if (onPlanUpdate) onPlanUpdate(updated);
    const entry = { date: today, reason: planChange.reason, changes: planChange.changes };
    setPlanChanges(prev => [...prev, entry].slice(-50));
    const changeSummary = (planChange.changes||[]).map(c => `${c.exercise_to_replace} → ${c.replacement_exercise} on ${c.day}`).join(', ');
    setMessages(m => [...m, { role:'assistant', content:`Done! Your plan has been updated: ${changeSummary}. You'll see it reflected in the Plan tab.` }].slice(-50));
    setPendingPlanChanges(prev => { const n = {...prev}; delete n[cardKey]; return n; });
  };

  const handleKeepPlanChange = (cardKey) => {
    setMessages(m => [...m, { role:'assistant', content:`No problem — keeping your current plan as is.` }].slice(-50));
    setPendingPlanChanges(prev => { const n = {...prev}; delete n[cardKey]; return n; });
  };

  /* ── Send message ── */
  const sendMessage = async (overrideText) => {
    const text = (overrideText !== undefined ? overrideText : input).trim();
    if (!text || typing) return;
    setInput('');
    const userMsg = { role:'user', content:text };
    const next = [...messages, userMsg].slice(-50);
    setMessages(next);
    setTyping(true);

    if (!localStorage.getItem('forge_token')) {
      setMessages(m => [...m, {
        role:'assistant',
        content:`Session expired — please log in again.`
      }].slice(-50));
      setTyping(false);
      return;
    }

    let systemPrompt = '';
    try { systemPrompt = buildSystemPrompt(); } catch(e) { console.error('buildSystemPrompt error:', e); systemPrompt = 'You are FORGE Coach, an expert personal trainer.'; }

    // Sanitize messages: only {role, content} as plain strings, strip PLAN_CHANGE blocks, drop invalid entries
    const apiMessages = next.slice(-20).map(m => ({
      role: m.role === 'user' ? 'user' : 'assistant',
      content: typeof m.content === 'string' ? parsePlanChange(m.content).displayText : '',
    })).filter(m => m.content.trim() !== '');

    const requestBody = {
      max_tokens: 500,
      system: systemPrompt,
      messages: apiMessages,
    };
    console.log('[FORGE Coach] request body:', JSON.stringify(requestBody, null, 2));

    try {
      const res = await fetch(`${BACKEND_URL}/ai/chat`, {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'Authorization': 'Bearer ' + (localStorage.getItem('forge_token') || ''),
        },
        body: JSON.stringify(requestBody),
      });
      const data = await res.json();
      if (!res.ok) {
        console.error('[FORGE Coach] API error:', res.status, JSON.stringify(data));
        throw new Error(data?.error?.message || `API ${res.status}`);
      }
      const rawReply = data?.content?.[0]?.text || "I couldn't generate a response right now. Try again.";
      const { displayText, planChange } = parsePlanChange(rawReply);
      const msgId = `msg_${Date.now()}`;
      setMessages(m => [...m, { role:'assistant', content:displayText, id:msgId }].slice(-50));
      if (planChange) setPendingPlanChanges(prev => ({ ...prev, [msgId]: planChange }));
    } catch(err) {
      console.error('[FORGE Coach] fetch error:', err);
      setMessages(m => [...m, {
        role:'assistant',
        content:`Something went wrong: ${err.message || 'Check your connection and API key, then try again.'}`
      }].slice(-50));
    } finally {
      setTyping(false);
    }
  };

  const CHIPS = ["How did I do this week?", "Tweak my plan", "What should I focus on today?"];

  const todayCheckin = coachCheckins[today];
  const allCheckins  = Object.entries(coachCheckins).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,5);

  return (
    <div className="h-full flex flex-col overflow-hidden">

      {/* Header + segmented control */}
      <div className="flex-shrink-0 px-5 pt-14 pb-0">
        <div className="flex items-center gap-3 mb-3">
          <div className="w-10 h-10 rounded-full bg-[#C8FF00] flex items-center justify-center flex-shrink-0">
            <Zap size={20} color="#0D0D0F"/>
          </div>
          <h1 className="font-display text-5xl text-[#F5F5F0]"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>COACH</h1>
        </div>
        <div className="flex bg-[#1A1A1C] p-1 rounded-2xl mb-3">
          {['CHAT','CHECK-INS','BODY MAP'].map(s => (
            <button key={s} onClick={()=>setSection(s)}
              className={`flex-1 py-2 rounded-xl text-xs font-semibold transition-all ${
                section===s ? 'bg-[#C8FF00] text-[#0D0D0F]' : 'text-[#8A8A8E]'
              }`}>
              {s}
            </button>
          ))}
        </div>
      </div>

      {/* ── CHAT ── */}
      {section === 'CHAT' && (
        <div className="flex-1 flex flex-col overflow-hidden">
          {/* Message feed */}
          <div className="flex-1 overflow-y-auto px-4 py-2" style={{ overscrollBehavior:'contain' }}>
            {messages.map((msg, i) => (
              <div key={i}>
                <div className={`flex mb-1 ${msg.role==='user' ? 'justify-end' : 'justify-start'}`}>
                  {msg.role==='assistant' && (
                    <div className="w-7 h-7 rounded-full bg-[#C8FF00] flex items-center justify-center flex-shrink-0 mr-2 mt-1">
                      <Zap size={12} color="#0D0D0F"/>
                    </div>
                  )}
                  <div style={{ maxWidth:'78%' }}>
                    <div className={`px-4 py-3 rounded-2xl ${
                      msg.role==='user'
                        ? 'bg-[#C8FF00] text-[#0D0D0F] rounded-tr-sm'
                        : 'bg-[#1A1A1C] text-[#F5F5F0] border border-[#252527] rounded-tl-sm'
                    }`}>
                      {msg.role === 'user' ? (
                        <p className="text-sm leading-relaxed" style={{ fontFamily:"'DM Sans',sans-serif" }}>
                          {msg.content}
                        </p>
                      ) : (
                        <div className="text-sm leading-relaxed" style={{ fontFamily:"'DM Sans',sans-serif" }}>
                          {formatCoachMessage(msg.content)}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
                {msg.role==='assistant' && msg.id && pendingPlanChanges[msg.id] && (
                  <div className="ml-9 mb-3">
                    <PlanChangeCard
                      planChange={pendingPlanChanges[msg.id]}
                      onApply={() => handleApplyPlanChange(pendingPlanChanges[msg.id], msg.id)}
                      onKeep={() => handleKeepPlanChange(msg.id)}
                    />
                  </div>
                )}
              </div>
            ))}

            {/* Typing indicator */}
            {typing && (
              <div className="flex mb-3 justify-start">
                <div className="w-7 h-7 rounded-full bg-[#C8FF00] flex items-center justify-center flex-shrink-0 mr-2 mt-1">
                  <Zap size={12} color="#0D0D0F"/>
                </div>
                <div className="bg-[#1A1A1C] border border-[#252527] rounded-2xl rounded-tl-sm px-4 py-3">
                  <div className="flex gap-1.5 items-center" style={{ height:20 }}>
                    {[0,1,2].map(i => (
                      <div key={i} className="w-2 h-2 rounded-full bg-[#C8FF00]"
                        style={{ animation:`dotPulse 1.2s ${i*0.2}s ease-in-out infinite`, opacity:0.4 }}/>
                    ))}
                  </div>
                </div>
              </div>
            )}
            <div ref={messagesEndRef}/>
          </div>

          {/* Quick-prompt chips */}
          <div className="flex-shrink-0 px-4 pb-2 flex gap-2 overflow-x-auto" style={{ scrollbarWidth:'none' }}>
            {CHIPS.map(chip => (
              <button key={chip}
                onClick={() => { setInput(chip); setTimeout(()=>inputRef.current?.focus(), 0); }}
                className="flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold active:scale-95 transition-all whitespace-nowrap"
                style={{ background:'#1A1A1C', border:'1px solid #252527', color:'#C8FF00', fontFamily:"'DM Sans',sans-serif" }}>
                {chip}
              </button>
            ))}
          </div>

          {/* Input bar — sits below chips, above bottom nav */}
          <div className="flex-shrink-0 px-4 pt-1"
            style={{ paddingBottom:'calc(4.5rem + env(safe-area-inset-bottom))' }}>
            <div className="flex items-center gap-2 rounded-2xl px-3 py-2"
              style={{ background:'#252527' }}>
              <input ref={inputRef} value={input}
                onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); }}}
                placeholder="Ask your coach anything..."
                className="flex-1 bg-transparent text-[#F5F5F0] text-sm outline-none placeholder:text-[#6A6A6E]"
                style={{ fontFamily:"'DM Sans',sans-serif" }}/>
              <button onClick={()=>sendMessage()} disabled={!input.trim()||typing}
                className={`w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 transition-all active:scale-90 ${
                  input.trim()&&!typing ? 'bg-[#C8FF00]' : 'bg-[#3A3A3C]'
                }`}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                  stroke={input.trim()&&!typing ? '#0D0D0F' : '#5A5A5E'}
                  strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <line x1="22" y1="2" x2="11" y2="13"/>
                  <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── CHECK-INS ── */}
      {section === 'CHECK-INS' && (
        <div className="flex-1 overflow-y-auto pb-28 px-5 pt-2">
          <p className="text-[#8A8A8E] text-xs uppercase tracking-widest mb-3">Today's Check-in</p>
          {todayCheckin?.workout ? (() => {
            const { displayText: ciText, planChange: ciPlanChange } = parsePlanChange(todayCheckin.workout.coachResponse || '');
            return (
              <>
                <div className="bg-[rgba(200,255,0,0.06)] rounded-2xl p-5 border border-[rgba(200,255,0,0.15)] mb-2">
                  <span className="text-[#C8FF00] font-display text-sm tracking-widest"
                    style={{ fontFamily:"'Bebas Neue',sans-serif" }}>✓ WORKOUT CHECK-IN DONE</span>
                  <p className="text-[#F5F5F0] text-sm leading-relaxed mt-2">{ciText}</p>
                </div>
                {ciPlanChange && !dismissedCheckinCard && (
                  <div className="mb-4">
                    <PlanChangeCard
                      planChange={ciPlanChange}
                      onApply={() => {
                        const updated = applyPlanChangesToPlan(plan, ciPlanChange.changes);
                        if (onPlanUpdate) onPlanUpdate(updated);
                        setPlanChanges(prev => [...prev, { date: today, reason: ciPlanChange.reason, changes: ciPlanChange.changes }].slice(-50));
                        setDismissedCheckinCard(true);
                      }}
                      onKeep={() => setDismissedCheckinCard(true)}
                    />
                  </div>
                )}
              </>
            );
          })() : (
            <div className="bg-[#1A1A1C] rounded-2xl p-5 border border-[#252527] mb-4">
              <p className="text-[#8A8A8E] text-sm">Complete a workout to trigger your post-workout coach check-in.</p>
            </div>
          )}

          {allCheckins.length > 0 && (
            <>
              <p className="text-[#8A8A8E] text-xs uppercase tracking-widest mb-3">Recent Coach Messages</p>
              <div className="space-y-3">
                {allCheckins.map(([date, checkin]) => checkin.workout && (
                  <div key={date} className="bg-[#1A1A1C] rounded-2xl p-4 border border-[#252527]">
                    <p className="text-[#C8FF00] text-xs font-display tracking-widest mb-2"
                      style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
                      {new Date(date).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}
                      {checkin.workout.focus ? ` · ${checkin.workout.focus}` : ''}
                    </p>
                    <p className="text-[#8A8A8E] text-sm leading-relaxed line-clamp-2">{parsePlanChange(checkin.workout.coachResponse||'').displayText}</p>
                    <div className="flex flex-wrap gap-1.5 mt-2">
                      {(checkin.workout.answers||[]).map((a,i) => (
                        <span key={i} className="text-[10px] px-2 py-0.5 rounded-full bg-[#252527] text-[#8A8A8E] border border-[#3A3A3C]">{a}</span>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}

          {allCheckins.length === 0 && (
            <div className="bg-[#1A1A1C] rounded-3xl p-8 border border-[#252527] flex flex-col items-center text-center">
              <div className="text-5xl mb-4">⚡</div>

              <p className="text-[#8A8A8E] text-sm leading-relaxed">
                Complete a workout and your coach will check in with you automatically.
              </p>
            </div>
          )}
        </div>
      )}

      {/* ── BODY MAP ── */}
      {section === 'BODY MAP' && (
        <div className="flex-1 overflow-y-auto pb-28">
          <BodyMap profile={profile} plan={plan} onPlanUpdate={onPlanUpdate} planChanges={planChanges} setPlanChanges={setPlanChanges}/>

      )}
    </div>
  );
}

function buildQuestions(selectedMuscles) {
  const seen = new Set();
  const qs = [];
  Object.keys(selectedMuscles).forEach(muscle => {
    const cat = MUSCLE_CATEGORY[muscle];
    if (cat && !seen.has(cat) && QUESTION_SETS[cat]) {
      seen.add(cat);
      QUESTION_SETS[cat].forEach(q => qs.push({ ...q, category: cat }));
    }
  });
  return qs;
}

  const [hovered,  setHovered]    = useState(null);
  const [phase,    setPhase]      = useState('map'); // map | questions | response | redflag
  const [qList,    setQList]      = useState([]);
  const [qIdx,     setQIdx]       = useState(0);
  const [answers,  setAnswers]    = useState([]);

    setSelected(prev => {
      if (!prev[id]) return { ...prev, [id]: 'moderate' };
      if (prev[id] === 'moderate') return { ...prev, [id]: 'severe' };
      const n = { ...prev }; delete n[id]; return n;
    });
  };
  const clearMuscle = (id) => setSelected(prev => { const n={...prev}; delete n[id]; return n; });

    const qs = buildQuestions(selected);

    const q = qList[qIdx];
    // Red flag check
    if (q.redFlag && answer === q.redFlag.answer) {

        const hasSevere = Object.values(selected).includes('severe');
        if (!hasSevere) { continueAfterAnswer(answer); return; }

  const continueAfterAnswer = (answer) => {
    const newAnswers = [...answers, { q: qList[qIdx].q, a: answer }];

      setQIdx(i => i + 1);
    } else {

    setPhase('response'); setLoading(true);

      const muscleList = Object.entries(selected).map(([m,s])=>`${m} (${s})`).join(', ');

              onMouseEnter={e=>e.currentTarget.style.borderColor='#C8FF00'}
              onMouseLeave={e=>e.currentTarget.style.borderColor='#3A3A3C'}>
              {opt}
            </button>
          ))}
        </div>
      </div>
    );
  }

  if (phase === 'response') return (
    <div className="px-5 py-4">
      {loading ? (
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', paddingTop:40 }}>
          <div style={{ display:'flex', gap:8, marginBottom:16 }}>
            {[0,1,2].map(i=>(
              <div key={i} style={{ width:10, height:10, borderRadius:'50%', background:'#C8FF00', animation:`dotPulse 1.2s ${i*0.2}s ease-in-out infinite`, opacity:0.4 }}/>
            ))}
          </div>
          <p style={{ color:'#8A8A8E', fontSize:13, fontFamily:"'DM Sans',sans-serif" }}>Analysing your assessment...</p>
        </div>
      ) : (
        <div>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
            <p style={{ fontFamily:"'Bebas Neue',sans-serif", color:'#C8FF00', fontSize:16, letterSpacing:'0.08em' }}>PHYSIO ASSESSMENT</p>
            <button onClick={resetAll} style={{ color:'#8A8A8E', fontSize:12, background:'none', border:'none', cursor:'pointer', fontFamily:"'DM Sans',sans-serif" }}>New Assessment</button>
          </div>
          <div style={{ background:'#1A1A1C', border:'1px solid #252527', borderRadius:20, padding:'16px 18px', marginBottom:12 }}>
            <div style={{ fontSize:13, lineHeight:1.6, fontFamily:"'DM Sans',sans-serif" }}>
              {formatCoachMessage(advice||'')}
            </div>
          </div>
          {bmPlanChange && !bmCardDismissed && (
            <PlanChangeCard
              planChange={bmPlanChange}
              onApply={() => {
                const updated = applyPlanChangesToPlan(plan, bmPlanChange.changes);
                if (onPlanUpdate) onPlanUpdate(updated);
                if (setPlanChanges) setPlanChanges(prev=>[...prev,{date:getTodayISO(),reason:bmPlanChange.reason,changes:bmPlanChange.changes}].slice(-50));
                setBmCardDismissed(true);
              }}
              onKeep={() => setBmCardDismissed(true)}
            />
          )}
        </div>
      )}
    </div>
  );

  // ── Map phase ────────────────────────────────
  return (
    <div>
      {/* Body Maps */}
      <div style={{ display:'flex', justifyContent:'center', gap:16, padding:'8px 8px 4px', overflowX:'auto' }}>
        <BodyMapSVG regions={FRONT_REGIONS} label="FRONT"/>
        <BodyMapSVG regions={BACK_REGIONS}  label="BACK"/>
      </div>

      {/* Legend */}
      <div style={{ display:'flex', gap:20, justifyContent:'center', padding:'4px 16px 8px' }}>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <div style={{ width:8, height:8, borderRadius:'50%', background:'#FF9F0A' }}/>
          <span style={{ color:'#8A8A8E', fontSize:10, fontFamily:"'DM Sans',sans-serif" }}>Moderate — tap once</span>
        </div>
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <div style={{ width:8, height:8, borderRadius:'50%', background:'#FF453A' }}/>
          <span style={{ color:'#8A8A8E', fontSize:10, fontFamily:"'DM Sans',sans-serif" }}>Severe — tap twice</span>
        </div>
      </div>

      {/* Selected pills */}
      {selectedCount > 0 && (
        <div style={{ margin:'0 16px 10px', display:'flex', flexWrap:'wrap', gap:6 }}>
          {Object.entries(selected).map(([m,s])=>(
            <span key={m} style={{ display:'inline-flex', alignItems:'center', gap:5, fontSize:11, padding:'4px 8px 4px 10px', borderRadius:20,
              background: s==='severe'?'rgba(255,69,58,0.15)':'rgba(255,159,10,0.15)',
              color: s==='severe'?'#FF453A':'#FF9F0A',
              border: `1px solid ${s==='severe'?'rgba(255,69,58,0.4)':'rgba(255,159,10,0.4)'}`,
              fontFamily:"'DM Sans',sans-serif", fontWeight:600 }}>
              {m} · {s}
              <button onClick={()=>clearMuscle(m)} style={{ background:'none', border:'none', cursor:'pointer',
                color: s==='severe'?'#FF453A':'#FF9F0A', fontSize:13, lineHeight:1, padding:0, opacity:0.7 }}>×</button>
            </span>
          ))}
        </div>
      )}

      {/* Get advice button */}
      {selectedCount > 0 && (
        <div style={{ padding:'0 16px 16px' }}>
          <button onClick={startAssessment}
            style={{ width:'100%', padding:'15px 0', background:'#C8FF00', color:'#0D0D0F',
              fontFamily:"'Bebas Neue',sans-serif", fontSize:18, letterSpacing:'0.08em',
              border:'none', borderRadius:16, cursor:'pointer', transition:'opacity 0.15s' }}>
            GET COACH ADVICE ({selectedCount} area{selectedCount>1?'s':''})
          </button>
        </div>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   LOADING PLAN SCREEN
═══════════════════════════════════════════════ */
function LoadingPlan({ error }) {
  const msgs = [
    'ANALYSING YOUR GOALS…',
    'BUILDING YOUR PLAN…',
    'CALCULATING YOUR GAINS…',
    'OPTIMISING EXERCISES…',
    'ALMOST READY…',
  ];
  const [idx, setIdx] = useState(0);
  useEffect(() => {
    if (error) return;
    const t = setInterval(() => setIdx(i => (i + 1) % msgs.length), 1800);
    return () => clearInterval(t);
  }, [error]);

  return (
    <div className="fixed inset-0 bg-[#0D0D0F] z-50 flex flex-col items-center justify-center px-8">
      {error ? (
        <>
          <div className="text-5xl mb-4">⚠️</div>
          <p className="font-display text-2xl text-[#FF453A] text-center mb-3">PLAN GENERATION FAILED</p>
          <p className="text-[#8A8A8E] text-sm text-center leading-relaxed">{error}</p>
          <p className="text-[#8A8A8E] text-xs text-center mt-4">Check your API key in Profile and try again.</p>
        </>
      ) : (
        <>
          <div className="relative mb-10">
            <div className="w-28 h-28 rounded-3xl bg-[#1A1A1C] flex items-center justify-center animate-pulse-ring">
              <span className="font-display text-6xl text-[#C8FF00]" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>F</span>
            </div>
            <div className="absolute inset-0 rounded-3xl border-2 border-[#C8FF00] opacity-20 animate-ping"/>
          </div>
          <p key={idx} className="font-display text-2xl text-[#C8FF00] tracking-wider animate-fade-slide"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
            {msgs[idx]}
          </p>
          <p className="text-[#8A8A8E] text-sm mt-3">Claude AI is crafting your programme</p>
          <div className="mt-10 flex gap-2">
            {[0,1,2,3,4].map(i => (
              <div key={i} className="w-2 h-2 rounded-full bg-[#C8FF00]"
                style={{ animation:`dotPulse 1.4s ${i*0.2}s ease-in-out infinite`,
                         opacity:0.4 }}/>
            ))}
          </div>
        </>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   PROFILE / ONBOARDING SCREEN
═══════════════════════════════════════════════ */
function ProfileScreen({ profile, onSave, onGeneratePlan, isExisting, onNutritionGoals=()=>{}, onLogout=()=>{} }) {
  const TOTAL_STEPS = 7;
  const [step, setStep] = useState(0);
  const [form, setForm] = useState({
    name:                profile.name || '',
    fitnessLevel:        profile.fitnessLevel || '',
    goal:                profile.goal || '',
    equipment:           profile.equipment || [],
    trainingDaysPerWeek: profile.trainingDaysPerWeek || 3,
    trainingDays:        profile.trainingDays || [],
    trainingSplit:       profile.trainingSplit || '',
    sessionLength:       profile.sessionLength || 60,
  });

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const toggleArr = (k, val) =>
    setForm(f => ({
      ...f, [k]: f[k].includes(val) ? f[k].filter(x => x !== val) : [...f[k], val]
    }));

  const canAdvance = () => {
    if (step === 0) return form.name.trim().length > 0;
    if (step === 1) return !!form.fitnessLevel;
    if (step === 2) return !!form.goal;
    if (step === 3) return form.equipment.length > 0;
    if (step === 4) return form.trainingDays.length > 0;
    if (step === 5) return !!form.trainingSplit;
    if (step === 6) return !!form.sessionLength;
    return true;
  };

  const handleFinish = () => {
    const saved = { ...form, trainingDaysPerWeek: form.trainingDays.length, onboardingComplete: true };
    onSave(saved);
    onGeneratePlan(saved);
  };

  /* ── Existing profile view ── */
  if (isExisting) {
    return (
      <div className="h-full overflow-y-auto pb-28">
        {/* Header */}
        <div className="px-5 pt-14 pb-6">
          <h1 className="font-display text-5xl text-[#F5F5F0]" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>PROFILE</h1>
          <p className="text-[#8A8A8E] text-sm">Your training preferences</p>
        </div>

        <div className="px-5 space-y-3">
          {/* Name / level / goal */}
          <div className="bg-[#1A1A1C] rounded-2xl p-5 border border-[#252527] flex items-center justify-between">
            <div>
              <p className="text-[#8A8A8E] text-xs uppercase tracking-widest mb-0.5">Athlete</p>
              <p className="font-display text-2xl text-[#F5F5F0]" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{profile.name}</p>
            </div>
            <span className="bg-[rgba(200,255,0,0.1)] text-[#C8FF00] text-xs px-3 py-1 rounded-full font-semibold border border-[rgba(200,255,0,0.2)]">{profile.fitnessLevel}</span>
          </div>

          <div className="bg-[#1A1A1C] rounded-2xl p-5 border border-[#252527]">
            <p className="text-[#8A8A8E] text-xs uppercase tracking-widest mb-2">Goal</p>
            <span className="bg-[#C8FF00] text-[#0D0D0F] px-3 py-1 rounded-full text-sm font-bold">{profile.goal}</span>
          </div>

          <div className="bg-[#1A1A1C] rounded-2xl p-5 border border-[#252527]">
            <p className="text-[#8A8A8E] text-xs uppercase tracking-widest mb-3">Equipment</p>
            <div className="flex flex-wrap gap-2">
              {(profile.equipment||[]).map(e => (
                <span key={e} className="bg-[#252527] text-[#F5F5F0] px-3 py-1 rounded-full text-xs border border-[#3A3A3C]">{e}</span>
              ))}
            </div>
          </div>

          <div className="bg-[#1A1A1C] rounded-2xl p-5 border border-[#252527]">
            <p className="text-[#8A8A8E] text-xs uppercase tracking-widest mb-3">Training Schedule</p>
            <div className="flex flex-wrap gap-2 mb-2">
              {(profile.trainingDays||[]).map(d => (
                <span key={d} className="bg-[#252527] text-[#F5F5F0] px-3 py-1 rounded-full text-xs border border-[#3A3A3C]">{d}</span>
              ))}
            </div>
            <p className="text-[#8A8A8E] text-xs">{profile.sessionLength} min sessions</p>
          </div>

          <button onClick={() => { onSave({ ...profile, onboardingComplete: false }); }}
            className="w-full py-4 rounded-2xl bg-[#252527] text-[#F5F5F0] font-display text-xl tracking-wider active:scale-95 transition-all border border-[#3A3A3C]"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
            EDIT PROFILE
          </button>

          <button onClick={() => onGeneratePlan(profile)}
            className="w-full py-4 rounded-2xl bg-[#C8FF00] text-[#0D0D0F] font-display text-xl tracking-wider active:scale-95 transition-all"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
            REGENERATE PLAN
          </button>

          {/* Nutrition goals link */}
          <button onClick={onNutritionGoals}
            className="w-full py-4 rounded-2xl bg-[#1A1A1C] text-[#C8FF00] font-display text-xl tracking-wider active:scale-95 transition-all border border-[rgba(200,255,0,0.2)] flex items-center justify-center gap-2"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
            <Flame size={18} color="#C8FF00"/> NUTRITION GOALS
          </button>

          <button onClick={onLogout}
            className="w-full py-4 rounded-2xl bg-[#1A1A1C] text-[#8A8A8E] font-display text-xl tracking-wider active:scale-95 transition-all border border-[#252527]"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
            LOG OUT
          </button>
        </div>
      </div>
    );
  }

  /* ── Onboarding wizard ── */
  return (
    <div className="h-full flex flex-col bg-[#0D0D0F]">
      {/* Progress bar */}
      <div className="flex-shrink-0 px-5 pt-14 pb-0">
        <div className="flex gap-1.5 mb-8">
          {Array.from({ length: TOTAL_STEPS }).map((_,i) => (
            <div key={i} className="h-1 flex-1 rounded-full transition-all duration-300"
              style={{ background: i <= step ? '#C8FF00' : '#252527' }}/>
          ))}
        </div>
      </div>

      {/* Step content */}
      <div className="flex-1 overflow-y-auto px-5 pb-4">

        {/* Step 0: Name */}
        {step === 0 && (
          <div className="animate-fade-slide">
            <p className="text-[#C8FF00] font-display text-sm tracking-widest mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>STEP 1 OF 7</p>
            <h2 className="font-display text-5xl text-[#F5F5F0] mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>WHAT'S YOUR NAME?</h2>
            <p className="text-[#8A8A8E] mb-8">We'll use this to personalise everything.</p>
            <input type="text" value={form.name}
              onChange={e => set('name', e.target.value)}
              onKeyDown={e => e.key === 'Enter' && canAdvance() && setStep(1)}
              placeholder="Your name…" autoFocus
              className="w-full bg-[#1A1A1C] text-[#F5F5F0] rounded-2xl px-5 py-5 text-2xl font-display border border-[#3A3A3C] focus:border-[#C8FF00] outline-none tracking-wider"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}/>
          </div>
        )}

        {/* Step 1: Level */}
        {step === 1 && (
          <div className="animate-fade-slide">
            <p className="text-[#C8FF00] font-display text-sm tracking-widest mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>STEP 2 OF 7</p>
            <h2 className="font-display text-5xl text-[#F5F5F0] mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>YOUR LEVEL?</h2>
            <p className="text-[#8A8A8E] mb-8">Be honest — it helps us build the right plan.</p>
            <div className="space-y-3">
              {LEVELS.map(level => (
                <button key={level} onClick={() => set('fitnessLevel', level)}
                  className={`w-full text-left px-6 py-5 rounded-2xl border-2 transition-all active:scale-95
                    ${form.fitnessLevel === level
                      ? 'border-[#C8FF00] bg-[rgba(200,255,0,0.07)]'
                      : 'border-[#3A3A3C] bg-[#1A1A1C]'}`}>
                  <p className={`font-display text-2xl ${form.fitnessLevel === level ? 'text-[#C8FF00]' : 'text-[#F5F5F0]'}`}
                    style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{level.toUpperCase()}</p>
                  <p className="text-[#8A8A8E] text-sm mt-0.5">{LEVEL_DESC[level]}</p>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Step 2: Goal */}
        {step === 2 && (
          <div className="animate-fade-slide">
            <p className="text-[#C8FF00] font-display text-sm tracking-widest mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>STEP 3 OF 7</p>
            <h2 className="font-display text-5xl text-[#F5F5F0] mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>YOUR GOAL?</h2>
            <p className="text-[#8A8A8E] mb-8">What are you training for?</p>
            <div className="space-y-3">
              {GOALS.map(goal => (
                <button key={goal} onClick={() => set('goal', goal)}
                  className={`w-full text-left px-6 py-4 rounded-2xl border-2 transition-all active:scale-95
                    ${form.goal === goal
                      ? 'border-[#C8FF00] bg-[rgba(200,255,0,0.07)]'
                      : 'border-[#3A3A3C] bg-[#1A1A1C]'}`}>
                  <p className={`font-display text-xl ${form.goal === goal ? 'text-[#C8FF00]' : 'text-[#F5F5F0]'}`}
                    style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{goal.toUpperCase()}</p>
                </button>
              ))}
            </div>
          </div>
        )}

        {/* Step 3: Equipment */}
        {step === 3 && (
          <div className="animate-fade-slide">
            <p className="text-[#C8FF00] font-display text-sm tracking-widest mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>STEP 4 OF 7</p>
            <h2 className="font-display text-5xl text-[#F5F5F0] mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>EQUIPMENT?</h2>
            <p className="text-[#8A8A8E] mb-8">Select everything you have access to.</p>
            <div className="flex flex-wrap gap-3">
              {EQUIPMENT_OPTIONS.map(eq => (
                <Pill key={eq} active={form.equipment.includes(eq)} onClick={() => toggleArr('equipment', eq)}>{eq}</Pill>
              ))}
            </div>
          </div>
        )}

        {/* Step 4: Training days */}
        {step === 4 && (
          <div className="animate-fade-slide">
            <p className="text-[#C8FF00] font-display text-sm tracking-widest mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>STEP 5 OF 7</p>
            <h2 className="font-display text-5xl text-[#F5F5F0] mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>TRAINING DAYS?</h2>
            <p className="text-[#8A8A8E] mb-6">Which days will you train each week?</p>
            <div className="flex justify-between gap-1 mb-5">
              {DAY_ABBR.map((abbr, i) => {
                const day = DAYS[i];
                const on = form.trainingDays.includes(day);
                return (
                  <button key={day} onClick={() => toggleArr('trainingDays', day)}
                    className={`w-10 h-10 rounded-xl text-xs font-display transition-all active:scale-90
                      ${on ? 'bg-[#C8FF00] text-[#0D0D0F]' : 'bg-[#1A1A1C] text-[#8A8A8E] border border-[#3A3A3C]'}`}
                    style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
                    {abbr}
                  </button>
                );
              })}
            </div>
            {form.trainingDays.length > 0 && (
              <div className="bg-[#1A1A1C] rounded-2xl p-4 border border-[#252527] flex flex-wrap gap-2">
                {form.trainingDays.map(d => (
                  <span key={d} className="text-[#C8FF00] text-xs bg-[rgba(200,255,0,0.1)] px-2 py-0.5 rounded-full">{d.slice(0,3)}</span>
                ))}
                <span className="text-[#8A8A8E] text-xs ml-auto self-center">{form.trainingDays.length} days</span>
              </div>
            )}
          </div>
        )}

        {/* Step 5: Training split */}
        {step === 5 && (
          <div className="animate-fade-slide">
            <p className="text-[#C8FF00] font-display text-sm tracking-widest mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>STEP 6 OF 7</p>
            <h2 className="font-display text-5xl text-[#F5F5F0] mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>YOUR SPLIT?</h2>
            <p className="text-[#8A8A8E] mb-6">Choose how to structure your {form.trainingDays.length}-day week.</p>
            <div className="space-y-3">
              {(TRAINING_SPLITS[Math.min(form.trainingDays.length, 7)] || TRAINING_SPLITS[3]).map(split => {
                const sel = form.trainingSplit === split.id;
                return (
                <button key={split.id} onClick={() => set('trainingSplit', split.id)}
                  className={`w-full text-left px-5 py-4 rounded-2xl border-2 transition-all active:scale-95 relative
                    ${sel ? 'border-[#C8FF00] bg-[rgba(200,255,0,0.07)]' : 'border-[#3A3A3C] bg-[#1A1A1C]'}`}>
                  {split.badge && (
                    <span className="absolute top-3 right-4 text-[9px] font-bold px-2 py-0.5 rounded-full"
                      style={{ background:'rgba(200,255,0,0.2)', color:'#C8FF00', border:'1px solid rgba(200,255,0,0.3)' }}>
                      {split.badge}
                    </span>
                  )}
                  <p className={`font-display text-xl ${sel ? 'text-[#C8FF00]' : 'text-[#F5F5F0]'}`}
                    style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{split.name.toUpperCase()}</p>
                  {split.days && (
                    <p className="text-[#8A8A8E] text-xs mt-0.5">{split.days}</p>
                  )}
                  <p className={`text-sm mt-1 ${sel ? 'text-[rgba(200,255,0,0.7)]' : 'text-[#8A8A8E]'}`}>{split.desc}</p>
                  {split.bestFor && (
                    <p className="text-[#8A8A8E] text-[11px] mt-1">Best for: {split.bestFor}</p>
                  )}
                </button>
                );
              })}
            </div>
          </div>
        )}

        {/* Step 6: Session length */}
        {step === 6 && (
          <div className="animate-fade-slide">
            <p className="text-[#C8FF00] font-display text-sm tracking-widest mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>STEP 7 OF 7</p>
            <h2 className="font-display text-5xl text-[#F5F5F0] mb-2" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>LAST DETAILS</h2>
            <p className="text-[#8A8A8E] mb-6">How long are your sessions?</p>

            <div className="grid grid-cols-4 gap-3 mb-8">
              {SESSION_LENGTHS.map(len => (
                <button key={len} onClick={() => set('sessionLength', len)}
                  className={`py-4 rounded-2xl text-center border-2 transition-all active:scale-95
                    ${form.sessionLength === len
                      ? 'border-[#C8FF00] bg-[rgba(200,255,0,0.07)]'
                      : 'border-[#3A3A3C] bg-[#1A1A1C]'}`}>
                  <p className={`font-display text-2xl ${form.sessionLength === len ? 'text-[#C8FF00]' : 'text-[#F5F5F0]'}`}
                    style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{len}</p>
                  <p className="text-[#8A8A8E] text-xs">min</p>
                </button>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* CTA row */}
      <div className="flex-shrink-0 px-5 py-4 flex gap-3"
        style={{ paddingBottom:'max(1.5rem, env(safe-area-inset-bottom))' }}>
        {step > 0 && (
          <button onClick={() => setStep(s => s - 1)}
            className="w-14 h-14 rounded-2xl bg-[#1A1A1C] flex items-center justify-center active:scale-95 transition-all border border-[#3A3A3C]">
            <ChevronLeft size={24} color="#F5F5F0"/>
          </button>
        )}
        <button
          onClick={() => step < TOTAL_STEPS - 1 ? setStep(s => s + 1) : handleFinish()}
          disabled={!canAdvance()}
          className={`flex-1 py-4 rounded-2xl font-display text-xl tracking-wider transition-all active:scale-95
            ${canAdvance() ? 'bg-[#C8FF00] text-[#0D0D0F]' : 'bg-[#252527] text-[#8A8A8E]'}`}
          style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
          {step === TOTAL_STEPS - 1 ? 'GENERATE MY PLAN' : 'CONTINUE'}
        </button>
      </div>
    </div>
  );
}
