/* Inline meal entry section */
function MealSection({ mealName, items, today, onAdd, onDelete }) {
  const BLANK = { cal:'', pro:'', carb:'', fat:'', note:'' };
  const [formOpen, setFormOpen] = useState(false);
  const [editId,   setEditId]   = useState(null);
  const [fields,   setFields]   = useState(BLANK);

  const mealTotals = sumMacros(items);
  const set = (k) => (e) => setFields(f => ({...f, [k]: e.target.value}));

  const openAdd = () => { setFields(BLANK); setEditId(null); setFormOpen(true); };

  const openEdit = (item) => {
    setFields({
      cal:  String(item.macros.cal  || ''),
      pro:  String(item.macros.pro  || ''),
      carb: String(item.macros.carb || ''),
      fat:  String(item.macros.fat  || ''),
      note: item.note || item.name  || '',
    });
    setEditId(item.id);
    setFormOpen(true);
  };

  const handleSave = () => {
    const cal  = parseInt(fields.cal)    || 0;
    const pro  = parseFloat(fields.pro)  || 0;
    const carb = parseFloat(fields.carb) || 0;
    const fat  = parseFloat(fields.fat)  || 0;
    if (cal === 0 && pro === 0 && carb === 0 && fat === 0) return;
    if (editId) onDelete(today, editId);
    onAdd(today, {
      id:     `meal_${Date.now()}`,
      meal:   mealName,
      name:   fields.note.trim() || mealName,
      note:   fields.note.trim(),
      macros: { cal, pro, carb, fat, fib: 0 },
    });
    setFields(BLANK); setEditId(null); setFormOpen(false);
  };

  const handleCancel = () => { setFields(BLANK); setEditId(null); setFormOpen(false); };

  return (
    <div className="px-5 mb-3">
      {/* Meal header */}
      <div className="flex items-center justify-between py-2">
        <div className="flex items-center gap-2 min-w-0">
          <span className="font-display text-lg text-[#F5F5F0]"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{mealName.toUpperCase()}</span>
          {items.length > 0 && (
            <span className="text-[#8A8A8E] text-xs flex-shrink-0">
              {items.length} item{items.length !== 1 ? 's' : ''} &middot; {mealTotals.cal} kcal
            </span>
          )}
        </div>
        {!formOpen && (
          <button onClick={openAdd}
            className="flex items-center gap-1 px-3 py-1.5 rounded-xl text-xs font-semibold active:scale-90 ml-2 flex-shrink-0"
            style={{ background:'rgba(200,255,0,0.1)', border:'1px solid rgba(200,255,0,0.2)', color:'#C8FF00' }}>
            <Plus size={11} color="#C8FF00" strokeWidth={2.5}/> ADD
          </button>
        )}
      </div>

      {/* Saved entries */}
      {items.length > 0 && (
        <div className="bg-[#1A1A1C] rounded-2xl overflow-hidden border border-[#252527] mb-2">
          {items.map((item, i) => (
            <div key={item.id}
              className={`flex items-center gap-3 px-4 py-3 ${i > 0 ? 'border-t border-[#252527]' : ''}`}>
              <button onClick={() => openEdit(item)} className="flex-1 min-w-0 text-left active:opacity-70">
                <p className="text-[#F5F5F0] text-sm font-medium truncate">
                  {item.note || item.name || mealName}
                </p>
                <p className="text-[#8A8A8E] text-xs">
                  {item.macros.cal} kcal &middot; P:{item.macros.pro}g &middot; C:{item.macros.carb}g &middot; F:{item.macros.fat}g
                </p>
              </button>
              <button onClick={() => onDelete(today, item.id)}
                className="w-8 h-8 rounded-lg bg-[#252527] flex items-center justify-center active:scale-90 flex-shrink-0">
                <X size={13} color="#FF453A"/>
              </button>
            </div>
          ))}
        </div>
      )}

      {/* Empty state */}
      {items.length === 0 && !formOpen && (
        <div className="bg-[#1A1A1C] rounded-2xl border border-[#252527] px-4 py-3 text-center">
          <p className="text-[#3A3A3C] text-xs">Nothing logged yet</p>
        </div>
      )}

      {/* Inline entry form */}
      {formOpen && (
        <div className="bg-[#1A1A1C] rounded-2xl p-4"
          style={{ border:'1px solid rgba(200,255,0,0.25)' }}>
          {/* Note */}
          <input value={fields.note} onChange={set('note')}
            placeholder="Meal note — e.g. chicken salad (optional)"
            className="w-full bg-[#252527] rounded-xl px-3 py-2.5 text-[#F5F5F0] text-sm outline-none placeholder:text-[#8A8A8E] mb-3 border border-[#3A3A3C]"/>
          {/* Macro fields */}
          <div className="grid grid-cols-4 gap-2 mb-3">
            {[
              { label:'CALORIES', key:'cal',  unit:'kcal' },
              { label:'PROTEIN',  key:'pro',  unit:'g' },
              { label:'CARBS',    key:'carb', unit:'g' },
              { label:'FAT',      key:'fat',  unit:'g' },
            ].map(({ label, key, unit }) => (
              <div key={key} className="flex flex-col items-center gap-1">
                <p className="text-[#8A8A8E] text-[9px] font-semibold tracking-wide text-center">{label}</p>
                <input type="number" inputMode="numeric" min="0"
                  value={fields[key]} onChange={set(key)}
                  placeholder="0"
                  className="w-full bg-[#252527] rounded-xl px-1 py-2 text-[#F5F5F0] text-sm text-center outline-none border border-[#3A3A3C] placeholder:text-[#3A3A3C]"/>
                <p className="text-[#8A8A8E] text-[9px]">{unit}</p>
              </div>
            ))}
          </div>
          {/* Buttons */}
          <div className="flex gap-2">
            <button onClick={handleCancel}
              className="flex-1 py-2.5 rounded-xl bg-[#252527] text-[#8A8A8E] text-sm font-semibold active:scale-95 transition-all">
              CANCEL
            </button>
            <button onClick={handleSave}
              className="py-2.5 rounded-xl bg-[#C8FF00] text-[#0D0D0F] text-sm font-semibold active:scale-95 transition-all"
              style={{ flex:2 }}>
              SAVE
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* Main FUEL screen */
function FuelScreen({ nutritionLog, nutritionGoals, weightHistory, onAddFood, onDeleteFood, onLogWeight, profile, cardioLog={}, onAddCardio, onDeleteCardio }) {
  const today = getTodayISO();
  const todayLog = getNutritionLog(nutritionLog, today);
  const totals = sumMacros(todayLog.meals);
  const goals = nutritionGoals;
  const MEALS = ['Breakfast', 'Lunch', 'Dinner', 'Snack'];

  const [showCardio,  setShowCardio]  = useState(false);
  const [addToast,    setAddToast]    = useState('');
  const [weightInput, setWeightInput] = useState('');
  const [showChart,   setShowChart]   = useState(false);

  const todayCardio  = (cardioLog[today] || []);
  const burnedToday  = todayCardio.reduce((s, c) => s + (c.calories || 0), 0);
  const netCalories  = totals.cal - burnedToday;

  const todayWeight  = weightHistory.find(w => w.date === today);
  const latestWeight = weightHistory.length > 0 ? weightHistory[weightHistory.length - 1].weight : null;

  const hour = new Date().getHours();
  const showNudge = hour >= 20 && totals.cal < (goals.calories || 2000) * 0.5;

  const handleAddFood = (date, entry) => {
    onAddFood(date, entry);
    setAddToast(`✓ ${entry.name || entry.meal} logged`);
    setTimeout(() => setAddToast(''), 2500);
  };

  const handleAddCardio = (entry) => {
    if (onAddCardio) onAddCardio(today, entry);
    setShowCardio(false);
    setAddToast(`✓ ${entry.name} logged`);
    setTimeout(() => setAddToast(''), 2500);
  };

  const handleLogWeight = () => {
    const w = parseFloat(weightInput);
    if (!w || w <= 0) return;
    onLogWeight(today, w);
    setWeightInput('');
  };

  return (
    <div className="h-full overflow-y-auto pb-32">
      {/* Toast */}
      {addToast && (
        <div className="fixed top-5 left-1/2 z-[60] animate-toast" style={{ transform:'translateX(-50%)' }}>
          <div className="bg-[#1A1A1C] border border-[#C8FF00] rounded-2xl px-5 py-3 text-[#C8FF00] font-semibold text-sm whitespace-nowrap shadow-xl">
            {addToast}
          </div>
        </div>
      )}

      {/* Cardio modal */}
      {showCardio && (
        <CardioAddModal onAdd={handleAddCardio} onClose={()=>setShowCardio(false)} userWeight={latestWeight}/>
      )}

      {/* Header */}
      <div className="px-5 pt-14 pb-2">
        <h1 className="font-display text-5xl text-[#F5F5F0]"
          style={{ fontFamily:"'Bebas Neue',sans-serif" }}>FUEL</h1>
        <p className="text-[#8A8A8E] text-sm">
          {new Date().toLocaleDateString('en-GB', { weekday:'long', day:'numeric', month:'long' })}
        </p>
      </div>

      {/* Calorie ring + macros */}
      <div className="px-5 mb-4">
        <div className="bg-[#1A1A1C] rounded-3xl p-5 border border-[#252527]">
          <div className="flex items-center justify-center mb-3">
            <CalorieRing consumed={netCalories > 0 ? netCalories : totals.cal} goal={goals.calories || 2000}/>
          </div>
          {burnedToday > 0 && (
            <div className="flex items-center justify-between mb-4 px-2 py-2 bg-[#252527] rounded-xl">
              <div className="text-center flex-1">
                <p className="text-[#8A8A8E] text-[10px]">{'🍽'} EATEN</p>
                <p className="font-display text-base text-[#F5F5F0]" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{totals.cal}</p>
              </div>
              <span className="text-[#3A3A3C] font-bold">{'−'}</span>
              <div className="text-center flex-1">
                <p className="text-[#8A8A8E] text-[10px]">{'🔥'} BURNED</p>
                <p className="font-display text-base text-[#FF9F0A]" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{burnedToday}</p>
              </div>
              <span className="text-[#3A3A3C] font-bold">=</span>
              <div className="text-center flex-1">
                <p className="text-[#8A8A8E] text-[10px]">{'⚡'} NET</p>
                <p className="font-display text-base text-[#C8FF00]" style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{netCalories}</p>
              </div>
            </div>
          )}
          {showNudge && netCalories < (goals.calories || 2000) * 0.4 && (
            <div className="mb-3 px-3 py-2 bg-[rgba(255,159,10,0.08)] border border-[rgba(255,159,10,0.2)] rounded-xl">
              <p className="text-[#FF9F0A] text-xs text-center">{'⚠️'} You're well under your calorie goal today</p>
            </div>
          )}
          <div className="flex gap-2">
            <MacroCard label="PROTEIN" current={totals.pro}  goal={goals.protein || 150} color="#60A5FA"/>
            <MacroCard label="CARBS"   current={totals.carb} goal={goals.carbs   || 200} color="#FBBF24"/>
            <MacroCard label="FAT"     current={totals.fat}  goal={goals.fat     || 65}  color="#FB923C"/>
          </div>
        </div>
      </div>

      {/* Weight log card */}
      <div className="px-5 mb-4">
        <div className="bg-[#1A1A1C] rounded-2xl p-4 border border-[#252527]">
          <div className="flex items-center justify-between mb-3">
            <p className="font-display text-lg text-[#F5F5F0]"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
              {todayWeight ? 'TODAY\'S WEIGHT' : 'LOG TODAY\'S WEIGHT'}
            </p>
            {weightHistory.length >= 2 && (
              <button onClick={()=>setShowChart(c=>!c)}
                className="text-[#C8FF00] text-xs font-semibold active:scale-90">
                {showChart ? 'HIDE' : 'CHART'}
              </button>
            )}
          </div>
          {todayWeight ? (
            <div className="flex items-baseline gap-2">
              <span className="font-display text-4xl text-[#C8FF00]"
                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>{todayWeight.weight}</span>
              <span className="text-[#8A8A8E]">kg</span>
              {nutritionGoals.goalWeight && (
                <span className="ml-auto text-[#8A8A8E] text-sm">
                  {Math.abs(todayWeight.weight - nutritionGoals.goalWeight).toFixed(1)} kg to goal
                </span>
              )}
            </div>
          ) : (
            <div className="flex items-center gap-3">
              <input type="number" value={weightInput}
                onChange={e=>setWeightInput(e.target.value)}
                placeholder={latestWeight ? `${latestWeight}` : '0.0'}
                className="set-input" style={{ width:96, fontSize:22 }}/>
              <span className="text-[#8A8A8E]">kg</span>
              <button onClick={handleLogWeight}
                className="ml-auto px-5 py-2.5 rounded-xl bg-[#C8FF00] text-[#0D0D0F] font-display text-base active:scale-95"
                style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
                LOG
              </button>
            </div>
          )}
          {showChart && weightHistory.length >= 2 && (
            <div className="mt-4 pt-4 border-t border-[#252527]">
              <WeightChart history={weightHistory} goalWeight={nutritionGoals.goalWeight}/>
            </div>
          )}
        </div>
      </div>

      {/* Cardio section */}
      {(todayCardio.length > 0 || onAddCardio) && (
        <div className="px-5 mb-3">
          <div className="flex items-center justify-between py-2">
            <span className="font-display text-lg text-[#F5F5F0]"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>CARDIO</span>
            <div className="flex items-center gap-2">
              {burnedToday > 0 && (
                <span className="text-[#FF9F0A] text-xs font-display"
                  style={{ fontFamily:"'Bebas Neue',sans-serif" }}>-{burnedToday} kcal</span>
              )}
              <button onClick={()=>setShowCardio(true)}
                className="flex items-center gap-1 text-[#C8FF00] text-xs font-semibold active:scale-90">
                <Plus size={12} color="#C8FF00"/> ADD
              </button>
            </div>
          </div>
          {todayCardio.length > 0 && (
            <div className="bg-[#1A1A1C] rounded-2xl overflow-hidden border border-[#252527]">
              {todayCardio.map((entry, i) => (
                <div key={entry.id}
                  className={`flex items-center gap-3 px-4 py-3 ${i > 0 ? 'border-t border-[#252527]' : ''}`}>
                  <span className="text-xl flex-shrink-0">{entry.emoji}</span>
                  <div className="flex-1 min-w-0">
                    <p className="text-[#F5F5F0] text-sm font-medium">{entry.name}</p>
                    <p className="text-[#8A8A8E] text-xs">
                      {entry.duration}min &middot; {entry.intensity}
                      {entry.distance ? ` · ${entry.distance}km` : ''}
                    </p>
                  </div>
                  <div className="text-right flex-shrink-0 mr-2">
                    <p className="text-[#FF9F0A] text-sm font-display"
                      style={{ fontFamily:"'Bebas Neue',sans-serif" }}>-{entry.calories}</p>
                    <p className="text-[#8A8A8E] text-[10px]">kcal</p>
                  </div>
                  {onDeleteCardio && (
                    <button onClick={()=>onDeleteCardio(today, entry.id)}
                      className="w-8 h-8 rounded-lg bg-[#252527] flex items-center justify-center active:scale-90 flex-shrink-0">
                      <X size={13} color="#FF453A"/>
                    </button>
                  )}
                </div>
              ))}
            </div>
          )}
          {todayCardio.length === 0 && (
            <div className="bg-[#1A1A1C] rounded-2xl border border-[#252527] px-4 py-4 text-center">
              <p className="text-[#8A8A8E] text-xs">No cardio logged today</p>
            </div>
          )}
        </div>
      )}

      {/* Meal sections — manual macro entry */}
      {MEALS.map(mealName => {
        const items = todayLog.meals.filter(m => m.meal === mealName);
        return (
          <MealSection
            key={mealName}
            mealName={mealName}
            items={items}
            today={today}
            onAdd={handleAddFood}
            onDelete={onDeleteFood}
          />
        );
      })}
    </div>
  );
}

const BACKEND_URL = 'https://forge-backend-production-aa16.up.railway.app';

async function syncToBackend(key, value) {
  try {
    const token = localStorage.getItem('forge_token');
    if (!token) return;
    await fetch(`${BACKEND_URL}/data/${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ value }),
    });
  } catch {}
}

async function loadFromBackend(key) {
  try {
    const token = localStorage.getItem('forge_token');
    if (!token) return null;
    const res = await fetch(`${BACKEND_URL}/data/${key}`, {
      headers: { 'Authorization': 'Bearer ' + token },
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data.value !== undefined ? data.value : (data !== null ? data : null);
  } catch { return null; }
}

/* ═══════════════════════════════════════════════
   LOGIN SCREEN
═══════════════════════════════════════════════ */
function LoginScreen({ onAuth }) {
  const [email,    setEmail]    = useState('');
  const [password, setPassword] = useState('');
  const [error,    setError]    = useState('');
  const [loading,  setLoading]  = useState(false);

  const attempt = async (endpoint) => {
    if (!email.trim() || !password.trim()) { setError('Please enter your email and password.'); return; }
    setLoading(true); setError('');
    try {
      const res = await fetch(`${BACKEND_URL}/auth/${endpoint}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email.trim().toLowerCase(), password }),
      });
      const data = await res.json();
      if (!res.ok) { setError(data.message || data.error || 'Something went wrong. Try again.'); return; }
      const token = data.token || data.access_token || data.jwt;
      if (!token) { setError('No token received. Please try again.'); return; }
      localStorage.setItem('forge_token', token);
      onAuth();
    } catch(e) {
      setError('Could not connect to server. Check your connection.');
    } finally { setLoading(false); }
  };

  return (
    <div style={{ position:'fixed', inset:0, background:'#0D0D0F', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center', padding:'0 24px', fontFamily:"'DM Sans',sans-serif" }}>
      <div style={{ marginBottom:44, textAlign:'center' }}>
        <div style={{ width:64, height:64, borderRadius:'50%', background:'#C8FF00', display:'flex',
          alignItems:'center', justifyContent:'center', margin:'0 auto 14px' }}>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="#0D0D0F">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </div>
        <p style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:52, color:'#F5F5F0',
          letterSpacing:'0.05em', lineHeight:1, margin:0 }}>FORGE</p>
        <p style={{ color:'#8A8A8E', fontSize:14, marginTop:6 }}>AI-powered training</p>
      </div>

      <div style={{ width:'100%', maxWidth:380 }}>
        <input type="email" value={email} onChange={e=>{setEmail(e.target.value);setError('');}}
          placeholder="Email"
          style={{ width:'100%', background:'#1A1A1C', color:'#F5F5F0', border:'1px solid #252527',
            borderRadius:16, padding:'14px 18px', fontSize:16, fontFamily:"'DM Sans',sans-serif",
            outline:'none', boxSizing:'border-box', marginBottom:10 }}/>
        <input type="password" value={password} onChange={e=>{setPassword(e.target.value);setError('');}}
          onKeyDown={e=>{ if(e.key==='Enter') attempt('login'); }}
          placeholder="Password"
          style={{ width:'100%', background:'#1A1A1C', color:'#F5F5F0', border:'1px solid #252527',
            borderRadius:16, padding:'14px 18px', fontSize:16, fontFamily:"'DM Sans',sans-serif",
            outline:'none', boxSizing:'border-box', marginBottom: error ? 8 : 18 }}/>
        {error && (
          <p style={{ color:'#FF453A', fontSize:13, marginBottom:14, textAlign:'center' }}>{error}</p>
        )}
        <button onClick={()=>attempt('login')} disabled={loading}
          style={{ width:'100%', padding:'16px 0', background: loading ? '#8A8A8E' : '#C8FF00',
            color:'#0D0D0F', fontFamily:"'Bebas Neue',sans-serif", fontSize:20, letterSpacing:'0.08em',
            border:'none', borderRadius:16, cursor: loading ? 'not-allowed' : 'pointer', marginBottom:10 }}>
          {loading ? 'LOADING...' : 'LOGIN'}
        </button>
        <button onClick={()=>attempt('register')} disabled={loading}
          style={{ width:'100%', padding:'16px 0', background:'transparent', color:'#C8FF00',
            fontFamily:"'Bebas Neue',sans-serif", fontSize:20, letterSpacing:'0.08em',
            border:'1px solid rgba(200,255,0,0.3)', borderRadius:16,
            cursor: loading ? 'not-allowed' : 'pointer' }}>
          CREATE ACCOUNT
        </button>
      </div>
    </div>
  );
}

function LoadingScreen() {
  return (
    <div style={{ position:'fixed', inset:0, background:'#0D0D0F', display:'flex', flexDirection:'column',
      alignItems:'center', justifyContent:'center' }}>

/* ═══════════════════════════════════════════════
   APP ROOT
═══════════════════════════════════════════════ */
function App() {
  const [profile,  setProfile]  = useLocalStorage('forge_profile', {
    name:'', fitnessLevel:'', goal:'', equipment:[],
    trainingDaysPerWeek:3, trainingDays:[], sessionLength:60,
    onboardingComplete:false
  });
  const [plan,    setPlan]    = useLocalStorage('forge_plan',   null);
  const [logs,    setLogs]    = useLocalStorage('forge_logs',   []);
  const [prs,     setPrs]     = useLocalStorage('forge_prs',    {});
  const [badges,  setBadges]  = useLocalStorage('forge_badges', {});
  const [streak,  setStreak]  = useLocalStorage('forge_streak', { current:0, longest:0, lastWorkoutDate:null });
  const [nutritionLog,   setNutritionLog]   = useLocalStorage('forge_nutr_log',   {});
  const [nutritionGoals, setNutritionGoals] = useLocalStorage('forge_nutr_goals', { calories:2000, protein:150, carbs:200, fat:65, goalType:'maintain', bodyweight:80, goalWeight:'' });
  const [weightHistory,  setWeightHistory]  = useLocalStorage('forge_weight',     []);
  const [cardioLog,      setCardioLog]      = useLocalStorage('forge_cardio_log', {});
  const [coachCheckins,  setCoachCheckins]  = useLocalStorage('forge_coach_checkins', {});
  const [sorenessLog,    setSorenessLog]    = useLocalStorage('forge_soreness_log', {});

  const [authed,         setAuthed]        = useState(!!localStorage.getItem('forge_token'));
  const [loadingData,    setLoadingData]   = useState(!!localStorage.getItem('forge_token'));
  const [activeTab,      setActiveTab]     = useState('home');
  const [activeWorkout,  setActiveWorkout] = useState(null);
  const [workoutResult,  setWorkoutResult] = useState(null);
  const [newBadges,      setNewBadges]     = useState([]);
  const [generatingPlan, setGenerating]   = useState(false);
  const [showNutrGoals,  setShowNutrGoals] = useState(false);
  const [planError,      setPlanError]    = useState(null);
  const [showCoachCheckin, setShowCoachCheckin] = useState(false);

  /* ── Load all data from backend after auth ── */
  useEffect(() => {
    if (!authed) return;
    setLoadingData(true);
    const KEYED = [
      ['forge_profile',        setProfile],
      ['forge_plan',           setPlan],
      ['forge_logs',           setLogs],
      ['forge_prs',            setPrs],
      ['forge_badges',         setBadges],
      ['forge_streak',         setStreak],
      ['forge_nutr_log',       setNutritionLog],
      ['forge_nutr_goals',     setNutritionGoals],
      ['forge_weight',         setWeightHistory],
      ['forge_cardio_log',     setCardioLog],
      ['forge_coach_checkins', setCoachCheckins],
    ];
    const LS_ONLY = ['forge_coach_messages', 'forge_plan_changes', 'forge_coach_journal', 'forge_soreness_log'];
    Promise.all([
      ...KEYED.map(async ([key, setter]) => {
        try {
          const val = await loadFromBackend(key);
          if (val !== null && val !== undefined) { localStorage.setItem(key, JSON.stringify(val)); setter(val); }
        } catch {}
      }),
      ...LS_ONLY.map(async key => {
        try {
          const val = await loadFromBackend(key);
          if (val !== null && val !== undefined) localStorage.setItem(key, JSON.stringify(val));
        } catch {}
      }),
    ]).finally(() => setLoadingData(false));
  }, [authed]);

  const handleLogout = () => {
    localStorage.removeItem('forge_token');
    setAuthed(false);
    setLoadingData(false);
  };

  /* ── Nutrition actions ── */
  const handleAddFood = (date, entry) => {
    setNutritionLog(prev => {
      const day = prev[date] || { meals:[] };
      return { ...prev, [date]: { ...day, meals:[...day.meals, entry] } };
    });
    // check nutrition badges
    const newNutrLog = { ...nutritionLog };
    const day = newNutrLog[date] || { meals:[] };
    newNutrLog[date] = { ...day, meals:[...(day.meals||[]), entry] };
    const newEarned = checkNutritionBadges(newNutrLog, weightHistory, nutritionGoals, badges);
    if (Object.keys(newEarned).length > 0) setBadges(b=>({...b,...newEarned}));
  };

  const handleDeleteFood = (date, entryId) => {
    setNutritionLog(prev => {
      const day = prev[date] || { meals:[] };
      return { ...prev, [date]: { ...day, meals: day.meals.filter(m=>m.id!==entryId) } };
    });
  };

  const handleLogWeight = (date, weight) => {
    setWeightHistory(prev => {
      const filtered = prev.filter(w=>w.date!==date);
      const updated = [...filtered, { date, weight }].sort((a,b)=>a.date.localeCompare(b.date));
      return updated;
    });
    // check goal weight badge
    const newEarned = checkNutritionBadges(nutritionLog, [...weightHistory.filter(w=>w.date!==date), {date,weight}], nutritionGoals, badges);
    if (Object.keys(newEarned).length > 0) setBadges(b=>({...b,...newEarned}));
  };

  const handleSaveNutrGoals = (goals) => {
    setNutritionGoals(goals);
    setShowNutrGoals(false);
  };

  const handleAddCardio = (date, entry) => {
    setCardioLog(prev => {
      const day = prev[date] || [];
      return { ...prev, [date]: [...day, entry] };
    });
  };

  const handleDeleteCardio = (date, entryId) => {
    setCardioLog(prev => {
      const day = prev[date] || [];
      return { ...prev, [date]: day.filter(e => e.id !== entryId) };
    });
  };

  const handleGeneratePlan = async (profileData) => {
    setGenerating(true); setPlanError(null);
    try {
      const generated = await generatePlan(profileData);
      setPlan({ ...generated, generatedAt: new Date().toISOString() });
      setActiveTab('home');
    } catch(e) {
      setPlanError(e.message);
    } finally {
      setGenerating(false);
    }
  };

  const handleWorkoutComplete = (result) => {
    const today = getTodayISO();
    const updatedPRs = { ...prs };
    const newPRs = [];

    result.exercises.forEach(ex => {
      ex.sets.filter(s => s.done && s.weight && s.reps).forEach(s => {
        const w = parseFloat(s.weight), r = parseFloat(s.reps);
        if (w > 0 && r > 0 && (!updatedPRs[ex.exercise] || w > updatedPRs[ex.exercise].weight)) {
          updatedPRs[ex.exercise] = { weight:w, reps:r, date:today };
          newPRs.push({ exercise:ex.exercise, weight:w, reps:r });
        }
      });
    });

    const newLog = {
      id:`log_${Date.now()}`, date:today, day:result.day, focus:result.focus,
      duration:result.duration, exercises:result.exercises,
      totalVolume:result.totalVolume, notes:'',
    };
    const updatedLogs   = [...logs, newLog];
    const updatedStreak = updateStreak(streak, streak.lastWorkoutDate);
    const earned        = checkNewBadges(updatedLogs, updatedPRs, updatedStreak, badges);
    const earnedList    = Object.keys(earned).map(id => ({
      ...BADGE_DEFS.find(b => b.id === id), ...earned[id],
    }));

    setLogs(updatedLogs);
    setPrs(updatedPRs);
    setStreak(updatedStreak);
    if (Object.keys(earned).length > 0) setBadges(b => ({ ...b, ...earned }));
    setActiveWorkout(null);
    setWorkoutResult({ ...result, newPRs });
    setNewBadges(earnedList);
  };

  const handleCelebrationDone = (note) => {
    if (note?.trim()) {
      setLogs(prev => {
        const copy = [...prev];
        copy[copy.length - 1] = { ...copy[copy.length - 1], notes: note.trim() };
        return copy;
      });
    }
    setWorkoutResult(null);
    setNewBadges([]);
    setShowCoachCheckin(true);
  };

  const LogTab = () => (
    <div className="h-full overflow-y-auto pb-28">
      <div className="px-5 pt-14 pb-4">
        <h1 className="font-display text-5xl text-[#F5F5F0]"
          style={{ fontFamily:"'Bebas Neue',sans-serif" }}>START WORKOUT</h1>
        <p className="text-[#8A8A8E] text-sm">Choose a session from your plan</p>
      </div>
      {plan?.weeklySchedule?.length > 0 ? (
        <div className="px-5 space-y-3">
          {plan.weeklySchedule.map(day => {
            const isToday = day.day === getTodayName();
            return (
              <button key={day.day} onClick={() => setActiveWorkout(day)}
                className={`w-full rounded-2xl p-4 text-left border active:scale-95 transition-all flex items-center justify-between
                  ${isToday
                    ? 'bg-[rgba(200,255,0,0.06)] border-[rgba(200,255,0,0.2)]'
                    : 'bg-[#1A1A1C] border-[#252527]'}`}>
                <div className="min-w-0 flex-1">
                  <p className={`text-xs uppercase tracking-widest mb-0.5 ${isToday ? 'text-[#C8FF00]' : 'text-[#8A8A8E]'}`}>
                    {day.day}{isToday ? ' · TODAY' : ''}
                  </p>
                  <p className="font-semibold text-[#F5F5F0] truncate">{day.focus}</p>
                  <p className="text-[#8A8A8E] text-xs">{day.workouts.length} exercises</p>
                </div>
                <ChevronRight size={20} color="#8A8A8E" className="flex-shrink-0 ml-2"/>
              </button>
            );
          })}
        </div>
      ) : (
        <div className="px-5 flex flex-col items-center justify-center py-20 text-center">
          <div className="text-6xl mb-4">🏋️</div>
          <h2 className="font-display text-2xl text-[#F5F5F0] mb-2"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>THE IRON AWAITS</h2>
          <p className="text-[#8A8A8E] text-sm mb-6">Generate a training plan first to start logging structured workouts.</p>
          <button onClick={() => setActiveTab('profile')}
            className="px-6 py-3 rounded-xl bg-[#C8FF00] text-[#0D0D0F] font-display text-base active:scale-95"
            style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
            BUILD MY PLAN
          </button>
        </div>
      )}
    </div>
  );

  /* Loading / error overlay */
  if (generatingPlan || planError) {
    return (
      <div className="max-w-[430px] mx-auto h-screen overflow-hidden relative bg-[#0D0D0F]"
        style={{ fontFamily:"'DM Sans',sans-serif" }}>
        <LoadingPlan error={planError}/>
        {planError && (
          <div className="absolute bottom-10 left-0 right-0 px-5">
            <button onClick={() => { setPlanError(null); setActiveTab('profile'); }}
              className="w-full py-4 rounded-2xl bg-[#C8FF00] text-[#0D0D0F] font-display text-xl tracking-wider active:scale-95"
              style={{ fontFamily:"'Bebas Neue',sans-serif" }}>
              BACK TO PROFILE
            </button>
          </div>
        )}
      </div>
    );
  }

  /* Onboarding */
  if (!profile.onboardingComplete) {
    return (
      <div className="max-w-[430px] mx-auto h-screen overflow-hidden relative bg-[#0D0D0F]"
        style={{ fontFamily:"'DM Sans',sans-serif" }}>
        <ConversationalOnboarding onComplete={(p) => { setProfile(p); handleGeneratePlan(p); }}/>
      </div>
    );
  }

  const renderTab = () => {
    if (showNutrGoals) return (
      <NutritionGoalsScreen
        profile={profile}
        nutritionGoals={nutritionGoals}
        onSave={handleSaveNutrGoals}
        onBack={()=>setShowNutrGoals(false)}/>
    );
    switch (activeTab) {
      case 'home':     return <HomeScreen profile={profile} plan={plan} logs={logs} streak={streak} prs={prs}
                                onStartWorkout={setActiveWorkout} onSetTab={setActiveTab}/>;
      case 'plan':     return <PlanScreen plan={plan} profile={profile}
                                onRegenerate={() => { setPlan(null); handleGeneratePlan(profile); }}
                                onUpdatePlan={setPlan}/>;
      case 'coach':    return <CoachScreen coachCheckins={coachCheckins} profile={profile}
                                plan={plan} logs={logs} prs={prs} streak={streak}
                                nutritionLog={nutritionLog} nutritionGoals={nutritionGoals}
                                weightHistory={weightHistory} cardioLog={cardioLog} badges={badges}
                                onPlanUpdate={setPlan}/>;
      case 'log':      return <LogTab/>;
      case 'fuel':     return <FuelScreen
                                nutritionLog={nutritionLog}
                                nutritionGoals={nutritionGoals}
                                weightHistory={weightHistory}
                                profile={profile}
                                cardioLog={cardioLog}
                                onAddFood={handleAddFood}
                                onDeleteFood={handleDeleteFood}
                                onLogWeight={handleLogWeight}
                                onAddCardio={handleAddCardio}
                                onDeleteCardio={handleDeleteCardio}/>;
      case 'progress': return <ProgressScreen logs={logs} prs={prs} badges={badges} profile={profile}
                                nutritionLog={nutritionLog} nutritionGoals={nutritionGoals}
                                weightHistory={weightHistory}/>;
      case 'profile':  return <ProfileScreen profile={profile} onSave={setProfile}
                                onGeneratePlan={handleGeneratePlan} isExisting={true}
                                onNutritionGoals={()=>setShowNutrGoals(true)}
                                onLogout={handleLogout}
                                onReset={() => { setProfile(p => ({ ...p, onboardingComplete:false })); setPlan(null); }}/>;
      default: return null;
    }
  };

  if (!authed) return <LoginScreen onAuth={() => { setAuthed(true); setLoadingData(true); }}/>;
  if (loadingData) return <LoadingScreen/>;

  return (
    <>
      {activeWorkout && createPortal(
        <LogScreen planDay={activeWorkout}
          onComplete={handleWorkoutComplete}
          onClose={() => setActiveWorkout(null)}
          logs={logs}
          prs={prs}/>,
        document.body
      )}

      {showCoachCheckin && createPortal(
        <CoachCheckIn
          profile={profile}
          workoutResult={logs[logs.length - 1]}
          nutritionLog={nutritionLog}
          nutritionGoals={nutritionGoals}
          onDone={(data) => {
            if (data?.coachResponse) {
              const today = new Date().toISOString().split('T')[0];
              setCoachCheckins(prev => ({
                ...prev,
                [today]: {
                  ...prev[today],
                  workout: {
                    focus: data.focus,
                    answers: data.answers,
                    coachResponse: data.coachResponse,
                    timestamp: new Date().toISOString()
                  }
                }
              }));
            }
            setShowCoachCheckin(false);
            setActiveTab('home');
          }}
        />,
        document.body
      )}

      <div className="max-w-[430px] mx-auto h-screen overflow-hidden relative bg-[#0D0D0F]"
        style={{ fontFamily:"'DM Sans',sans-serif" }}>

        {workoutResult && (
          <CelebrationScreen result={workoutResult}
            newBadges={newBadges}
            onDone={handleCelebrationDone}
            profile={profile}/>
        )}

        <div className="h-full overflow-hidden">{renderTab()}</div>
        <BottomNav active={activeTab} onTab={setActiveTab}/>
      </div>
    </>
  );
}

document.head.appendChild(__style);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
